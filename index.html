function buildStarRating(rating){
  const color=rating>=50?'#fbbf24':rating>=1?'#22c55e':'#ef4444';
  const stars=Math.max(0,Math.min(5,Math.round(Math.abs(rating)/20)));
  let html='';for(let i=0;i<5;i++)html+=`<span style="color:${i<stars?color:'var(--text3)'};">★</span>`;return html;
}
function changePtnyRating(idx, val) {
  if (!pertanyaanRatings[idx]) pertanyaanRatings[idx] = 0;
  pertanyaanRatings[idx] += val;
  
  // Update UI di ptny-list (menu Pertanyaan)
  const card = document.getElementById('ptny-card-' + idx);
  if (card) updateRatingUI(card, pertanyaanRatings[idx]);
  
  // Update UI di hp-list (menu Hasil Pertanyaan) — cari semua card dengan idx ini
  document.querySelectorAll('[data-ptny-idx="' + idx + '"]').forEach(c => {
    updateRatingUI(c, pertanyaanRatings[idx]);
  });
  
  // Kirim ke server (async, tidak menunggu)
  sendRatingToServer(idx, val);
}
// ── Helper update tampilan rating dalam satu card ──────────────
function updateRatingUI(card, rating) {
  const starsEl = card.querySelector('.ptny-stars');
  const numEl   = card.querySelector('.ptny-rating-num');
  if (starsEl) starsEl.innerHTML = buildStarRating(rating);
  if (numEl) {
    numEl.textContent = (rating > 0 ? '+' : '') + rating;
    numEl.style.color = rating >= 50 ? '#fbbf24' : rating < 0 ? 'var(--red)' : 'var(--green)';
  }
}
// ── GANTI buildStarRating() dengan versi baru ini ─────────────
// (Merah = minus, Hijau = 1–49, Emas = 50+)
function buildStarRating(rating) {
  let color;
  if      (rating >= 50)  color = '#fbbf24'; // emas
  else if (rating >= 1)   color = '#22c55e'; // hijau
  else                    color = '#ef4444'; // merah (0 dan negatif)
  
  // Skala bintang: 0 = 0 bintang, 50 = 5 bintang, -50 = 5 bintang merah
  const absRating = Math.abs(rating);
  // Tampilkan bintang berdasarkan magnitude (log scale agar tidak langsung 5)
  const stars = rating === 0 ? 0 : Math.min(5, Math.max(1, Math.round(Math.log2(absRating + 1))));
  
  let html = '';
  for (let i = 0; i < 5; i++) {
    html += `<span style="color:${i < stars ? color : 'var(--text3)'}; font-size:.95rem;">★</span>`;
  }
  return html;
}

   
async function sendRatingToServer(rowIndex, nilai) {
  if (APPS_SCRIPT_PERTANYAAN.includes('GANTI')) return;
  const formData = new URLSearchParams({
    action: 'tambah_rating',
    row_index: rowIndex,
    user: currentUser?.username || 'anon',
    nilai: nilai
  });
  try {
    await fetch(APPS_SCRIPT_PERTANYAAN, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: formData.toString()
    });
  } catch (e) {
    // silent fail — rating tetap tampil lokal
  }
}

function filterHasilPertanyaan(){
  const data=db.Pertanyaan||[];
  const search=(document.getElementById('hp-search')?.value||'').toLowerCase();
  const urgensi=document.getElementById('hp-urgensi')?.value||'';
  const topik=document.getElementById('hp-topik')?.value||'';
  const status=document.getElementById('hp-status')?.value||'';
  const nama=(document.getElementById('hp-nama')?.value||'').toLowerCase();
  const namaJwb=(document.getElementById('hp-nama-jwb')?.value||'').toLowerCase();
  const urgOrder={'Critical':0,'High':1,'Medium':2,'Low':3,'Intermesso':4};
  let filtered=data.filter(item=>{
    if(search&&!((item.pertanyaan||'').toLowerCase().includes(search)||(item.nama||'').toLowerCase().includes(search)))return false;
    if(urgensi&&item.urgensi!==urgensi)return false;
    if(topik&&item.topik!==topik)return false;
    if(status&&item.status!==status)return false;
    if(nama&&!(item.nama||'').toLowerCase().includes(nama))return false;
    if(namaJwb&&!(item.nama_penjawab||'').toLowerCase().includes(namaJwb))return false;
    return true;
  }).sort((a,b)=>(urgOrder[a.urgensi]||5)-(urgOrder[b.urgensi]||5));
  const cnt=document.getElementById('hp-count');if(cnt)cnt.textContent=`${filtered.length} pertanyaan`;
  renderHasilPertanyaanCards(filtered,data);
}

  const keputusan    = document.getElementById('jawab-keputusan-' + idx)?.value   || '';
  const waktuPenjawab = new Date().toLocaleString('id-ID');
  
  const formData = new URLSearchParams({
    action:          'update_jawaban',
    row_index:       idx,
    nama_penjawab:   namaPenjawab,
    isi_jawaban:     isiJawaban,
    waktu_penjawab:  waktuPenjawab,
    status:          'Done',
    keputusan:       keputusan
  });
  
  try {
    await fetch(APPS_SCRIPT_PERTANYAAN, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body:    formData.toString()
    });
    toast('✅ Jawaban & keputusan disimpan!');
    closeJawabRow(idx);
    setTimeout(() => loadHasilPertanyaanList(), 1200);
  } catch (e) {
    toast('⚠️ Gagal menyimpan. Coba lagi.');
  }
}

// ══════════════════════════════════════════════════
// ADMIN
// ══════════════════════════════════════════════════
function renderAdmin(){
  const tiypes=(currentUser?.tipe||'');
  if(!tiypes.toLowerCase().includes('admin')){document.getElementById('app-content').innerHTML=`<div class="empty-state"><div class="icon">🔒</div><p>Akses Ditolak</p></div>`;return;}
  const content=document.getElementById('app-content');
  content.innerHTML=`
    <div class="section-header"><span class="section-title">Dashboard Admin</span></div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn-action accent" onclick="loadQuizResults()" style="padding:12px;">📊 Lihat Hasil Quiz</button>
      <button class="btn-action" onclick="loadHistoryLog()" style="padding:12px;">📋 Log Aktivitas</button>
    </div>
    <div id="admin-results" style="margin-top:14px;"></div>`;
}
async function loadQuizResults(){
  if(APPS_SCRIPT_URL.includes('GANTI')){document.getElementById('admin-results').innerHTML=`<div class="empty-state"><div class="icon">⚙️</div><p>URL Apps Script belum diisi</p></div>`;return;}
  document.getElementById('admin-results').innerHTML='<div class="loading-shimmer"></div>';
  try{
    const res=await fetch(APPS_SCRIPT_URL+'?type=quiz_results');const data=await res.json();
    const el=document.getElementById('admin-results');
    if(!data||!data.length){el.innerHTML=`<div class="empty-state"><div class="icon">📭</div><p>Belum ada jawaban</p></div>`;return;}
    const avg=Math.round(data.reduce((s,r)=>s+(parseFloat(r.skor)||0),0)/data.length);
    el.innerHTML=`<div class="section-header"><span class="section-title">Hasil Quiz</span><span class="section-count">${data.length} · avg ${avg}%</span></div>${data.map(r=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:7px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;"><strong>${escHtml(r.user||'?')}</strong><span style="font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--accent);">${r.skor}%</span></div><div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;"><div style="height:100%;width:${r.skor}%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;"></div></div><div style="color:var(--text3);font-size:.7rem;margin-top:4px;font-family:'JetBrains Mono',monospace;">${r.waktu?new Date(r.waktu).toLocaleString('id'):'—'}</div></div>`).join('')}`;
  }catch(e){document.getElementById('admin-results').innerHTML=`<div class="empty-state"><div class="icon">⚠️</div><p>Gagal memuat hasil quiz.</p></div>`;}
}
function loadHistoryLog(){
  const history=JSON.parse(localStorage.getItem('activity_log')||'[]');
  const el=document.getElementById('admin-results');
  if(!history.length){el.innerHTML=`<div class="empty-state"><div class="icon">📋</div><p>Belum ada log</p></div>`;return;}
  el.innerHTML=`<div class="section-header"><span class="section-title">Log</span><span class="section-count">${history.length}</span></div>${history.slice(-60).reverse().map(h=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:5px;font-size:.8rem;"><span class="tag">${h.menu||'?'}</span><strong style="margin-left:5px;">${escHtml(h.action||'')}</strong><div style="color:var(--text3);margin-top:2px;font-family:'JetBrains Mono',monospace;font-size:.68rem;">${h.user||'?'} · ${new Date(h.waktu).toLocaleString('id')}</div></div>`).join('')}`;
}

// HISTORY LOG
async function logHistory(menu,action){
  let ip='?';
  try{const r=await fetch('https://api.ipify.org?format=json');const d=await r.json();ip=d.ip;}catch(e){}
  const entry={user:currentUser?.username||'anon',menu,action,waktu:new Date().toISOString(),ip};
  const ex=JSON.parse(localStorage.getItem('activity_log')||'[]');ex.push(entry);if(ex.length>500)ex.splice(0,ex.length-500);localStorage.setItem('activity_log',JSON.stringify(ex));
  if(!APPS_SCRIPT_URL.includes('GANTI')){fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'history',...entry})}).catch(()=>{});}
}
