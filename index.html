<style>
/* ═══════════════════════════════════════════
   THEME SYSTEM
═══════════════════════════════════════════ */
[data-theme="light-white"]{
  --bg:#f8f9fa;--surface:#ffffff;--surface2:#f0f2f5;--border:#dee2e6;
  --accent:#1a56db;--accent2:#0891b2;--accent3:#7c3aed;
  --green:#16a34a;--yellow:#ca8a04;--red:#dc2626;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --glow:rgba(26,86,219,.1);--header-bg:#ffffff;--radius:13px;
  --fs-bg:#f8f9fa;--fs-text:#1e293b;
}

  --accent:#92400e;--accent2:#0891b2;--accent3:#7c3aed;
  --green:#166534;--yellow:#92400e;--red:#dc2626;
  --text:#1c1008;--text2:#44301a;--text3:#a16207;
  --glow:rgba(146,64,14,.1);--header-bg:#fffef9;--radius:13px;
  --fs-bg:#fdf8f0;--fs-text:#1c1008;
}
[data-theme="light-yellow"]{
  --bg:#fefce8;--surface:#ffffff;--surface2:#fef9c3;--border:#fde68a;
  --accent:#1d4ed8;--accent2:#0369a1;--accent3:#7c3aed;
  --green:#166534;--yellow:#b45309;--red:#be123c;
  --text:#1e3a5f;--text2:#1e40af;--text3:#3b82f6;
  --glow:rgba(29,78,216,.1);--header-bg:#ffffff;--radius:13px;
  --fs-bg:#fefce8;--fs-text:#1e3a5f;
}
[data-theme="light-pink"]{
  --bg:#fdf2f8;--surface:#ffffff;--surface2:#fce7f3;--border:#f9a8d4;
  --accent:#be185d;--accent2:#0891b2;--accent3:#7c3aed;
  --green:#166534;--yellow:#b45309;--red:#9f1239;
  --text:#4a0826;--text2:#831843;--text3:#db2777;
  --glow:rgba(190,24,93,.1);--header-bg:#ffffff;--radius:13px;
  --fs-bg:#fdf2f8;--fs-text:#4a0826;
}
[data-theme="light-black"]{
  --bg:#f1f5f9;--surface:#ffffff;--surface2:#e2e8f0;--border:#cbd5e1;
  --accent:#0f172a;--accent2:#334155;--accent3:#475569;
  --green:#15803d;--yellow:#b45309;--red:#dc2626;
  --text:#0f172a;--text2:#1e293b;--text3:#475569;
  --glow:rgba(15,23,42,.08);--header-bg:#ffffff;--radius:13px;
  --fs-bg:#f1f5f9;--fs-text:#0f172a;
}
[data-theme="dark-black"]{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--border:#2a2a2a;
  --accent:#ffffff;--accent2:#e2e8f0;--accent3:#94a3b8;
  --green:#22c55e;--yellow:#facc15;--red:#f87171;
  --text:#f1f5f9;--text2:#cbd5e1;--text3:#64748b;
  --glow:rgba(255,255,255,.08);--header-bg:#141414;--radius:13px;
  --fs-bg:#0a0a0a;--fs-text:#f1f5f9;
}
[data-theme="dark-green"]{
  --bg:#071a0e;--surface:#0d2a18;--surface2:#153d24;--border:#1e5c34;
  --accent:#4ade80;--accent2:#86efac;--accent3:#bbf7d0;
  --green:#16a34a;--yellow:#facc15;--red:#f87171;
  --text:#dcfce7;--text2:#86efac;--text3:#4ade80;
  --glow:rgba(74,222,128,.15);--header-bg:#0d2a18;--radius:13px;
  --fs-bg:#071a0e;--fs-text:#dcfce7;
}
[data-theme="dark-blue"]{
  --bg:#030d1a;--surface:#041526;--surface2:#072040;--border:#0a3060;
  --accent:#60a5fa;--accent2:#93c5fd;--accent3:#bfdbfe;
  --green:#34d399;--yellow:#fbbf24;--red:#f87171;
  --text:#e0f2fe;--text2:#93c5fd;--text3:#60a5fa;
  --glow:rgba(96,165,250,.15);--header-bg:#041526;--radius:13px;
  --fs-bg:#030d1a;--fs-text:#e0f2fe;
}
[data-theme="dark-red"]{
  --bg:#0d0000;--surface:#1a0000;--surface2:#2a0000;--border:#5c1010;
  --accent:#fca5a5;--accent2:#fda4af;--accent3:#fecdd3;
  --green:#34d399;--yellow:#fbbf24;--red:#ef4444;
  --text:#fee2e2;--text2:#fca5a5;--text3:#f87171;
  --glow:rgba(252,165,165,.15);--header-bg:#1a0000;--radius:13px;
  --fs-bg:#0d0000;--fs-text:#fee2e2;
}
[data-theme="dark-gold"]{
  --bg:#0c0900;--surface:#1a1400;--surface2:#2a2100;--border:#4a3800;
  --accent:#fcd34d;--accent2:#fbbf24;--accent3:#f59e0b;
  --green:#34d399;--yellow:#f59e0b;--red:#f87171;
  --text:#fefce8;--text2:#fde68a;--text3:#fbbf24;
  --glow:rgba(252,211,77,.15);--header-bg:#1a1400;--radius:13px;
  --fs-bg:#0c0900;--fs-text:#fefce8;
}
:root{
  --bg:#0a0e17;--surface:#111827;--surface2:#1a2235;--border:#1e2d45;
  --accent:#3b82f6;--accent2:#06b6d4;--accent3:#8b5cf6;
  --green:#10b981;--yellow:#f59e0b;--red:#ef4444;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --glow:rgba(59,130,246,.15);--header-bg:#111827;--radius:13px;
  --fs-bg:#0a0e17;--fs-text:#e2e8f0;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;height:-webkit-fill-available;}
body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased;min-height:100vh;min-height:-webkit-fill-available;}

/* LOGIN */
#login-screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:9000;overflow:hidden;background:linear-gradient(135deg,#f8f5ee 0%,#fffdf7 40%,#f0f4ff 100%);}
#login-media-wrap{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;overflow:hidden;}
#login-video-bg{width:100%;height:100%;object-fit:cover;display:none;}
#login-img-bg{width:100%;height:100%;object-fit:cover;display:none;}
.login-media-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(160deg,rgba(255,252,240,0.72) 0%,rgba(240,248,255,0.65) 100%);backdrop-filter:blur(1px);}
.login-geo{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;overflow:hidden;pointer-events:none;}
.login-geo::before{content:'';position:absolute;top:-80px;right:-80px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(212,175,55,0.18) 0%,transparent 70%);}
.login-geo::after{content:'';position:absolute;bottom:-60px;left:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.12) 0%,transparent 70%);}
.login-ring{position:absolute;border-radius:50%;border:1px solid rgba(212,175,55,0.25);animation:ringRotate 18s linear infinite;}
.login-ring-1{width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-50%);animation-duration:22s;}
.login-ring-2{width:360px;height:360px;top:50%;left:50%;transform:translate(-50%,-50%);border-color:rgba(59,130,246,0.18);animation-direction:reverse;animation-duration:16s;}
.login-ring-3{width:220px;height:220px;top:50%;left:50%;transform:translate(-50%,-50%);border-color:rgba(212,175,55,0.3);animation-duration:10s;}
@keyframes ringRotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
.ring-dot{position:absolute;width:7px;height:7px;border-radius:50%;background:radial-gradient(circle,#d4af37,rgba(212,175,55,0.3));top:-3px;left:50%;transform:translateX(-50%);box-shadow:0 0 8px rgba(212,175,55,0.6);}
.ring-dot-2{background:radial-gradient(circle,#3b82f6,rgba(59,130,246,0.3));box-shadow:0 0 8px rgba(59,130,246,0.5);}
.login-card{position:relative;z-index:10;background:rgba(255,255,255,0.88);border:1.5px solid rgba(212,175,55,0.35);border-radius:28px;padding:2.8rem 2.2rem 2.2rem;width:94%;max-width:380px;box-shadow:0 0 0 1px rgba(255,255,255,0.9),0 20px 60px rgba(0,0,0,.12),0 4px 20px rgba(212,175,55,0.08),inset 0 1px 0 rgba(255,255,255,1);backdrop-filter:blur(20px);animation:loginCardIn .7s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes loginCardIn{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:none}}
.login-card::before{content:'';position:absolute;top:0;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,#d4af37 30%,#f0c040 50%,#d4af37 70%,transparent);border-radius:0 0 2px 2px;}
.login-card::after{content:'';position:absolute;top:20px;right:20px;width:40px;height:40px;border-top:2px solid rgba(212,175,55,0.4);border-right:2px solid rgba(212,175,55,0.4);border-radius:0 10px 0 0;}
.login-corner-bl{position:absolute;bottom:20px;left:20px;width:40px;height:40px;border-bottom:2px solid rgba(212,175,55,0.4);border-left:2px solid rgba(212,175,55,0.4);border-radius:0 0 0 10px;}
.login-logo{text-align:center;margin-bottom:2rem;}
.login-emblem{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#d4af37 0%,#f8e878 40%,#c9a227 100%);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:2rem;box-shadow:0 4px 20px rgba(212,175,55,0.4),0 0 0 4px rgba(212,175,55,0.12),0 0 0 8px rgba(212,175,55,0.06);animation:emblemPulse 3s ease-in-out infinite;}
@keyframes emblemPulse{0%,100%{box-shadow:0 4px 20px rgba(212,175,55,.4),0 0 0 4px rgba(212,175,55,.12),0 0 0 8px rgba(212,175,55,.06)}50%{box-shadow:0 4px 28px rgba(212,175,55,.6),0 0 0 6px rgba(212,175,55,.18),0 0 0 12px rgba(212,175,55,.08)}}
.login-logo h2{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#1a3a6e,#2563eb,#1a3a6e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;margin-bottom:3px;}
.login-logo .sub{font-size:.75rem;font-weight:500;color:#8a9ab5;letter-spacing:1.5px;text-transform:uppercase;}
.login-logo .sub span{color:#d4af37;font-weight:700;}
.login-divider{display:flex;align-items:center;gap:8px;margin:0 auto 1.4rem;width:80%;}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,.4));}
.login-divider::after{background:linear-gradient(90deg,rgba(212,175,55,.4),transparent);}
.login-divider-icon{font-size:.8rem;color:#d4af37;}
.lf{margin-bottom:1rem;}
.lf label{display:block;font-size:.68rem;font-weight:700;color:#8a9ab5;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
.lf-input-wrap{position:relative;}
.lf-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:.9rem;color:#b0bec5;pointer-events:none;}
.lf input{width:100%;background:#f8faff;border:1.5px solid #dde8f8;border-radius:12px;padding:12px 14px 12px 40px;color:#1e2d4a;font-family:'DM Sans',sans-serif;font-size:.93rem;outline:none;transition:border-color .25s,box-shadow .25s,background .25s;}
.lf input:focus{border-color:#d4af37;background:#fff;box-shadow:0 0 0 4px rgba(212,175,55,.12);}
.lf input::placeholder{color:#b8c6d8;}
.login-btn{width:100%;padding:14px;margin-top:.5rem;background:linear-gradient(135deg,#1a3a6e 0%,#2563eb 50%,#1d4ed8 100%);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;letter-spacing:.3px;box-shadow:0 4px 20px rgba(37,99,235,.35);transition:all .2s;position:relative;overflow:hidden;}
.login-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .4s;}
.login-btn:hover::before{left:100%;}
.login-btn:active{transform:scale(.98);}
.login-btn-gold{display:block;height:2px;margin-top:6px;border-radius:2px;background:linear-gradient(90deg,transparent,#d4af37 30%,#f0c040 50%,#d4af37 70%,transparent);}
.login-footer{text-align:center;margin-top:1.4rem;font-size:.72rem;color:#a0b0c0;border-top:1px solid rgba(212,175,55,.15);padding-top:1rem;}
.login-footer strong{color:#d4af37;}
.login-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:8px 12px;font-size:.8rem;color:#dc2626;margin-top:8px;display:none;text-align:center;}

/* MAIN APP */
#main-app{display:none;flex-direction:column;height:100vh;height:-webkit-fill-available;padding-bottom:env(safe-area-inset-bottom,0px);}
header{background:var(--header-bg);border-bottom:1px solid var(--border);padding:0 14px;height:54px;min-height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100;}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-title{font-size:.88rem;font-weight:700;color:var(--text);}
.hdr-sub{font-size:.68rem;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.hdr-right{display:flex;gap:5px;align-items:center;}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:background .2s;flex-shrink:0;}
.icon-btn:hover{background:var(--border);}
.icon-btn.logout{color:var(--red);border-color:rgba(239,68,68,.3);}
#live-clock{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--accent2);background:var(--surface2);padding:4px 9px;border-radius:8px;border:1px solid var(--border);letter-spacing:.5px;white-space:nowrap;}

/* THEME PANEL */
#theme-panel{display:none;position:fixed;top:58px;right:10px;z-index:500;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px;box-shadow:0 8px 32px rgba(0,0,0,.4);width:260px;}
.theme-section-label{font-size:.65rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:6px 0 4px;padding:0 2px;}
.theme-chips-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.theme-chip{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:.72rem;font-weight:500;color:var(--text2);transition:all .2s;white-space:nowrap;}
.theme-chip:hover,.theme-chip.active{border-color:var(--accent);color:var(--accent);background:var(--glow);}
.theme-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

nav{display:flex;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;scrollbar-width:none;padding:0 6px;gap:2px;min-height:40px;}
nav::-webkit-scrollbar{display:none;}
nav button{padding:8px 12px;border:none;background:none;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.8rem;color:var(--text3);border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.2px;flex-shrink:0;}
nav button.active{color:var(--accent);border-bottom-color:var(--accent);}
nav button:hover:not(.active){color:var(--text2);}
#app-content-wrapper {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}

.content-area {
  padding-bottom: max(80px, env(safe-area-inset-bottom, 0px) + 60px) !important;
}

   
@supports (-webkit-touch-callout: none) {
  #main-app {
    height: -webkit-fill-available;
  }
}

/* FULLSCREEN LYRIC — theme-aware */
#fullscreen-lyric{
  position:fixed;inset:0;
  background:var(--fs-bg,var(--bg));
  color:var(--fs-text,var(--text));
  z-index:9999;display:flex;flex-direction:column;
}
.fs-back{
  position:fixed;top:10px;left:10px;z-index:10;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);border-radius:8px;padding:8px 14px;
  font-family:'DM Sans',sans-serif;font-weight:600;font-size:.85rem;
  cursor:pointer;
}
.fs-controls{
  position:fixed;top:10px;right:10px;z-index:10;
  display:flex;gap:5px;
}
.fs-ctrl-btn{
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);border-radius:8px;padding:7px 12px;
  font-family:'DM Sans',sans-serif;font-weight:600;font-size:.85rem;
  cursor:pointer;
}
.fs-content{
  flex:1;display:block;
  padding:60px 20px;
  font-size:2rem;line-height:1.6;
  white-space:pre-line;overflow-y:auto;text-align:center;
  color:var(--fs-text,var(--text));
  padding-bottom:calc(60px + env(safe-area-inset-bottom,0px));
}

/* Font classes */
.font-normal{font-family:inherit;font-weight:normal;}
.font-bold{font-weight:700;}
.font-light{font-weight:300;}
.font-courier{font-family:'Courier New',Courier,monospace;line-height:1.6;}
.font-verdana{font-family:Verdana,Geneva,sans-serif;line-height:1.8;letter-spacing:.3px;}
.font-times{font-family:'Times New Roman',Times,serif;line-height:1.7;}
.font-bold2{font-family:'DM Sans',sans-serif;font-weight:800;letter-spacing:-.2px;}
.font-thin{font-family:'DM Sans',sans-serif;font-weight:300;letter-spacing:.5px;}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:0 4px 20px rgba(0,0,0,.1);position:relative;overflow:hidden;}
.dash-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:var(--glow);}
.dash-card-icon{font-size:1.6rem;margin-bottom:6px;display:block;}
.dash-card-val{font-size:1.8rem;font-weight:800;color:var(--accent);font-family:'Playfair Display',serif;}
.dash-card-label{font-size:.72rem;color:var(--text3);margin-top:2px;}
.clock-card{background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);border:1px solid var(--border);border-radius:var(--radius);padding:18px 16px;text-align:center;margin-bottom:10px;}
.clock-big{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:600;color:var(--accent);letter-spacing:2px;}
.clock-date{font-size:.8rem;color:var(--text2);margin-top:4px;}
.acara-now-box{background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:14px;margin-bottom:10px;position:relative;overflow:hidden;}
.acara-now-box::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent);border-radius:4px 0 0 4px;}
.acara-timeline{margin-top:12px;overflow-x:auto;padding-bottom:8px;}
.acara-timeline-track{position:relative;height:90px;min-width:500px;}
.acara-line{position:absolute;top:40px;left:0;right:0;height:3px;background:var(--border);border-radius:2px;}
.acara-line-progress{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .5s;}
.acara-tick{position:absolute;top:30px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;}
.acara-tick-line{width:2px;height:10px;background:var(--border);}
.acara-tick-label{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text3);margin-top:3px;white-space:nowrap;}
.acara-event-dot{position:absolute;top:34px;transform:translateX(-50%);width:14px;height:14px;border-radius:50%;border:2px solid var(--surface);cursor:pointer;transition:transform .2s;}
.acara-event-dot:hover{transform:translateX(-50%) scale(1.3);}
.acara-event-dot.current{width:18px;height:18px;top:32px;box-shadow:0 0 10px var(--accent);}
.acara-event-label{position:absolute;top:52px;transform:translateX(-50%);font-size:.6rem;color:var(--text2);white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis;text-align:center;}
.acara-car{position:absolute;top:18px;font-size:1.2rem;transition:left .5s ease-in-out;transform:translateX(-50%);}
.pie-wrap{position:relative;width:130px;height:130px;margin:0 auto;}
.pie-wrap svg{width:100%;height:100%;}
.pie-legend{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.pie-leg-item{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--text2);}
.pie-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pie3d-wrap{position:relative;width:140px;height:80px;margin:8px auto;}
.bar-chart-wrap{width:100%;padding:8px 0;}
.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-label{font-size:.72rem;color:var(--text2);min-width:80px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;height:20px;background:var(--surface2);border-radius:5px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.bar-val{font-size:.68rem;font-weight:700;color:#fff;font-family:'JetBrains Mono',monospace;}

/* CARDS & LISTS */
.modern-list{display:flex;flex-direction:column;gap:9px;}
.modern-item{display:flex;align-items:center;background:var(--surface);padding:12px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;transition:transform .15s,border-color .2s;gap:12px;}
.modern-item:hover{border-color:var(--accent);transform:translateY(-1px);}
.modern-item:active{transform:scale(.99);}
.modern-item-img{width:54px;height:54px;border-radius:11px;object-fit:cover;flex-shrink:0;}
.modern-item-content{flex:1;overflow:hidden;}
.modern-item-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:600;padding:2px 7px;border-radius:5px;margin-bottom:3px;}
.modern-item-title{font-weight:700;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.modern-item-desc{font-size:.75rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.modern-item-arrow{color:var(--text3);font-size:1rem;flex-shrink:0;}

/* JEMAAT */
.jemaat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.jemaat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center;cursor:pointer;transition:transform .15s,border-color .2s;}
.jemaat-card:hover{border-color:var(--accent2);transform:translateY(-2px);}
.jemaat-avatar{width:68px;height:68px;border-radius:50%;object-fit:cover;margin:0 auto 9px;border:2px solid var(--border);display:block;}
.jemaat-name{font-weight:700;font-size:.83rem;color:var(--text);}
.jemaat-role{font-size:.7rem;color:var(--text3);margin-top:2px;}
.jemaat-detail-list{display:flex;flex-direction:column;gap:7px;}
.jemaat-detail-item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;transition:border-color .2s;}
.jemaat-detail-item:hover{border-color:var(--accent);}
.jemaat-detail-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--border);}
.jemaat-detail-info{flex:1;overflow:hidden;}
.jemaat-detail-name{font-weight:700;font-size:.88rem;color:var(--text);}
.jemaat-detail-sub{font-size:.72rem;color:var(--text3);margin-top:2px;}
.jemaat-text-list{display:flex;flex-direction:column;gap:0;}
.jemaat-text-item{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--border);cursor:pointer;font-size:.82rem;}
.jemaat-text-item:hover{color:var(--accent);}
.jemaat-text-no{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text3);min-width:24px;}
.jemaat-text-name{flex:1;font-weight:500;color:var(--text);}
.jemaat-text-sub{font-size:.7rem;color:var(--text3);}
.filter-group{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
.k-input{padding:8px 11px;border-radius:9px;border:1px solid var(--border);flex:1;min-width:110px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s;}
.k-input:focus{border-color:var(--accent);}
.k-input option{background:var(--surface);}
.checklist-filter-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.checklist-filter-title{font-size:.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.checklist-items{display:flex;flex-wrap:wrap;gap:6px;}
.checklist-item{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 9px;cursor:pointer;font-size:.75rem;color:var(--text2);transition:all .15s;user-select:none;}
.checklist-item.checked{background:var(--accent);border-color:var(--accent);color:#fff;}
.andor-toggle{font-size:.68rem;padding:3px 8px;border:1px solid var(--border);border-radius:5px;background:var(--surface2);color:var(--text3);cursor:pointer;transition:all .15s;}
.andor-toggle.active{background:var(--yellow);border-color:var(--yellow);color:#000;}

/* JEMAAT POPUP */
.jemaat-popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:850;align-items:center;justify-content:center;padding:16px;}
.jemaat-popup-overlay.open{display:flex;}
.jemaat-popup{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:380px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:popupIn .25s cubic-bezier(.34,1.56,.64,1);}
@keyframes popupIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:none}}
.jp-header{padding:20px 20px 0;text-align:center;position:relative;}
.jp-close{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text3);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;}
.jp-avatar-wrap{position:relative;width:90px;height:90px;margin:0 auto 12px;cursor:pointer;}
.jp-avatar{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--accent);}
.jp-avatar-zoom-hint{position:absolute;bottom:0;right:0;width:24px;height:24px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;}
.jp-name{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--text);margin-bottom:3px;}
.jp-nick{font-size:.78rem;color:var(--text3);margin-bottom:8px;}
.jp-tags{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.jp-body{padding:0 16px 20px;}
.jp-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
.jp-field{background:var(--surface2);border-radius:8px;padding:8px 10px;border:1px solid var(--border);}
.jp-field-label{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px;}
.jp-field-value{font-size:.83rem;font-weight:600;color:var(--text);}
.jp-field.full{grid-column:1/-1;}
.jp-copy-btn{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;cursor:pointer;transition:opacity .2s;margin-top:8px;}
.jp-copy-btn:hover{opacity:.85;}

/* MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:800;overflow-y:auto;}
.modal-panel{background:var(--surface);border-top:1px solid var(--border);min-height:100vh;padding:16px 14px 100px;}
.modal-close-bar{position:fixed;bottom:0;left:0;width:100%;padding:12px 14px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:7px;z-index:810;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));}
.close-btn-main{flex:1;padding:11px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;cursor:pointer;transition:background .2s;}
.close-btn-main:hover{background:var(--border);}

/* TABS */
.tab-group{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.tab-group::-webkit-scrollbar{display:none;}
.tab-btn{padding:7px 12px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;flex-shrink:0;transition:all .2s;}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.kidung-tab{display:none;}
.active-tab{display:block;}

/* ACTION ROW */
.action-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.btn-action{padding:7px 11px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .15s;}
.btn-action:hover{background:var(--border);}
.btn-action.accent{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-action.green{background:var(--green);color:#fff;border-color:var(--green);}
.btn-action.red{background:var(--red);color:#fff;border-color:var(--red);}

/* LYRIC BOX */
.lyric-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;max-height:55vh;overflow-y:auto;}
.scalable-text{white-space:pre-wrap;line-height:1.75;transition:font-size .2s;word-wrap:break-word;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);}
.key-line{color:#60a5fa;font-weight:600;}
.note-line{color:#86efac;}

/* MUSIC PLAYER */
.music-player{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.music-player audio{width:100%;height:38px;border-radius:8px;margin-bottom:9px;}
.transpose-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.transpose-label{font-size:.75rem;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.transpose-display{font-family:'JetBrains Mono',monospace;font-size:.95rem;font-weight:700;color:var(--accent);min-width:60px;text-align:center;background:var(--surface);padding:4px 8px;border-radius:6px;border:1px solid var(--border);}
.key-display{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--accent2);background:rgba(6,182,212,.1);padding:3px 8px;border-radius:5px;border:1px solid rgba(6,182,212,.2);}
.tone-player{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.tone-player-title{font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.tone-btns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.tone-progress{width:100%;height:4px;background:var(--surface);border-radius:2px;overflow:hidden;margin-top:8px;}
.tone-progress-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .1s linear;}

/* IMAGE VIEWER */
#img-viewer{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.97);z-index:2000;flex-direction:column;touch-action:none;}
.iv-toolbar-top{position:absolute;top:0;left:0;right:0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent);z-index:10;gap:8px;}
.iv-title-area{flex:1;}
.iv-title{color:#fff;font-size:.88rem;font-weight:700;margin-bottom:2px;}
.iv-counter{color:rgba(255,255,255,.5);font-family:'JetBrains Mono',monospace;font-size:.72rem;}
.iv-top-btns{display:flex;gap:6px;align-items:center;}
.iv-top-btn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;font-weight:600;}
.iv-top-btn:hover{background:rgba(255,255,255,.3);}
.iv-top-btn.close{background:rgba(239,68,68,.4);border-color:rgba(239,68,68,.5);}
.iv-img-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;user-select:none;}
.iv-img-container{transition:transform .15s ease;transform-origin:center center;cursor:grab;}
.iv-img-container:active{cursor:grabbing;}
#iv-main-img{max-width:100vw;max-height:100vh;object-fit:contain;display:block;transition:opacity .25s;-webkit-user-drag:none;pointer-events:none;}
.iv-nav-btn{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:1.4rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;transition:all .2s;}
.iv-nav-btn:hover{background:rgba(255,255,255,.35);}
#iv-prev{left:10px;}#iv-next{right:10px;}
.iv-toolbar-bottom{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);padding:10px 14px 20px;z-index:10;}
.iv-dots{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.iv-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .2s;cursor:pointer;}
.iv-dot.active{background:#fff;transform:scale(1.5);}
.iv-zoom-label{text-align:center;font-family:'JetBrains Mono',monospace;font-size:.7rem;color:rgba(255,255,255,.5);margin-bottom:8px;}

/* PDF VIEWER */
.pdf-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;display:flex;align-items:center;gap:13px;transition:transform .15s,border-color .2s;margin-bottom:9px;}
.pdf-item:hover{border-color:var(--red);transform:translateX(3px);}
.pdf-icon{width:46px;height:46px;background:rgba(239,68,68,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.pdf-fullscreen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#111;z-index:2000;flex-direction:column;}
.pdf-toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pdf-toolbar-title{font-weight:600;font-size:.88rem;}
#pdf-frame{flex:1;width:100%;border:none;}

/* YOUTUBE */
.yt-player-wrap{position:relative;width:100%;padding-top:56.25%;border-radius:12px;overflow:hidden;margin-bottom:10px;background:#000;}
.yt-player-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.yt-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,0,0,.15);border:1px solid rgba(255,0,0,.3);color:#ff4444;padding:3px 8px;border-radius:5px;font-size:.7rem;font-weight:600;margin-bottom:8px;}

/* QUIZ */
.quiz-wrap{max-width:600px;margin:0 auto;}
.quiz-question-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px;}
.quiz-q-number{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text3);margin-bottom:5px;}
.quiz-q-text{font-weight:600;font-size:.97rem;margin-bottom:14px;color:var(--text);}
.quiz-options{display:flex;flex-direction:column;gap:7px;}
.quiz-option{padding:10px 13px;border:1px solid var(--border);border-radius:9px;background:var(--surface2);cursor:pointer;font-size:.86rem;transition:all .2s;color:var(--text);}
.quiz-option:hover{border-color:var(--accent);background:rgba(59,130,246,.1);}
.quiz-option.selected{border-color:var(--accent);background:rgba(59,130,246,.2);color:var(--accent);font-weight:600;}
.quiz-option.correct{border-color:var(--green);background:rgba(16,185,129,.2);color:var(--green);font-weight:600;}
.quiz-option.wrong{border-color:var(--red);background:rgba(239,68,68,.15);color:var(--red);}
.quiz-text-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.86rem;outline:none;resize:none;transition:border-color .2s;}
.quiz-text-input:focus{border-color:var(--accent);}
.quiz-submit-btn{width:100%;padding:13px;margin-top:10px;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;}
.score-circle{width:110px;height:110px;border-radius:50%;border:4px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 0 30px var(--glow);}
.score-number{font-size:1.9rem;font-weight:800;color:var(--accent);}
.score-label{font-size:.7rem;color:var(--text3);}

/* PERTANYAAN */
.ptny-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.ptny-form-title{font-weight:700;font-size:1rem;margin-bottom:14px;color:var(--text);}
.ptny-field{margin-bottom:10px;}
.ptny-field label{display:block;font-size:.72rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.ptny-field input,.ptny-field select,.ptny-field textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.86rem;outline:none;transition:border-color .2s;}
.ptny-field input:focus,.ptny-field select:focus,.ptny-field textarea:focus{border-color:var(--accent);}
.ptny-field select option{background:var(--surface);}
.ptny-field textarea{resize:vertical;min-height:80px;}
.ptny-submit-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.92rem;cursor:pointer;transition:opacity .2s;}
.ptny-submit-btn:hover{opacity:.88;}
.ptny-char-count{font-size:.68rem;color:var(--text3);text-align:right;margin-top:3px;}
.ptny-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;position:relative;}
.ptny-card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.ptny-card-icon{font-size:1.4rem;flex-shrink:0;}
.ptny-card-meta{flex:1;}
.ptny-card-topik{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px;}
.ptny-card-nama{font-size:.72rem;color:var(--text3);}
.ptny-card-waktu{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--text3);}
.ptny-urgensi{display:inline-block;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px;}
.ptny-urgensi.Critical{background:rgba(239,68,68,.2);color:#ef4444;border:1px solid rgba(239,68,68,.3);}
.ptny-urgensi.High{background:rgba(245,158,11,.2);color:#f59e0b;border:1px solid rgba(245,158,11,.3);}
.ptny-urgensi.Medium{background:rgba(59,130,246,.2);color:#3b82f6;border:1px solid rgba(59,130,246,.3);}
.ptny-urgensi.Low{background:rgba(16,185,129,.2);color:#10b981;border:1px solid rgba(16,185,129,.3);}
.ptny-urgensi.Intermesso{background:rgba(139,92,246,.2);color:#8b5cf6;border:1px solid rgba(139,92,246,.3);}
.ptny-question-text{font-size:.9rem;color:var(--text);line-height:1.5;margin:8px 0;}
.ptny-rating{display:flex;align-items:center;gap:8px;margin-top:8px;}
.ptny-stars{font-size:1rem;}
.ptny-rating-num{font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;}
.ptny-rating-btns{display:flex;gap:5px;margin-left:auto;}
.ptny-rating-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s;}
.ptny-rating-btn:hover{background:var(--border);}
.ptny-rating-btn.pos{border-color:var(--green);color:var(--green);}
.ptny-rating-btn.neg{border-color:var(--red);color:var(--red);}
.ptny-answer-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:8px;font-size:.82rem;color:var(--text2);}
.ptny-answer-label{font-size:.65rem;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:4px;}

.ptny-answer-actions{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.ptny-jawab-row{display:none;background:var(--surface2);border:1px solid var(--accent);border-radius:8px;padding:10px;margin-top:8px;}
.ptny-jawab-row input,.ptny-jawab-row textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;margin-bottom:6px;}
.ptny-jawab-row textarea{resize:vertical;min-height:60px;}

/* LINK MENU */
.link-item{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;transition:border-color .2s;}
.link-item:hover{border-color:var(--accent);}
.link-item-img{width:60px;height:60px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.6rem;border:1px solid var(--border);}
.link-item-img img{width:100%;height:100%;border-radius:10px;object-fit:cover;}
.link-item-content{flex:1;overflow:hidden;}
.link-item-name{font-weight:700;font-size:.95rem;color:var(--text);margin-bottom:3px;}
.link-item-from{font-size:.7rem;color:var(--text3);margin-bottom:4px;}
.link-item-keterangan{font-size:.8rem;color:var(--text2);line-height:1.5;margin-bottom:8px;}
.link-open-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity .2s;}
.link-open-btn:hover{opacity:.85;}

/* UTILS */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.section-title{font-weight:700;font-size:.97rem;color:var(--text);}
.section-count{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text3);background:var(--surface2);padding:3px 8px;border-radius:18px;}
.empty-state{text-align:center;padding:36px 18px;color:var(--text3);}
.empty-state .icon{font-size:2.8rem;margin-bottom:8px;}
.empty-state p{font-size:.88rem;}
.tag{display:inline-block;font-size:.68rem;font-weight:600;padding:2px 7px;border-radius:5px;background:rgba(59,130,246,.15);color:var(--accent);}
.tag.green{background:rgba(16,185,129,.15);color:var(--green);}
.tag.yellow{background:rgba(245,158,11,.15);color:var(--yellow);}
.tag.red{background:rgba(239,68,68,.15);color:var(--red);}
.tag.purple{background:rgba(139,92,246,.15);color:var(--accent3);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px;}
.info-item{background:var(--surface2);border-radius:9px;padding:9px 11px;border:1px solid var(--border);}
.info-item-label{font-size:.68rem;color:var(--text3);margin-bottom:2px;}
.info-item-value{font-size:.85rem;font-weight:600;color:var(--text);}
.loading-shimmer{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px;height:65px;margin-bottom:9px;}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:9px 18px;font-size:.83rem;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.3);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}

.view-toggle-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

};

const LOGIN_VIDEO_URL="";

let ivTouchStartX=0,ivTouchStartY=0,ivLastPanX=0,ivLastPanY=0,ivPinching=false;

// ══════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════
function fmtImg(url){
  if(!url||!url.trim())return'';
  if(url.startsWith('http')&&!url.includes('drive.google.com'))return url;
  const m=url.match(/[-\w]{25,}/);
  return m?`https://lh3.googleusercontent.com/d/${m[0]}`:url;
}
function fmtPrev(url){if(!url)return'';const m=url.match(/[-\w]{25,}/);return m?`https://drive.google.com/file/d/${m[0]}/preview`:url;}
function fmtDl(url){if(!url)return'#';const m=url.match(/[-\w]{25,}/);return m?`https://drive.google.com/uc?export=download&id=${m[0]}`:url;}
function isYoutubeUrl(url){return url&&(url.includes('youtube.com')||url.includes('youtu.be'));}
function ytEmbedUrl(url){if(!url)return'';let id='';const m1=url.match(/[?&]v=([a-zA-Z0-9_-]{11})/);const m2=url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);const m3=url.match(/embed\/([a-zA-Z0-9_-]{11})/);if(m1)id=m1[1];else if(m2)id=m2[1];else if(m3)id=m3[1];return id?`https://www.youtube.com/embed/${id}?rel=0&modestbranding=1`:''; }
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2600);}

// ══════════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════════
let themePanelOpen=false;
function toggleThemePanel(){
  const p=document.getElementById('theme-panel');
  themePanelOpen=!themePanelOpen;
  p.style.display=themePanelOpen?'block':'none';
}
function setTheme(t,chip){
  document.body.setAttribute('data-theme',t);
  document.querySelectorAll('.theme-chip').forEach(c=>c.classList.remove('active'));
  if(chip)chip.classList.add('active');
  localStorage.setItem('pg_theme',t);
  themePanelOpen=false;document.getElementById('theme-panel').style.display='none';
}
(function(){
  const t=localStorage.getItem('pg_theme')||'dark-black';
  document.body.setAttribute('data-theme',t);
  setTimeout(()=>{const chip=document.querySelector(`.theme-chip[data-t="${t}"]`);if(chip){document.querySelectorAll('.theme-chip').forEach(c=>c.classList.remove('active'));chip.classList.add('active');}},100);
})();

document.addEventListener('click',e=>{
  if(themePanelOpen&&!e.target.closest('#theme-panel')&&!e.target.closest('#btn-theme')){
    document.getElementById('theme-panel').style.display='none';themePanelOpen=false;
  }
  const btn=e.target.closest('.btn-fullscreen');
  if(btn){const text=decodeURIComponent(btn.dataset.lyric||'');openLyricFullscreen(text);}
});

// ══════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════
function attemptLogin(){
  const errEl=document.getElementById('login-error');errEl.style.display='none';
  if(!db.Awal||!db.Awal.length)return toast('⏳ Memuat data, harap tunggu...');
  const u=document.getElementById('user').value.trim();
  const p=document.getElementById('pass').value;
  if(!u||!p)return toast('⚠️ Isi username dan password');
  const found=db.Awal.find(r=>r.username===u&&r.password===p);
  if(!found){errEl.style.display='block';return;}
  currentUser=found;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='flex';
  document.getElementById('header-title').textContent=`Halo, ${found.username}`;
  document.getElementById('header-sub').textContent=found.tipe||'user';
  Papa.parse(URLS.Background,{download:true,header:true,complete:r=>{db.Background=r.data;}});
  setupNavigation();
  logHistory('login','masuk aplikasi');
}
function doLogout(){
  if(!confirm('Yakin ingin keluar?'))return;
  logHistory('logout','keluar aplikasi');
  currentUser=null;db={};
  Papa.parse(URLS.Awal,{download:true,header:true,complete:r=>{db.Awal=r.data;}});
  document.getElementById('main-app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('main-nav').innerHTML='';
  document.getElementById('user').value='';document.getElementById('pass').value='';
  document.getElementById('login-error').style.display='none';
}
function setupNavigation(){
  const nav=document.getElementById('main-nav');nav.innerHTML='';
  const menus=(currentUser.tipe||'').split(',').map(s=>s.trim()).filter(Boolean);
  const allMenus=['Dashboard',...menus.filter(m=>m!=='Dashboard')];
  allMenus.forEach((menu,idx)=>{
    const btn=document.createElement('button');
    btn.textContent=menuLabel(menu);
    btn.onclick=(e)=>{loadModule(menu,e.currentTarget);logHistory('menu',menu);};
    nav.appendChild(btn);
    if(idx===0)setTimeout(()=>btn.click(),100);
  });
}
function menuLabel(n){
  const icons={Dashboard:'📊',Kidung:'🎵',Alkitab:'📖',Acara:'📅',Kegiatan:'⚡',Jemaat:'👥',Link:'🔗',Quiz:'❓',Pertanyaan:'❔','Hasil Pertanyaan':'📋',Admin:'🔑'};
  const nm=n.trim();
  return(icons[nm]||'•')+' '+nm;
}
function loadModule(name,el){
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  const content=document.getElementById('app-content');
  content.innerHTML=`<div class="loading-shimmer"></div><div class="loading-shimmer" style="height:45px;opacity:.6;"></div><div class="loading-shimmer" style="height:45px;opacity:.3;"></div>`;
  const nm=name.toLowerCase().trim();
  if(nm==='dashboard'){dispatchRender(name);return;}
  if(!db[name]){
    const url=URLS[name];
    if(!url||url.includes('GANTI'))return dispatchRender(name);
    Papa.parse(url,{download:true,header:true,complete:res=>{db[name]=res.data;dispatchRender(name);}});
  }else dispatchRender(name);
}
function dispatchRender(name){
  const n=name.toLowerCase().trim();
  if(n==='dashboard')renderDashboard();
  else if(n==='kidung')renderKidung();
  else if(n==='alkitab')renderAlkitab();
  else if(n==='acara')renderAcara();
  else if(n==='kegiatan')renderKegiatan();
  else if(n==='jemaat')renderJemaat();
  else if(n==='link')renderLink();
  else if(n==='quiz')renderQuiz();
  else if(n==='pertanyaan')renderPertanyaan();
  else if(n==='hasil pertanyaan')renderHasilPertanyaan();
  else if(n==='admin')renderAdmin();
  else document.getElementById('app-content').innerHTML=`<div class="empty-state"><div class="icon">🔧</div><p>Modul "${name}" siap.</p></div>`;
}

function parseAcaraWaktu(wkt){
  if(!wkt||!wkt.trim())return null;
  const months={Jan:0,Feb:1,Mar:2,Apr:3,Mei:4,May:4,Jun:5,Jul:6,Agu:7,Aug:7,Sep:8,Okt:9,Oct:9,Nov:10,Des:11,Dec:11};
  const m=wkt.trim().match(/^(\d{1,2})\s+(\w+)\s+(\d{4})\s+(\d{1,2})[.:](\d{2})/);
  if(m){const mo=months[m[2]];if(mo===undefined)return null;return new Date(parseInt(m[3]),mo,parseInt(m[1]),parseInt(m[4]),parseInt(m[5]),0);}
  return null;
}
function buildDashAcaraSection(acara){
  const now=new Date();
  const acaraWithTime=acara.map((a,i)=>{
    const wkt=a['waktu']||a['Waktu']||a['WAKTU']||a['jam']||'';
    const dt=parseAcaraWaktu(wkt);
    return{...a,_dt:dt,_idx:i,_wkt:wkt};
  }).filter(a=>a._dt);
  acaraWithTime.sort((a,b)=>a._dt-b._dt);
  if(acaraWithTime.length===0){return`<div class="acara-now-box" style="margin-bottom:10px;"><div style="font-size:.85rem;font-weight:700;color:var(--text);margin-bottom:4px;">📋 Acara Hari Ini</div><div style="font-size:.8rem;color:var(--text3);">Tidak ada acara terjadwal dengan waktu.</div></div>`;}
  const todayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const todayEnd=new Date(todayStart.getTime()+86400000);
  const todayAcara=acaraWithTime.filter(a=>a._dt>=todayStart&&a._dt<todayEnd);
  let displayAcara=[];
  if(todayAcara.length>0){let pivotIdx=todayAcara.findIndex(a=>a._dt>=now);if(pivotIdx===-1)pivotIdx=todayAcara.length;const startIdx=Math.max(0,pivotIdx-1);const endIdx=Math.min(todayAcara.length,startIdx+4);displayAcara=todayAcara.slice(startIdx,endIdx);}
  const nowMs=now.getTime();const remainingToday=todayAcara.filter(a=>a._dt>now);
  let nextDayAcara=[];
  if(remainingToday.length===0&&todayAcara.length>0){const tomorrow=new Date(todayStart.getTime()+86400000);const dayAfter=new Date(tomorrow.getTime()+86400000);nextDayAcara=acaraWithTime.filter(a=>a._dt>=tomorrow&&a._dt<dayAfter).slice(0,3);}
  else if(todayAcara.length===0){nextDayAcara=acaraWithTime.filter(a=>a._dt>now).slice(0,3);}
  const noTodayEvents=todayAcara.length===0;const allDone=todayAcara.length>0&&remainingToday.length===0;
  let timelineHtml='';
  if(todayAcara.length>0){
    const firstTime=todayAcara[0]._dt.getTime();const lastTime=todayAcara[todayAcara.length-1]._dt.getTime();const range=Math.max(lastTime-firstTime,3600000);const nowPct=Math.max(0,Math.min(100,((nowMs-firstTime)/range)*100));
    timelineHtml=`<div class="acara-timeline"><div class="acara-timeline-track" id="acara-tl-track"><div class="acara-line"><div class="acara-line-progress" id="acara-line-prog" style="width:${nowPct}%"></div></div><div class="acara-car" id="acara-car" style="left:${nowPct}%">🚗👤</div>${todayAcara.map((a,i)=>{const pct=range===0?50:Math.max(2,Math.min(98,((a._dt.getTime()-firstTime)/range)*100));const isPast=a._dt<now;const isCurrent=Math.abs(a._dt-now)<1800000;const col=isPast?'#64748b':(isCurrent?'#f59e0b':'#10b981');const label=(a['nama acara']||a.nama||'—').slice(0,14);const timeLbl=`${String(a._dt.getHours()).padStart(2,'0')}.${String(a._dt.getMinutes()).padStart(2,'0')}`;return`<div class="acara-event-dot${isCurrent?' current':''}" style="left:${pct}%;background:${col};" title="${a['nama acara']||''}"></div><div class="acara-event-label" style="left:${pct}%;">${timeLbl}<br><span style="font-size:.56rem;">${label}</span></div>`;}).join('')}${todayAcara.filter((_,i)=>i===0||i===todayAcara.length-1).map(a=>{const pct=range===0?50:Math.max(2,Math.min(98,((a._dt.getTime()-firstTime)/range)*100));return`<div class="acara-tick" style="left:${pct}%;"><div class="acara-tick-line"></div></div>`;}).join('')}</div></div>`;
  }
  const tableRows=(displayAcara.length>0?displayAcara:nextDayAcara).map(a=>{const isNow=Math.abs(a._dt-now)<3600000;const timeLbl=`${String(a._dt.getHours()).padStart(2,'0')}.${String(a._dt.getMinutes()).padStart(2,'0')}`;const dateStr=`${a._dt.getDate()} ${['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'][a._dt.getMonth()]}`;return`<div style="display:flex;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);"><span style="font-family:'JetBrains Mono',monospace;font-size:.7rem;color:${isNow?'var(--yellow)':'var(--accent)'};min-width:48px;">${timeLbl}</span><span style="font-size:.68rem;color:var(--text3);min-width:45px;">${dateStr}</span><span style="font-size:.85rem;font-weight:${isNow?'700':'500'};color:${isNow?'var(--yellow)':'var(--text)'};">${a['nama acara']||a.nama||'-'}</span>${isNow?'<span style="background:var(--yellow);color:#000;font-size:.6rem;padding:1px 6px;border-radius:8px;font-weight:700;margin-left:auto;">SEKARANG</span>':''}</div>`;}).join('');
  return`<div class="acara-now-box" style="margin-bottom:10px;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;"><div style="font-size:.85rem;font-weight:700;color:var(--text);">📋 Acara ${noTodayEvents?'Berikutnya':(allDone?'Besok':'Sekarang')}</div>${allDone?`<span style="font-size:.68rem;color:var(--text3);">✅ Hari ini selesai</span>`:''}</div>${noTodayEvents&&nextDayAcara.length===0?`<div style="font-size:.8rem;color:var(--text3);">Tidak ada acara.</div>`:''}${timelineHtml}${tableRows}${nextDayAcara.length>0&&!noTodayEvents?`<div style="font-size:.72rem;color:var(--text3);margin-top:8px;border-top:1px solid var(--border);padding-top:6px;">📅 Besok: ${nextDayAcara.map(a=>`${String(a._dt.getHours()).padStart(2,'0')}.${String(a._dt.getMinutes()).padStart(2,'0')} ${a['nama acara']||''}`).join(' · ')}</div>`:''}</div>`;
}

let carAnimInterval=null;
function startCarAnimation(){
  const car=document.getElementById('acara-car');if(!car)return;
  let dir=1,pos=parseFloat(car.style.left||'0');
  if(carAnimInterval)clearInterval(carAnimInterval);
  carAnimInterval=setInterval(()=>{
    const track=document.getElementById('acara-tl-track');
    if(!track||!document.getElementById('acara-car')){clearInterval(carAnimInterval);return;}
    pos+=dir*0.3;if(pos>95){dir=-1;car.style.transform='translateX(-50%) scaleX(-1)';}
    if(pos<2){dir=1;car.style.transform='translateX(-50%) scaleX(1)';}
    car.style.left=pos+'%';
  },50);
}

// PIE / BAR
function buildPie(segments){
  const total=segments.reduce((s,x)=>s+x.val,0);
  if(total===0)return'<div style="color:var(--text3);font-size:.8rem;text-align:center;padding:20px;">No data</div>';
  let paths='',offset=0;const r=55,cx=65,cy=65;
  segments.forEach(seg=>{const frac=seg.val/total;const angle=frac*2*Math.PI;const x1=cx+r*Math.sin(offset);const y1=cy-r*Math.cos(offset);offset+=angle;const x2=cx+r*Math.sin(offset);const y2=cy-r*Math.cos(offset);const large=frac>.5?1:0;paths+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${seg.color}" opacity=".9"><title>${seg.label}: ${seg.val}</title></path>`;});
  return`<svg viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">${paths}<circle cx="65" cy="65" r="22" fill="var(--surface)"/><text x="65" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text)">${total}</text></svg>`;
}
function build3DPie(segments){
  const total=segments.reduce((s,x)=>s+x.val,0);
  if(total===0)return'<div style="color:var(--text3);font-size:.8rem;text-align:center;padding:10px;">No data</div>';
  const cx=100,cy=45,rx=80,ry=28,depth=18;let svgPaths='',svgSides='',offset=0;
  segments.forEach(seg=>{if(seg.val===0)return;const frac=seg.val/total;const angle=frac*2*Math.PI;const x1=cx+rx*Math.sin(offset);const y1=cy-ry*Math.cos(offset);offset+=angle;const x2=cx+rx*Math.sin(offset);const y2=cy-ry*Math.cos(offset);const large=frac>.5?1:0;if(Math.sin(offset-angle/2)>0)svgSides+=`<path d="M${x1},${y1} A${rx},${ry} 0 ${large},1 ${x2},${y2} L${x2},${y2+depth} A${rx},${ry} 0 ${large},0 ${x1},${y1+depth} Z" fill="${seg.color}" opacity=".55" stroke="rgba(0,0,0,.15)" stroke-width=".5"/>`;});
  offset=0;segments.forEach(seg=>{if(seg.val===0)return;const frac=seg.val/total;const angle=frac*2*Math.PI;const x1=cx+rx*Math.sin(offset);const y1=cy-ry*Math.cos(offset);offset+=angle;const x2=cx+rx*Math.sin(offset);const y2=cy-ry*Math.cos(offset);const large=frac>.5?1:0;svgPaths+=`<path d="M${cx},${cy} L${x1},${y1} A${rx},${ry} 0 ${large},1 ${x2},${y2} Z" fill="${seg.color}" opacity=".95" stroke="rgba(0,0,0,.1)" stroke-width=".5"><title>${seg.label}: ${seg.val}</title></path>`;});
  return`<div style="text-align:center;"><svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:200px;">${svgSides}${svgPaths}<text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="10" font-weight="bold" fill="white">${total}</text></svg></div>`;
}
function buildBarChart(map){
  const maxVal=Math.max(...Object.values(map),1);
  return Object.entries(map).map(([k,v],i)=>{const pct=Math.round(v/maxVal*100);return`<div class="bar-item"><div class="bar-label" title="${k}">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${MC[i%MC.length]},${MC[(i+1)%MC.length]});"><span class="bar-val">${v}</span></div></div></div>`;}).join('');
}

function openImgViewer(images,startIndex,title){
  ivImages=Array.isArray(images)?images:[images];ivIndex=Math.max(0,Math.min(ivImages.length-1,startIndex||0));ivScale=1;ivPanX=0;ivPanY=0;
  document.getElementById('iv-title').textContent=title||'Foto';
  const viewer=document.getElementById('img-viewer');viewer.style.display='flex';
  const dots=document.getElementById('iv-dots');dots.innerHTML=ivImages.map((_,i)=>`<div class="iv-dot${i===ivIndex?' active':''}" onclick="ivGoTo(${i})"></div>`).join('');ivRender();
}
function ivRender(){
  const img=document.getElementById('iv-main-img');const container=document.getElementById('iv-img-container');
  img.style.opacity=0;setTimeout(()=>{img.src=ivImages[ivIndex];img.style.opacity=1;},100);
  ivScale=1;ivPanX=0;ivPanY=0;applyIvTransform(container);
  document.getElementById('iv-counter').textContent=`${ivIndex+1}/${ivImages.length}`;document.getElementById('iv-zoom-label').textContent='100%';
  document.querySelectorAll('.iv-dot').forEach((d,i)=>d.classList.toggle('active',i===ivIndex));
  document.getElementById('iv-prev').style.display=ivImages.length>1&&ivIndex>0?'flex':'none';document.getElementById('iv-next').style.display=ivImages.length>1&&ivIndex<ivImages.length-1?'flex':'none';
}
function applyIvTransform(container){if(!container)container=document.getElementById('iv-img-container');container.style.transform=`translate(${ivPanX}px,${ivPanY}px) scale(${ivScale})`;const zl=document.getElementById('iv-zoom-label');if(zl)zl.textContent=Math.round(ivScale*100)+'%';}
function ivNav(dir){ivIndex=Math.max(0,Math.min(ivImages.length-1,ivIndex+dir));ivRender();}
function ivGoTo(i){ivIndex=i;ivRender();}
function ivZoomIn(){ivScale=Math.min(5,ivScale+.4);applyIvTransform();}
function ivZoomOut(){ivScale=Math.max(.5,ivScale-.4);applyIvTransform();}
function ivToggleFullscreen(){const el=document.getElementById('img-viewer');if(!document.fullscreenElement)el.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
function closeImgViewer(){document.getElementById('img-viewer').style.display='none';ivImages=[];ivIndex=0;ivScale=1;ivPanX=0;ivPanY=0;if(document.fullscreenElement)document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{
  const viewer=document.getElementById('img-viewer');if(viewer.style.display==='none')return;
  if(e.key==='ArrowLeft')ivNav(-1);else if(e.key==='ArrowRight')ivNav(1);else if(e.key==='Escape')closeImgViewer();else if(e.key==='+')ivZoomIn();else if(e.key==='-')ivZoomOut();
});
(function(){
  let ts={x:0,y:0},pinchDist0=0,pinchScale0=1;
  const area=document.getElementById('iv-img-area');const getC=()=>document.getElementById('iv-img-container');
  area.addEventListener('touchstart',e=>{if(e.touches.length===1){ts={x:e.touches[0].clientX,y:e.touches[0].clientY};ivLastPanX=ivPanX;ivLastPanY=ivPanY;}else if(e.touches.length===2){ivPinching=true;const dx=e.touches[0].clientX-e.touches[1].clientX;const dy=e.touches[0].clientY-e.touches[1].clientY;pinchDist0=Math.sqrt(dx*dx+dy*dy);pinchScale0=ivScale;}e.preventDefault();},{passive:false});
  area.addEventListener('touchmove',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX;const dy=e.touches[0].clientY-e.touches[1].clientY;const dist=Math.sqrt(dx*dx+dy*dy);ivScale=Math.max(.5,Math.min(5,pinchScale0*(dist/pinchDist0)));applyIvTransform(getC());}else if(e.touches.length===1&&ivScale>1){ivPanX=ivLastPanX+(e.touches[0].clientX-ts.x);ivPanY=ivLastPanY+(e.touches[0].clientY-ts.y);applyIvTransform(getC());}e.preventDefault();},{passive:false});
  area.addEventListener('touchend',e=>{if(ivPinching&&e.touches.length<2){ivPinching=false;return;}if(ivScale<=1.05){const dx=e.changedTouches[0].clientX-ts.x;if(Math.abs(dx)>50&&Math.abs(e.changedTouches[0].clientY-ts.y)<60)ivNav(dx<0?1:-1);}ivPanX=0;ivPanY=0;});
  area.addEventListener('wheel',e=>{e.preventDefault();ivScale=Math.max(.5,Math.min(5,ivScale-(e.deltaY>0?.2:-.2)));applyIvTransform(getC());},{passive:false});
})();

// FONT / COPY / TRANSPOSE
function adjustFont(d){currentFontSize=Math.max(9,Math.min(30,currentFontSize+d));document.querySelectorAll('.scalable-text').forEach(el=>el.style.fontSize=currentFontSize+'px');}
function copyText(id){const el=document.getElementById(id);if(!el)return;navigator.clipboard.writeText(el.innerText).then(()=>toast('✅ Teks berhasil disalin!'));}
function transposeChordLine(line,steps){if(steps===0)return line;return line.replace(/[A-G][#b]?/g,m=>{const note=m.replace('b','#');const idx=CHROMATIC.indexOf(note.toUpperCase());if(idx===-1)return m;return CHROMATIC[(idx+steps+12)%12];});}
function updateTransposeDisplay(){
  const key=CHROMATIC[((CHROMATIC.indexOf('C')+currentTranspose)+12)%12];
  document.querySelectorAll('.transpose-display').forEach(el=>el.textContent=`${currentTranspose>=0?'+':''}${currentTranspose} (${key})`);
  document.querySelectorAll('.key-line').forEach(el=>{const orig=el.getAttribute('data-orig')||el.textContent;el.setAttribute('data-orig',orig);el.textContent=transposeChordLine(orig,currentTranspose);});
}
function changeTranspose(d){currentTranspose+=d;if(currentTranspose>6)currentTranspose=-6;if(currentTranspose<-6)currentTranspose=6;updateTransposeDisplay();}
function resetTranspose(){currentTranspose=0;updateTransposeDisplay();}

// TONE PLAYER
const TONE_KEYS=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function buildTonePlayer(audioUrl,containerSelector){
  if(!audioUrl)return;const wrap=document.querySelector(containerSelector);if(!wrap)return;
  tonePlayerState={url:audioUrl,transpose:0,player:null,isPlaying:false};
  wrap.innerHTML=`<div class="tone-player-title">🎵 Player dengan Transpose Nada</div><audio id="tone-audio-el" src="${audioUrl}" preload="auto" style="display:none;"></audio><div class="transpose-row" style="margin-bottom:10px;"><span class="transpose-label">Nada Dasar:</span><button class="btn-action" onclick="toneTransposeChange(-1)">♭ −1</button><span class="transpose-display" id="tone-key-disp">+0 (C)</span><button class="btn-action" onclick="toneTransposeChange(1)">♯ +1</button><button class="btn-action" onclick="toneTransposeReset()">↺ Reset</button></div><div class="tone-btns"><button class="btn-action green" id="tone-play-btn" onclick="toneTogglePlay()">▶ Play</button><button class="btn-action red" onclick="toneStop()">■ Stop</button></div><div class="tone-progress"><div class="tone-progress-fill" id="tone-prog"></div></div><div style="font-size:.7rem;color:var(--text3);margin-top:6px;font-family:'JetBrains Mono',monospace;">Nada: <span id="tone-curr-key" class="key-display">C</span></div>`;
  const audio=document.getElementById('tone-audio-el');
  if(audio){audio.addEventListener('timeupdate',()=>{if(audio.duration){const el=document.getElementById('tone-prog');if(el)el.style.width=(audio.currentTime/audio.duration*100)+'%';}});audio.addEventListener('ended',()=>toneSetPlayBtn(false));}
}
function toneTogglePlay(){const a=document.getElementById('tone-audio-el');if(!a)return;if(a.paused){a.play();toneSetPlayBtn(true);}else{a.pause();toneSetPlayBtn(false);}}
function toneStop(){const a=document.getElementById('tone-audio-el');if(a){a.pause();a.currentTime=0;}toneSetPlayBtn(false);const el=document.getElementById('tone-prog');if(el)el.style.width='0%';}
function toneSetPlayBtn(p){const btn=document.getElementById('tone-play-btn');if(btn)btn.textContent=p?'⏸ Pause':'▶ Play';}
function toneTransposeChange(d){tonePlayerState.transpose+=d;if(tonePlayerState.transpose>12)tonePlayerState.transpose=-12;if(tonePlayerState.transpose<-12)tonePlayerState.transpose=12;const keyIdx=((TONE_KEYS.indexOf('C')+tonePlayerState.transpose)+24)%12;const keyName=TONE_KEYS[keyIdx];const disp=document.getElementById('tone-key-disp');if(disp)disp.textContent=`${tonePlayerState.transpose>=0?'+':''}${tonePlayerState.transpose} (${keyName})`;const currKey=document.getElementById('tone-curr-key');if(currKey)currKey.textContent=keyName;currentTranspose=tonePlayerState.transpose;updateTransposeDisplay();}
function toneTransposeReset(){tonePlayerState.transpose=0;const disp=document.getElementById('tone-key-disp');if(disp)disp.textContent='+0 (C)';const currKey=document.getElementById('tone-curr-key');if(currKey)currKey.textContent='C';currentTranspose=0;updateTransposeDisplay();}

// FONT MODE
function toggleFontMode(){fontModeIndex=(fontModeIndex+1)%fontModes.length;applySavedFontMode();localStorage.setItem('fontMode',fontModeIndex);toast(`Font: ${fontModes[fontModeIndex].label}`);}
function applySavedFontMode(){
  const saved=localStorage.getItem('fontMode');if(saved!==null)fontModeIndex=parseInt(saved);
  const targets=document.querySelectorAll('.scalable-text,.fs-content');
  targets.forEach(el=>{fontModes.forEach(f=>el.classList.remove(f.cls));el.classList.add(fontModes[fontModeIndex].cls);el.style.fontSize=currentFontSize+'px';});
}

function openLyricFullscreen(text){
  if(!text)return;
  const old=document.getElementById('fullscreen-lyric');if(old)old.remove();
  const div=document.createElement('div');
  div.id='fullscreen-lyric';
  div.innerHTML=`
    <button class="fs-back" onclick="closeLyricFullscreen()">← Kembali</button>
    <div class="fs-controls">
      <button class="fs-ctrl-btn" onclick="fsAdjustFont(-2)">A−</button>
      <button class="fs-ctrl-btn" onclick="fsAdjustFont(2)">A+</button>
      <button class="fs-ctrl-btn" onclick="toggleFontModeFS()">🔤</button>
    </div>
    <div class="fs-content" id="fs-content-inner">${escHtml(text)}</div>`;
  document.body.appendChild(div);
  // Theme vars are inherited via CSS custom properties on body, so no manual override needed
  const fsc=div.querySelector('.fs-content');
  if(fsc){fsc.style.fontSize=currentFontSize+'px';fontModes.forEach(f=>fsc.classList.remove(f.cls));fsc.classList.add(fontModes[fontModeIndex].cls);}
  if(div.requestFullscreen)div.requestFullscreen().catch(()=>{});
}
function fsAdjustFont(d){
  currentFontSize=Math.max(9,Math.min(50,currentFontSize+d));
  const fsc=document.getElementById('fs-content-inner');if(fsc)fsc.style.fontSize=currentFontSize+'px';
}
function toggleFontModeFS(){
  fontModeIndex=(fontModeIndex+1)%fontModes.length;
  localStorage.setItem('fontMode',fontModeIndex);
  const fsc=document.getElementById('fs-content-inner');
  if(fsc){fontModes.forEach(f=>fsc.classList.remove(f.cls));fsc.classList.add(fontModes[fontModeIndex].cls);}
  toast(`Font: ${fontModes[fontModeIndex].label}`);
}
function openLyricFullscreenFromDom(){
  const el=document.querySelector('.lyric-box .scalable-text');if(!el)return;
  openLyricFullscreen(el.innerText);
}
function closeLyricFullscreen(){
  if(document.fullscreenElement)document.exitFullscreen().catch(()=>{});
  const el=document.getElementById('fullscreen-lyric');if(el)el.remove();
}

function filterKidung(){

function filterAlkitab(){

function setJemaatView(mode){

function filterJemaat(){
  const search=(document.getElementById('j-search')?.value||'').toLowerCase();
  const gender=document.getElementById('j-gender')?.value||'';
  const usiaOp=document.getElementById('j-usia-op')?.value||'';
  const usiaVal=parseFloat(document.getElementById('j-usia-val')?.value)||0;
  const rhOp=document.getElementById('j-rh-op')?.value||'';
  const rhVal=parseFloat(document.getElementById('j-rh-val')?.value)||0;
  const ktm=document.getElementById('j-ktm')?.value||'';
  const ktmTahir=document.getElementById('j-ktm-tahir')?.value||'';
  const kategori=document.getElementById('j-kategori')?.value||'';
  const kelas=document.getElementById('j-kelas')?.value||'';
  const ikutSolo=document.getElementById('j-ikut-solo')?.value||'';

  lastFilteredJemaat=[];
  (db.Jemaat||[]).forEach(j=>{
    const nama=(j['Nama Lengkap']||j['Nama Panggilan']||'').toLowerCase();
    const usiaJ=parseInt(j.Usia)||0;
    const rhJ=parseFloat(j['rata-rata hadir']||j['Rata-rata Hadir']||0)||0;
    // Multi-value fields — split by comma/semicolon/slash
    const ibadahJ=(j['ibadah yang diikuti']||'').split(/[,;/]/).map(x=>x.trim().toLowerCase()).filter(Boolean);
    const pelayananJ=(j['pelayanan']||'').split(/[,;/]/).map(x=>x.trim().toLowerCase()).filter(Boolean);
    const ktmJ=(j['KTM']||j['ktm']||'').trim().toLowerCase();
    const ktmTahirJ=(j['KTM Tahir']||j['ktm tahir']||'').trim().toLowerCase();
    const kategoriJ=(j['Kategori']||j['kategori']||'').trim();
    const kelasJ=(j['kelas']||j['Kelas']||'').trim();
    const ikutSoloJ=String(j['ikutSolo']||j['Ikut Solo']||'').toLowerCase().replace(/\s+/g,'').trim();

    if(search&&!nama.includes(search))return;
    if(gender&&j.Gender!==gender)return;
    if(usiaVal>0&&usiaOp){if(usiaOp==='lt'&&!(usiaJ<usiaVal))return;if(usiaOp==='gt'&&!(usiaJ>usiaVal))return;if(usiaOp==='eq'&&!(usiaJ===usiaVal))return;}
    if(rhVal>0&&rhOp){if(rhOp==='lt'&&!(rhJ<rhVal))return;if(rhOp==='gt'&&!(rhJ>rhVal))return;if(rhOp==='eq'&&!(Math.abs(rhJ-rhVal)<0.01))return;}
    if(ktm&&ktmJ!==ktm)return;
    if(ktmTahir&&ktmTahirJ!==ktmTahir)return;
    if(kategori&&kategoriJ!==kategori)return;
    if(kelas&&kelasJ!==kelas)return;
    if(ikutSolo){const ys=['y','ya','yes','1'];const ns=['n','no','tidak','0'];if(ikutSolo==='y'&&!ys.includes(ikutSoloJ))return;if(ikutSolo==='n'&&!ns.includes(ikutSoloJ))return;}

    // Ibadah checklist — compare lowercase
    if(jemaatFilterIbadah.length>0){
      const fIbadah=jemaatFilterIbadah.map(x=>x.toLowerCase());
      if(jemaatFilterIbadahMode==='AND'){if(!fIbadah.every(f=>ibadahJ.some(i=>i.includes(f)||f.includes(i))))return;}
      else{if(!fIbadah.some(f=>ibadahJ.some(i=>i.includes(f)||f.includes(i))))return;}
    }
    // Pelayanan checklist — compare lowercase
    if(jemaatFilterPelayanan.length>0){
      const fPelay=jemaatFilterPelayanan.map(x=>x.toLowerCase());
      if(jemaatFilterPelayananMode==='AND'){if(!fPelay.every(f=>pelayananJ.some(p=>p.includes(f)||f.includes(p))))return;}
      else{if(!fPelay.some(f=>pelayananJ.some(p=>p.includes(f)||f.includes(p))))return;}
    }
    lastFilteredJemaat.push(j);
  });

  const count=lastFilteredJemaat.length;
  const pria=lastFilteredJemaat.filter(j=>j.Gender==='Pria').length;
  const wanita=lastFilteredJemaat.filter(j=>j.Gender==='Wanita').length;
  const tn=document.getElementById('jemaat-total-num');if(tn)tn.textContent=db.Jemaat?.length||0;
  const fn=document.getElementById('jemaat-filter-num');if(fn)fn.textContent=count;
  const pn=document.getElementById('jemaat-pria-num');if(pn)pn.textContent=pria;
  const wn=document.getElementById('jemaat-wanita-num');if(wn)wn.textContent=wanita;
  renderJemaatResult(lastFilteredJemaat);
}

function renderQuiz(){
  const content=document.getElementById('app-content');
  if(!db.Quiz){content.innerHTML=`<div class="loading-shimmer"></div>`;Papa.parse(URLS.Quiz,{download:true,header:true,complete:res=>{db.Quiz=res.data;renderQuiz();}});return;}
  const rawData=db.Quiz||[];
  if(!rawData.length){content.innerHTML=`<div class="empty-state"><div class="icon">❓</div><p>Data Quiz belum tersedia.</p></div>`;return;}
  quizAnswers={};quizSubmitted=false;
  const questions=rawData.filter(r=>r.pertanyaan&&(r.aktif||'y').toString().toLowerCase()!=='n');
  if(!questions.length){content.innerHTML=`<div class="empty-state"><div class="icon">❓</div><p>Belum ada soal quiz aktif.</p></div>`;return;}
  content.innerHTML=`<div class="quiz-wrap"><div class="section-header"><span class="section-title">Kuis</span><span class="section-count">${questions.length} soal</span></div>${questions.map((q,i)=>buildQuizQ(q,i)).join('')}<button class="quiz-submit-btn" onclick="submitQuiz()">Kirim Jawaban →</button></div>`;
}
function buildQuizQ(q,i){
  const tipe=(q.tipe||'teks').toLowerCase();const opsi=['a','b','c','d'].map(x=>q[`opsi_${x}`]).filter(Boolean);
  return`<div class="quiz-question-card"><div class="quiz-q-number">Soal ${i+1} · ${tipe==='pilihan'?'Pilihan Ganda':'Esai'}</div><div class="quiz-q-text">${escHtml(q.pertanyaan)}</div>${tipe==='pilihan'?`<div class="quiz-options">${opsi.map((opt,oi)=>`<div class="quiz-option" id="opt-${i}-${oi}" onclick="selectOption(${i},${oi},${opsi.length})"><strong>${String.fromCharCode(65+oi)}.</strong> ${escHtml(opt)}</div>`).join('')}</div>`:`<textarea class="quiz-text-input" id="qt-${i}" rows="3" placeholder="Tulis jawaban Anda..." oninput="quizAnswers[${i}]=this.value"></textarea>`}</div>`;
}
function selectOption(qi,oi,total){for(let i=0;i<total;i++){const el=document.getElementById(`opt-${qi}-${i}`);if(el)el.classList.remove('selected');}const sel=document.getElementById(`opt-${qi}-${oi}`);if(sel)sel.classList.add('selected');quizAnswers[qi]=oi;}
async function submitQuiz(){
  if(quizSubmitted)return;
  const questions=(db.Quiz||[]).filter(r=>r.pertanyaan&&(r.aktif||'y').toString().toLowerCase()!=='n');let correct=0;
  questions.forEach((q,i)=>{const tipe=(q.tipe||'teks').toLowerCase();if(tipe==='pilihan'){const opsi=['a','b','c','d'].map(x=>q[`opsi_${x}`]).filter(Boolean);const si=quizAnswers[i];if(si!==undefined){const st=opsi[si];const isOk=q.jawaban_benar&&st&&st.toLowerCase().trim()===q.jawaban_benar.toLowerCase().trim();if(isOk){correct++;document.getElementById(`opt-${i}-${si}`)?.classList.add('correct');}else{document.getElementById(`opt-${i}-${si}`)?.classList.add('wrong');const ci=opsi.findIndex(o=>o.toLowerCase().trim()===(q.jawaban_benar||'').toLowerCase().trim());if(ci>=0)document.getElementById(`opt-${i}-${ci}`)?.classList.add('correct');}}}});
  quizSubmitted=true;const pct=questions.length>0?Math.round((correct/questions.length)*100):0;
  const qw=document.querySelector('.quiz-wrap');if(qw){const scoreEl=document.createElement('div');scoreEl.style.cssText='background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:22px;text-align:center;margin-top:14px;';scoreEl.innerHTML=`<div class="score-circle"><div class="score-number">${pct}%</div><div class="score-label">Nilai</div></div><div style="font-weight:700;font-size:1rem;margin-bottom:5px;">${correct} dari ${questions.length} Benar</div><div style="color:var(--text3);font-size:.83rem;">${pct>=80?'🏆 Luar biasa!':pct>=60?'👍 Cukup baik!':'💡 Terus belajar!'}</div>`;qw.appendChild(scoreEl);scoreEl.scrollIntoView({behavior:'smooth'});}
  toast(`✅ Skor: ${pct}%`);logHistory('quiz',`skor ${pct}%`);
}

async function submitPertanyaan(){
  const statusEl=document.getElementById('ptny-status-msg');
  const nama=document.getElementById('ptny-nama').value.trim()||'Anonim';
  let topik=document.getElementById('ptny-topik').value;
  if(topik==='Lainnya')topik=document.getElementById('ptny-topik-other').value.trim()||'Lainnya';
  const pertanyaan=document.getElementById('ptny-pertanyaan').value.trim();
  const urgensi=document.getElementById('ptny-urgensi').value;
  if(!pertanyaan)return toast('⚠️ Tulis pertanyaan terlebih dahulu');

  const waktu=new Date().toLocaleString('id-ID');
  const payload={
    action:'tambah_pertanyaan',
    waktu,nama,topik,pertanyaan,urgensi,
    waktu_penjawab:'',nama_penjawab:'',
    rating:'0',status:'Pending',
    isi_jawaban:'',keputusan:''
  };

  if(statusEl)statusEl.textContent='⏳ Mengirim...';

  try{
    // Gunakan URL encode form untuk kompatibilitas no-cors
    const formData=new URLSearchParams();
    Object.entries(payload).forEach(([k,v])=>formData.append(k,v));

    await fetch(APPS_SCRIPT_PERTANYAAN,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:formData.toString()
    });
    toast('✅ Pertanyaan berhasil dikirim!');
    if(statusEl)statusEl.textContent='✅ Terkirim!';
    document.getElementById('ptny-pertanyaan').value='';
    document.getElementById('ptny-nama').value='';
    document.getElementById('ptny-wc').textContent='0/100 kata';
    setTimeout(()=>{if(statusEl)statusEl.textContent='';loadPertanyaanList();},2000);
  }catch(e){
    toast('⚠️ Gagal mengirim. Coba lagi.');
    if(statusEl)statusEl.textContent='❌ Gagal. Coba lagi.';
  }
}
