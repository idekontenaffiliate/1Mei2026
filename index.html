<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Perbauran Gembala · Solo 1–2 Mei 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   THEME SYSTEM — 10 THEMES
═══════════════════════════════════════════ */
:root,
[data-theme="dark"] {
  --bg:#0a0e17;--surface:#111827;--surface2:#1a2235;--border:#1e2d45;
  --accent:#3b82f6;--accent2:#06b6d4;--accent3:#8b5cf6;
  --green:#10b981;--yellow:#f59e0b;--red:#ef4444;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --glow:rgba(59,130,246,.15);--header-bg:#111827;
}
[data-theme="light"] {
  --bg:#f0f4f8;--surface:#fff;--surface2:#e8edf5;--border:#d1dce9;
  --accent:#2563eb;--accent2:#0891b2;--accent3:#7c3aed;
  --green:#059669;--yellow:#d97706;--red:#dc2626;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --glow:rgba(37,99,235,.1);--header-bg:#fff;
}
[data-theme="green"] {
  --bg:#071a0e;--surface:#0d2a18;--surface2:#153d24;--border:#1e5c34;
  --accent:#22c55e;--accent2:#4ade80;--accent3:#86efac;
  --green:#16a34a;--yellow:#ca8a04;--red:#ef4444;
  --text:#dcfce7;--text2:#86efac;--text3:#4ade80;
  --glow:rgba(34,197,94,.15);--header-bg:#0d2a18;
}
[data-theme="blue"] {
  --bg:#030d1a;--surface:#041526;--surface2:#072040;--border:#0a3060;
  --accent:#38bdf8;--accent2:#7dd3fc;--accent3:#93c5fd;
  --green:#10b981;--yellow:#fbbf24;--red:#f87171;
  --text:#e0f2fe;--text2:#93c5fd;--text3:#60a5fa;
  --glow:rgba(56,189,248,.15);--header-bg:#041526;
}
[data-theme="lightgreen"] {
  --bg:#f0fdf4;--surface:#fff;--surface2:#dcfce7;--border:#bbf7d0;
  --accent:#16a34a;--accent2:#059669;--accent3:#0d9488;
  --green:#15803d;--yellow:#ca8a04;--red:#dc2626;
  --text:#14532d;--text2:#166534;--text3:#4ade80;
  --glow:rgba(22,163,74,.1);--header-bg:#fff;
}
[data-theme="lightred"] {
  --bg:#fff1f2;--surface:#fff;--surface2:#ffe4e6;--border:#fecdd3;
  --accent:#e11d48;--accent2:#f43f5e;--accent3:#fb7185;
  --green:#059669;--yellow:#d97706;--red:#be123c;
  --text:#4c0519;--text2:#881337;--text3:#f43f5e;
  --glow:rgba(225,29,72,.1);--header-bg:#fff;
}
[data-theme="darkwhite"] {
  --bg:#1a1a2e;--surface:#16213e;--surface2:#0f3460;--border:#334155;
  --accent:#e2e8f0;--accent2:#cbd5e1;--accent3:#94a3b8;
  --green:#10b981;--yellow:#fbbf24;--red:#f87171;
  --text:#f8fafc;--text2:#e2e8f0;--text3:#94a3b8;
  --glow:rgba(226,232,240,.1);--header-bg:#16213e;
}
[data-theme="darkyellow"] {
  --bg:#0c0a00;--surface:#1a1500;--surface2:#2a2200;--border:#4a3a00;
  --accent:#fbbf24;--accent2:#f59e0b;--accent3:#fcd34d;
  --green:#10b981;--yellow:#f59e0b;--red:#ef4444;
  --text:#fef9c3;--text2:#fde68a;--text3:#fbbf24;
  --glow:rgba(251,191,36,.15);--header-bg:#1a1500;
}
[data-theme="purple"] {
  --bg:#0d0a1a;--surface:#160f2e;--surface2:#1e1040;--border:#3b1f6e;
  --accent:#a855f7;--accent2:#c084fc;--accent3:#e879f9;
  --green:#10b981;--yellow:#fbbf24;--red:#ef4444;
  --text:#f3e8ff;--text2:#d8b4fe;--text3:#a855f7;
  --glow:rgba(168,85,247,.15);--header-bg:#160f2e;
}
[data-theme="darkred"] {
  --bg:#0d0000;--surface:#1a0000;--surface2:#2a0000;--border:#5c1010;
  --accent:#f87171;--accent2:#fca5a5;--accent3:#fda4af;
  --green:#10b981;--yellow:#fbbf24;--red:#b91c1c;
  --text:#fee2e2;--text2:#fca5a5;--text3:#f87171;
  --glow:rgba(248,113,113,.15);--header-bg:#1a0000;
}

/* ═══════════════════════════════════════════
   BASE RESET
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased}

/* ═══════════════════════════════════════════
   VIDEO LOGIN SCREEN
═══════════════════════════════════════════ */
#login-screen{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  z-index:9000;overflow:hidden;
}
#login-video-bg{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:cover;z-index:0;
}
.login-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.62);backdrop-filter:blur(2px);z-index:1;
}
.login-card{
  position:relative;z-index:2;
  background:rgba(10,14,23,.88);
  border:1px solid rgba(59,130,246,.3);
  border-radius:22px;
  padding:2.4rem 2rem 2rem;
  width:92%;max-width:360px;
  box-shadow:0 0 0 1px rgba(59,130,246,.1),0 32px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05);
  backdrop-filter:blur(16px);
}
.login-swipe-hint{
  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.5);font-size:.78rem;letter-spacing:1px;
  z-index:2;animation:float 2s ease-in-out infinite;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.swipe-arrow{font-size:1.4rem;animation:bounceUp 1.5s ease-in-out infinite;}
@keyframes float{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes bounceUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.login-logo{text-align:center;margin-bottom:1.6rem;}
.login-icon{font-size:2.6rem;display:block;margin-bottom:.4rem;}
.login-logo h2{font-family:'Cormorant Garamond',serif;font-size:1.35rem;color:var(--accent);font-weight:700;}
.login-logo p{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:2px;letter-spacing:.5px;}

.lf{margin-bottom:.9rem;}
.lf label{display:block;font-size:.7rem;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.lf input{
  width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:11px 14px;color:#fff;font-family:'Outfit',sans-serif;font-size:.93rem;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.lf input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.2);}
.lf input::placeholder{color:rgba(255,255,255,.2);}

.login-btn{
  width:100%;padding:13px;margin-top:.3rem;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  color:#fff;border:none;border-radius:10px;font-family:'Outfit',sans-serif;
  font-weight:700;font-size:1rem;cursor:pointer;letter-spacing:.5px;
  transition:opacity .2s,transform .1s;
}
.login-btn:active{transform:scale(.98);opacity:.9;}
.login-footer{text-align:center;margin-top:1.2rem;font-size:.72rem;color:rgba(255,255,255,.25);}

/* ═══════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════ */
#main-app{display:none;flex-direction:column;height:100vh;}

/* HEADER */
header{
  background:var(--header-bg);border-bottom:1px solid var(--border);
  padding:0 14px;height:54px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;z-index:100;
  box-shadow:0 1px 0 var(--border);
}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-title{font-size:.88rem;font-weight:700;color:var(--text);}
.hdr-sub{font-size:.68rem;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.hdr-right{display:flex;gap:5px;align-items:center;}
.icon-btn{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.9rem;
  transition:background .2s;flex-shrink:0;
}
.icon-btn:hover{background:var(--border);}
.icon-btn.logout{color:var(--red);border-color:rgba(239,68,68,.3);}

/* CLOCK */
#live-clock{
  font-family:'JetBrains Mono',monospace;font-size:.72rem;
  color:var(--accent2);background:var(--surface2);
  padding:4px 9px;border-radius:8px;border:1px solid var(--border);
  letter-spacing:.5px;white-space:nowrap;
}

/* THEME PICKER */
#theme-panel{
  display:none;position:fixed;top:58px;right:10px;z-index:500;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:12px;box-shadow:0 8px 32px rgba(0,0,0,.4);
  display:none;flex-wrap:wrap;gap:8px;width:230px;
}
.theme-chip{
  display:flex;align-items:center;gap:6px;padding:6px 10px;
  border-radius:8px;border:1px solid var(--border);background:var(--surface2);
  cursor:pointer;font-size:.75rem;font-weight:500;color:var(--text2);
  transition:all .2s;white-space:nowrap;
}
.theme-chip:hover,.theme-chip.active{border-color:var(--accent);color:var(--accent);background:var(--glow);}
.theme-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* NAV */
nav{
  display:flex;overflow-x:auto;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
  scrollbar-width:none;padding:0 6px;gap:2px;
}
nav::-webkit-scrollbar{display:none;}
nav button{
  padding:9px 13px;border:none;background:none;cursor:pointer;
  white-space:nowrap;font-family:'Outfit',sans-serif;font-weight:500;
  font-size:.8rem;color:var(--text3);border-bottom:2px solid transparent;
  transition:all .2s;letter-spacing:.2px;flex-shrink:0;
}
nav button.active{color:var(--accent);border-bottom-color:var(--accent);}
nav button:hover:not(.active){color:var(--text2);}

/* CONTENT */
#app-content-wrapper{flex:1;overflow-y:auto;background:var(--bg);scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.content-area{padding:14px;min-height:100%;}

/* ═══════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════ */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.dash-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:16px;box-shadow:0 4px 20px rgba(0,0,0,.15);
  position:relative;overflow:hidden;
}
.dash-card::before{
  content:'';position:absolute;top:-20px;right:-20px;
  width:80px;height:80px;border-radius:50%;
  background:var(--glow);
}
.dash-card-icon{font-size:1.6rem;margin-bottom:6px;display:block;}
.dash-card-val{font-size:1.8rem;font-weight:800;color:var(--accent);font-family:'Cormorant Garamond',serif;}
.dash-card-label{font-size:.72rem;color:var(--text3);margin-top:2px;}
.dash-full{grid-column:1/-1;}
.clock-card{
  background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);
  border:1px solid var(--border);border-radius:14px;padding:18px 16px;
  text-align:center;position:relative;overflow:hidden;
}
.clock-big{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:600;color:var(--accent);letter-spacing:2px;}
.clock-date{font-size:.8rem;color:var(--text2);margin-top:4px;}

/* PIE CHART */
.pie-wrap{position:relative;width:140px;height:140px;margin:0 auto;}
.pie-wrap svg{width:100%;height:100%;}
.pie-legend{display:flex;flex-direction:column;gap:6px;margin-top:10px;}
.pie-leg-item{display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--text2);}
.pie-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* ═══════════════════════════════════════════
   CARDS & LISTS
═══════════════════════════════════════════ */
.modern-list{display:flex;flex-direction:column;gap:9px;}
.modern-item{
  display:flex;align-items:center;background:var(--surface);
  padding:12px;border-radius:13px;border:1px solid var(--border);
  cursor:pointer;transition:transform .15s,border-color .2s;gap:12px;
}
.modern-item:hover{border-color:var(--accent);transform:translateY(-1px);}
.modern-item:active{transform:scale(.99);}
.modern-item-img{width:54px;height:54px;border-radius:11px;object-fit:cover;flex-shrink:0;}
.modern-item-content{flex:1;overflow:hidden;}
.modern-item-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:600;padding:2px 7px;border-radius:5px;margin-bottom:3px;}
.modern-item-title{font-weight:700;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.modern-item-desc{font-size:.75rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.modern-item-arrow{color:var(--text3);font-size:1rem;flex-shrink:0;}

/* JEMAAT */
.jemaat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.jemaat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:13px;
  padding:14px 10px;text-align:center;cursor:pointer;
  transition:transform .15s,border-color .2s;
}
.jemaat-card:hover{border-color:var(--accent2);transform:translateY(-2px);}
.jemaat-avatar{width:68px;height:68px;border-radius:50%;object-fit:cover;margin:0 auto 9px;border:2px solid var(--border);display:block;}
.jemaat-name{font-weight:700;font-size:.83rem;color:var(--text);}
.jemaat-role{font-size:.7rem;color:var(--text3);margin-top:2px;}

/* KIDUNG */
.kidung-card{
  background:var(--surface);border:1px solid var(--border);border-radius:13px;
  padding:12px 14px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  transition:transform .15s,border-color .2s;
}
.kidung-card:hover{transform:translateX(3px);border-color:var(--accent);}
.kidung-card.mark-kuning{border-left:4px solid var(--yellow);}
.kidung-card.mark-biru{border-left:4px solid var(--accent);}
.kidung-card.mark-merah{border-left:4px solid var(--red);}
.kidung-number{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:5px;flex-shrink:0;}
.kidung-title{font-weight:600;font-size:.88rem;flex:1;color:var(--text);}
.kidung-icons{display:flex;gap:3px;flex-shrink:0;color:var(--text3);font-size:.82rem;}

/* FILTER GROUP */
.filter-group{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
.k-input{
  padding:8px 11px;border-radius:9px;border:1px solid var(--border);
  flex:1;min-width:110px;background:var(--surface);color:var(--text);
  font-family:'Outfit',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s;
}
.k-input:focus{border-color:var(--accent);}
.k-input option{background:var(--surface);}

/* ═══════════════════════════════════════════
   MODAL — FULL SCREEN SHEET
═══════════════════════════════════════════ */
.modal-overlay{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:800;overflow-y:auto;
}
.modal-panel{
  background:var(--surface);border-top:1px solid var(--border);
  min-height:100vh;padding:16px 14px 90px;
}
.modal-close-bar{
  position:fixed;bottom:0;left:0;width:100%;padding:12px 14px;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;gap:7px;z-index:810;
}
.close-btn-main{
  flex:1;padding:11px;background:var(--surface2);color:var(--text);
  border:1px solid var(--border);border-radius:10px;font-family:'Outfit',sans-serif;
  font-weight:600;font-size:.88rem;cursor:pointer;transition:background .2s;
}
.close-btn-main:hover{background:var(--border);}

/* TABS */
.tab-group{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.tab-group::-webkit-scrollbar{display:none;}
.tab-btn{
  padding:7px 12px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);
  border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.78rem;
  font-weight:500;flex-shrink:0;transition:all .2s;
}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.kidung-tab{display:none;}
.active-tab{display:block;}

/* ACTION ROW */
.action-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.btn-action{
  padding:7px 11px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-family:'Outfit',sans-serif;
  font-size:.78rem;font-weight:500;cursor:pointer;transition:all .15s;
}
.btn-action:hover{background:var(--border);}
.btn-action.accent{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-action.green{background:var(--green);color:#fff;border-color:var(--green);}
.btn-action.red{background:var(--red);color:#fff;border-color:var(--red);}

/* LYRIC BOX */
.lyric-box{
  background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;
  max-height:55vh;overflow-y:auto;
}
.scalable-text{
  white-space:pre-wrap;line-height:1.75;transition:font-size .2s;
  word-wrap:break-word;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);
}
.key-line{color:#60a5fa;font-weight:600;}
.note-line{color:#86efac;}

/* MUSIC PLAYER */
.music-player{background:var(--surface2);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:12px;}
.music-player audio{width:100%;height:38px;border-radius:8px;margin-bottom:9px;}
.transpose-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.transpose-label{font-size:.75rem;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.transpose-display{font-family:'JetBrains Mono',monospace;font-size:.95rem;font-weight:700;color:var(--accent);min-width:30px;text-align:center;}

/* ═══════════════════════════════════════════
   IMAGE VIEWER (FULLSCREEN)
═══════════════════════════════════════════ */
#img-viewer{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:#000;z-index:2000;flex-direction:column;
}
.iv-top{
  position:absolute;top:0;left:0;right:0;padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);z-index:10;
}
.iv-title{color:#fff;font-size:.88rem;font-weight:700;}
.iv-counter{color:rgba(255,255,255,.55);font-family:'JetBrains Mono',monospace;font-size:.78rem;}
.iv-close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.iv-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
#iv-main-img{max-width:100%;max-height:100%;object-fit:contain;transition:opacity .3s;}
.iv-nav-btn{
  position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.15);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;transition:background .2s;
}
.iv-nav-btn:hover{background:rgba(255,255,255,.3);}
#iv-prev{left:8px;}#iv-next{right:8px;}
.iv-toolbar{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);z-index:10;
  padding:12px 14px 20px;
}
.iv-progress-bar{width:100%;height:3px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;margin-bottom:10px;}
.iv-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}
.iv-bottom-btns{display:flex;justify-content:center;gap:8px;margin-bottom:8px;}
.iv-btn{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.4);color:#fff;font-size:.75rem;cursor:pointer;font-family:'Outfit',sans-serif;}
.iv-dots{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;}
.iv-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);transition:background .2s,transform .2s;}
.iv-dot.active{background:#fff;transform:scale(1.4);}

/* ═══════════════════════════════════════════
   PDF VIEWER
═══════════════════════════════════════════ */
.pdf-item{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px;cursor:pointer;display:flex;align-items:center;gap:13px;transition:transform .15s,border-color .2s;margin-bottom:9px;}
.pdf-item:hover{border-color:var(--red);transform:translateX(3px);}
.pdf-icon{width:46px;height:46px;background:rgba(239,68,68,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.pdf-fullscreen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#111;z-index:2000;flex-direction:column;}
.pdf-toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pdf-toolbar-title{font-weight:600;font-size:.88rem;}
#pdf-frame{flex:1;width:100%;border:none;}

/* ═══════════════════════════════════════════
   SPINWHEEL
═══════════════════════════════════════════ */
.spinwheel-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:6px 0;}
.spin-canvas-wrap{position:relative;width:270px;height:270px;}
#spin-canvas{border-radius:50%;box-shadow:0 0 0 4px var(--border),0 0 40px var(--glow);}
.spin-pointer{position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:1.7rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));}
.spin-result-box{background:var(--surface);border:1px solid var(--accent);border-radius:13px;padding:12px 18px;text-align:center;min-width:230px;box-shadow:0 0 20px var(--glow);}
.spin-result-label{font-size:.72rem;color:var(--text3);margin-bottom:3px;}
.spin-result-name{font-weight:700;font-size:1.05rem;color:var(--accent);}
.spin-participants{width:100%;max-width:330px;max-height:180px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:13px;}
.spin-participant-item{padding:9px 13px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);font-size:.83rem;}
.spin-participant-item:last-child{border-bottom:none;}
.spin-participant-item.eliminated{opacity:.3;text-decoration:line-through;}
.spin-nilai{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--accent2);background:rgba(6,182,212,.1);padding:2px 6px;border-radius:5px;}

/* ═══════════════════════════════════════════
   QUIZ
═══════════════════════════════════════════ */
.quiz-wrap{max-width:600px;margin:0 auto;}
.quiz-question-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:18px;margin-bottom:12px;}
.quiz-q-number{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text3);margin-bottom:5px;}
.quiz-q-text{font-weight:600;font-size:.97rem;margin-bottom:14px;color:var(--text);}
.quiz-options{display:flex;flex-direction:column;gap:7px;}
.quiz-option{padding:10px 13px;border:1px solid var(--border);border-radius:9px;background:var(--surface2);cursor:pointer;font-size:.86rem;transition:all .2s;color:var(--text);}
.quiz-option:hover{border-color:var(--accent);background:rgba(59,130,246,.1);}
.quiz-option.selected{border-color:var(--accent);background:rgba(59,130,246,.2);color:var(--accent);font-weight:600;}
.quiz-option.correct{border-color:var(--green);background:rgba(16,185,129,.2);color:var(--green);font-weight:600;}
.quiz-option.wrong{border-color:var(--red);background:rgba(239,68,68,.15);color:var(--red);}
.quiz-text-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.86rem;outline:none;resize:none;transition:border-color .2s;}
.quiz-text-input:focus{border-color:var(--accent);}
.quiz-submit-btn{width:100%;padding:13px;margin-top:10px;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;}
.score-circle{width:110px;height:110px;border-radius:50%;border:4px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 0 30px var(--glow);}
.score-number{font-size:1.9rem;font-weight:800;color:var(--accent);}
.score-label{font-size:.7rem;color:var(--text3);}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.section-title{font-weight:700;font-size:.97rem;color:var(--text);}
.section-count{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text3);background:var(--surface2);padding:3px 8px;border-radius:18px;}
.empty-state{text-align:center;padding:36px 18px;color:var(--text3);}
.empty-state .icon{font-size:2.8rem;margin-bottom:8px;}
.empty-state p{font-size:.88rem;}
.tag{display:inline-block;font-size:.68rem;font-weight:600;padding:2px 7px;border-radius:5px;background:rgba(59,130,246,.15);color:var(--accent);}
.tag.green{background:rgba(16,185,129,.15);color:var(--green);}
.tag.yellow{background:rgba(245,158,11,.15);color:var(--yellow);}
.tag.red{background:rgba(239,68,68,.15);color:var(--red);}
.tag.purple{background:rgba(139,92,246,.15);color:var(--accent3);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px;}
.info-item{background:var(--surface2);border-radius:9px;padding:9px 11px;border:1px solid var(--border);}
.info-item-label{font-size:.68rem;color:var(--text3);margin-bottom:2px;}
.info-item-value{font-size:.85rem;font-weight:600;color:var(--text);}
.loading-shimmer{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px;height:65px;margin-bottom:9px;}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:9px 18px;font-size:.83rem;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.3);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* Swipe hint overlay at login */

  display:none;position:fixed;top:0;left:0;width:100%;height:100%;

<script>
// ══════════════════════════════════════════════════
// CONFIG — URLs
// ══════════════════════════════════════════════════
const URLS = {
  Awal:"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6N6cAL1OoX2hCBXmL3MAmQcgxMTglDN2LtCseQdOC8zkWdDwRDCRDjKnI9NE3vMGSaXgWesgcdvGV/pub?output=csv",
  Kidung:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSasN_qIm_FKLGkh4t-clscJXdiuZJENUa0JgC3_-lwpmggsQ_xqF8DH_m-3wxCFU99j1WIj0n8nNhy/pub?output=csv",
  Acara:"https://docs.google.com/spreadsheets/d/e/2PACX-1vRBBAJPP9Cn1cyq2cBpFGpv1rJSeSQedR7ctR9mrO67wGNbVTbEcCaXCp4ZVkAOGmCKJ9yxo1Q7Yox3/pub?output=csv",
  Kegiatan:"https://docs.google.com/spreadsheets/d/e/2PACX-1vR2W99PcE9P3GLHRXWFSO_viwtukTnH8ePHSKKr_KPgtMOhOEOLRkSHc6vMdpyay8GLEop3CB0R2gtS/pub?output=csv",
  Jemaat:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSI_5dVogArMM6hfMUrTpsXCVj-7rGmD2aqklSRufNHUHN_JzOYOgZ2Qz1TZszE7kH9XTaSa1kOv6N2/pub?output=csv",
  Background:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSqw1t-t4BXwVMovpnVFKMRYk45wmCXxt9u0ldhMnmyqayQTIWR5mapKb1q77U-qvuWtWLombT3N7kS/pub?output=csv",
  Spinwheel:"https://docs.google.com/spreadsheets/d/e/2PACX-1vRO5tcxprDAy-jsejv8BCrx3NzRPOMPKtGruChseUs5t2eCJ9UaRKR3OpzgGWgCaDMHfTxc46XB5NZM/pub?output=csv",
  Quiz:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSYk4ch8PCybjRiSn38uqAM_qjqk0IviibdUrdTfOX2NufYsDUcf3oypvh9theKKYrYFGsXxqzy7Lto/pub?output=csv"
};

// Hardcoded background video URL (Google Drive direct)
// Ganti VIDEO_FILE_ID dengan ID file di Google Drive Anda
const LOGIN_VIDEO_URL = "https://drive.google.com/file/d/GANTI_VIDEO_ID_DISINI/preview";

// Apps Script URL
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz1AjcNw9mmNHL7VgzIUMAM-IaUDI1fIfbdTkyzyUl1zH-jFD7aAlKEVxpy1Eq3vCxQ/exec";

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let currentUser=null,db={},currentFontSize=13,currentTranspose=0;
let ivImages=[],ivIndex=0,ivScale=1;
let spinParticipants=[],spinAngle=0,spinIsSpinning=false,spinWinner=null;
let quizAnswers={},quizSubmitted=false;
const CHROMATIC=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const MC=['#3b82f6','#06b6d4','#8b5cf6','#ec4899','#10b981','#f59e0b','#ef4444','#6366f1','#f97316','#14b8a6'];

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
Papa.parse(URLS.Awal,{download:true,header:true,complete:r=>{db.Awal=r.data;}});

// Set video background
(function(){
  const v=document.getElementById('login-video-bg');
  // For Google Drive videos, use embed approach
  if(LOGIN_VIDEO_URL.includes('GANTI')){
    // No video configured, show gradient
    v.style.display='none';
    document.getElementById('login-screen').style.background='linear-gradient(135deg,#0a0e17 0%,#1a0a2e 50%,#0a1a0e 100%)';
  } else {
    // Replace video with iframe for Drive
    const fr=document.createElement('iframe');
    fr.src=LOGIN_VIDEO_URL;
    fr.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;border:none;object-fit:cover;pointer-events:none;z-index:0;';
    fr.allow='autoplay';
    v.parentNode.insertBefore(fr,v);
    v.style.display='none';
  }
})();

// Login swipe gesture
(function(){
  let sy=0,sh=document.getElementById('login-screen');
  sh.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;});
  sh.addEventListener('touchend',e=>{
    if(sy-e.changedTouches[0].clientY>60) toast('Masukkan username & password lalu tekan Masuk');
  });
})();

// Clock
setInterval(()=>{
  const n=new Date();
  const pad=x=>String(x).padStart(2,'0');
  const d=`${pad(n.getDate())}-${pad(n.getMonth()+1)}-${String(n.getFullYear()).slice(-2)} ${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  const el=document.getElementById('live-clock');
  if(el)el.textContent=d;
},1000);

// ══════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════
function fmtImg(url){
  if(!url)return'';
  const m=url.match(/[-\w]{25,}/);
  return m?`https://lh3.googleusercontent.com/d/${m[0]}`:url;
}
function fmtPrev(url){
  if(!url)return'';
  const m=url.match(/[-\w]{25,}/);
  return m?`https://drive.google.com/file/d/${m[0]}/preview`:url;
}
function fmtDl(url){
  if(!url)return'#';
  const m=url.match(/[-\w]{25,}/);
  return m?`https://drive.google.com/uc?export=download&id=${m[0]}`:url;
}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2600);
}

// ══════════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════════
let themePanelOpen=false;
function toggleThemePanel(){
  const p=document.getElementById('theme-panel');
  themePanelOpen=!themePanelOpen;
  p.style.display=themePanelOpen?'flex':'none';
}
function setTheme(t,chip){
  document.body.setAttribute('data-theme',t);
  document.querySelectorAll('.theme-chip').forEach(c=>c.classList.remove('active'));
  if(chip)chip.classList.add('active');
  localStorage.setItem('pg_theme',t);
  themePanelOpen=false;
  document.getElementById('theme-panel').style.display='none';
}
// Restore theme
(function(){
  const t=localStorage.getItem('pg_theme');
  if(t){
    document.body.setAttribute('data-theme',t);
    setTimeout(()=>{
      const chip=document.querySelector(`.theme-chip[data-t="${t}"]`);
      if(chip){document.querySelectorAll('.theme-chip').forEach(c=>c.classList.remove('active'));chip.classList.add('active');}
    },100);
  }
})();

// ══════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════
function attemptLogin(){
  if(!db.Awal||!db.Awal.length)return toast('⏳ Memuat data, harap tunggu...');
  const u=document.getElementById('user').value.trim();
  const p=document.getElementById('pass').value;
  if(!u||!p)return toast('⚠️ Isi username dan password');
  const found=db.Awal.find(r=>r.username===u&&r.password===p);
  if(!found)return toast('❌ Username atau Password salah!');
  currentUser=found;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='flex';
  document.getElementById('header-title').textContent=`Halo, ${found.username}`;
  document.getElementById('header-sub').textContent=found.tipe||'user';
  Papa.parse(URLS.Background,{download:true,header:true,complete:r=>{db.Background=r.data;}});
  setupNavigation();
  logHistory('login','masuk aplikasi');
}

function doLogout(){
  if(!confirm('Yakin ingin keluar?'))return;
  logHistory('logout','keluar aplikasi');
  currentUser=null;db={};
  Papa.parse(URLS.Awal,{download:true,header:true,complete:r=>{db.Awal=r.data;}});
  document.getElementById('main-app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('main-nav').innerHTML='';
  document.getElementById('user').value='';
  document.getElementById('pass').value='';
}

function setupNavigation(){
  const nav=document.getElementById('main-nav');
  nav.innerHTML='';
  const menus=(currentUser.tipe||'').split(',').map(s=>s.trim()).filter(Boolean);
  // Always prepend Dashboard
  const allMenus=['Dashboard',...menus.filter(m=>m!=='Dashboard')];
  allMenus.forEach((menu,idx)=>{
    const btn=document.createElement('button');
    btn.textContent=menuLabel(menu);
    btn.onclick=(e)=>{loadModule(menu,e.currentTarget);logHistory('menu',menu);};
    nav.appendChild(btn);
    if(idx===0)setTimeout(()=>btn.click(),100);
  });
}

function menuLabel(n){
  const icons={Dashboard:'📊',Kidung:'🎵',Acara:'📅',Kegiatan:'⚡',Jemaat:'👥',Spinwheel:'🎰',Quiz:'❓',Admin:'🔑'};
  return(icons[n.trim()]||'•')+' '+n.trim();
}

function loadModule(name,el){
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  const content=document.getElementById('app-content');
  content.innerHTML=`<div class="loading-shimmer"></div><div class="loading-shimmer" style="height:45px;opacity:.6;"></div><div class="loading-shimmer" style="height:45px;opacity:.3;"></div>`;
  const nm=name.toLowerCase().trim();
  if(nm==='dashboard'){dispatchRender(name);return;}
  if(!db[name]){
    const url=URLS[name];
    if(!url){return dispatchRender(name);}
    Papa.parse(url,{download:true,header:true,complete:res=>{db[name]=res.data;dispatchRender(name);}});
  } else {dispatchRender(name);}
}

function dispatchRender(name){
  const n=name.toLowerCase().trim();
  if(n==='dashboard')renderDashboard();
  else if(n==='kidung')renderKidung();
  else if(n==='acara')renderAcara();
  else if(n==='kegiatan')renderKegiatan();
  else if(n==='jemaat')renderJemaat();
  else if(n==='spinwheel')renderSpinwheel();
  else if(n==='quiz')renderQuiz();
  else if(n==='admin')renderAdmin();
  else document.getElementById('app-content').innerHTML=`<div class="empty-state"><div class="icon">🔧</div><p>Modul "${name}" siap.</p></div>`;
}

function buildPie(segments){
  const total=segments.reduce((s,x)=>s+x.val,0);
  if(total===0)return'<div style="color:var(--text3);font-size:.8rem;text-align:center;padding:20px;">No data</div>';
  let paths='',offset=0;
  const r=60,cx=70,cy=70;
  segments.forEach(seg=>{
    const frac=seg.val/total;
    const angle=frac*2*Math.PI;
    const x1=cx+r*Math.sin(offset);const y1=cy-r*Math.cos(offset);
    offset+=angle;
    const x2=cx+r*Math.sin(offset);const y2=cy-r*Math.cos(offset);
    const large=frac>.5?1:0;
    paths+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${seg.color}" opacity=".9"/>`;
  });
  return`<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">${paths}<circle cx="70" cy="70" r="25" fill="var(--surface)"/><text x="70" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text)">${total}</text></svg>`;
}

function openImgViewer(images,startIndex,title){
  ivImages=Array.isArray(images)?images:[images];
  ivIndex=Math.max(0,Math.min(ivImages.length-1,startIndex||0));
  ivScale=1;
  document.getElementById('iv-title').textContent=title||'Foto';
  document.getElementById('img-viewer').style.display='flex';
  const dots=document.getElementById('iv-dots');
  dots.innerHTML=ivImages.map((_,i)=>`<div class="iv-dot${i===0?' active':''}" id="ivd-${i}"></div>`).join('');
  ivRender();
}
function ivRender(){
  const img=document.getElementById('iv-main-img');
  img.style.opacity=0;img.style.transform=`scale(${ivScale})`;
  setTimeout(()=>{img.src=ivImages[ivIndex];img.style.opacity=1;},150);
  document.getElementById('iv-counter').textContent=`${ivIndex+1}/${ivImages.length}`;
  const pct=ivImages.length>1?((ivIndex+1)/ivImages.length)*100:100;
  document.getElementById('iv-progress').style.width=pct+'%';
  document.querySelectorAll('.iv-dot').forEach((d,i)=>d.classList.toggle('active',i===ivIndex));
  document.getElementById('iv-prev').style.display=ivImages.length>1&&ivIndex>0?'flex':'none';
  document.getElementById('iv-next').style.display=ivImages.length>1&&ivIndex<ivImages.length-1?'flex':'none';
}
function ivNav(dir){ivIndex=Math.max(0,Math.min(ivImages.length-1,ivIndex+dir));ivScale=1;ivRender();}
function ivZoom(dir){ivScale=Math.max(.5,Math.min(3,ivScale+dir*.3));document.getElementById('iv-main-img').style.transform=`scale(${ivScale})`;}
function ivZoomReset(){ivScale=1;document.getElementById('iv-main-img').style.transform='scale(1)';}
function closeImgViewer(){document.getElementById('img-viewer').style.display='none';ivImages=[];ivIndex=0;ivScale=1;}
// Swipe for image viewer
(function(){
  let sx=0;
  const v=document.getElementById('img-viewer');
  v.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;});
  v.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>50)ivNav(dx<0?1:-1);});
})();

function adjustFont(d){

  document.querySelectorAll('.scalable-text').forEach(el=>el.style.fontSize=currentFontSize+'px');

function copyText(id){
  const el=document.getElementById(id);
  if(!el)return;
  navigator.clipboard.writeText(el.innerText).then(()=>toast('✅ Teks berhasil disalin!'));
}
function transposeChordLine(line,steps){
  if(steps===0)return line;
  return line.replace(/[A-G][#b]?/g,m=>{
    const note=m.replace('b','#');
    const idx=CHROMATIC.indexOf(note.toUpperCase());
    if(idx===-1)return m;
    return CHROMATIC[(idx+steps+12)%12];
  });
}
function updateTransposeDisplay(){
  document.querySelectorAll('.transpose-display').forEach(el=>{el.textContent=currentTranspose>=0?`+${currentTranspose}`:String(currentTranspose);});
  document.querySelectorAll('.key-line').forEach(el=>{
    const orig=el.getAttribute('data-orig')||el.textContent;
    el.setAttribute('data-orig',orig);
    el.textContent=transposeChordLine(orig,currentTranspose);
  });
}
function changeTranspose(d){currentTranspose+=d;if(currentTranspose>6)currentTranspose=-6;if(currentTranspose<-6)currentTranspose=6;updateTransposeDisplay();}
function resetTranspose(){currentTranspose=0;updateTransposeDisplay();}

function filterJemaat(){
  const search=(document.getElementById('j-search').value||'').toLowerCase();
  const gender=document.getElementById('j-gender').value;
  const usiaOp=document.getElementById('j-usia-op').value;
  const usiaVal=parseInt(document.getElementById('j-usia-val').value)||0;
  const ibadah=document.getElementById('j-ibadah').value;
  const aj=document.getElementById('j-aj').value;
  const grid=document.getElementById('jemaat-grid');
  if(!grid)return;
  grid.innerHTML='';
  let count=0,pria=0,wanita=0,ajCount=0;
  (db.Jemaat||[]).forEach((j,idx)=>{
    const nama=(j['Nama Lengkap']||j['Nama Panggilan']||'').toLowerCase();
    const ibadahJ=j['ibadah yang diikuti']||'';
    const ajJ=j['antar jemput']||j['Antar Jemput']||'';
    const usiaJ=parseInt(j.Usia)||0;
    if(search&&!nama.includes(search))return;
    if(gender&&j.Gender!==gender)return;
    if(usiaVal>0&&usiaOp){if(usiaOp==='lt'&&!(usiaJ<usiaVal))return;if(usiaOp==='gt'&&!(usiaJ>usiaVal))return;if(usiaOp==='eq'&&!(usiaJ===usiaVal))return;}
    if(ibadah&&ibadahJ!==ibadah)return;
    if(aj==='__any__'&&!ajJ.trim())return;
    if(aj&&aj!=='__any__'&&ajJ!==aj)return;
    count++;
    if(j.Gender==='Pria')pria++;
    if(j.Gender==='Wanita')wanita++;
    if(ajJ.trim())ajCount++;
    const foto=fmtImg(j['Link Foto'])||`https://api.dicebear.com/7.x/avataaars/svg?seed=${j.Gender==='Pria'?'m':'f'}${idx}`;

    card.onclick=()=>openJemaatDetail(j,foto,idx);
    grid.appendChild(card);

  // Update stat numbers
  const tn=document.getElementById('jemaat-total-num');if(tn)tn.textContent=count;
  const pn=document.getElementById('jemaat-pria-num');if(pn)pn.textContent=pria;
  const wn=document.getElementById('jemaat-wanita-num');if(wn)wn.textContent=wanita;
  const an=document.getElementById('jemaat-aj-num');if(an)an.textContent=ajCount;
  if(!count)grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1;"><div class="icon">👥</div><p>Tidak ada jemaat</p></div>`;
}

function renderSpinwheel(){
  const content=document.getElementById('app-content');
  const rawData=db.Spinwheel||[];
  if(!rawData.length){
    content.innerHTML=`<div class="empty-state"><div class="icon">🎰</div><p>Data Spinwheel belum tersedia.<br>Pastikan URL Spinwheel sudah diisi di URLS.</p></div>`;
    return;
  }
  spinParticipants=rawData.filter(r=>(r.aktif||r.Aktif||'y').toLowerCase()!=='n').map(r=>({
    nama:r.nama||r.Nama||'-',nilai:r.nilai||r.Nilai||'',eliminated:false
  }));
  content.innerHTML=`
    <div class="spinwheel-wrap">
      <div class="spin-canvas-wrap">
        <div class="spin-pointer">▼</div>
        <canvas id="spin-canvas" width="270" height="270"></canvas>
      </div>
      <div class="spin-result-box">
        <div class="spin-result-label">Hasil Putaran</div>
        <div class="spin-result-name" id="spin-result-name">—</div>
      </div>
      <div class="action-row">
        <button class="btn-action accent" onclick="startSpin()" id="spin-btn" style="flex:1;padding:12px;font-size:.95rem;">🎰 Putar!</button>
        <button class="btn-action red" onclick="eliminateWinner()" id="elim-btn" style="display:none;">✕ Hapus</button>
        <button class="btn-action green" onclick="keepWinner()" id="keep-btn" style="display:none;">✓ Lanjut</button>
      </div>
      <div class="section-header" style="width:100%;max-width:330px;">
        <span class="section-title">Peserta</span>
        <span class="section-count" id="spin-count">${spinParticipants.length} aktif</span>
      </div>
      <div class="spin-participants" id="spin-participants-list"></div>
    </div>`;
  drawWheel();renderSpinList();
}
function drawWheel(){
  const canvas=document.getElementById('spin-canvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const active=spinParticipants.filter(p=>!p.eliminated);
  const n=active.length;if(n===0){ctx.clearRect(0,0,270,270);return;}
  const cx=135,cy=135,r=130;
  const slice=(2*Math.PI)/n;
  ctx.clearRect(0,0,270,270);
  active.forEach((p,i)=>{
    const start=spinAngle+i*slice-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+slice);ctx.closePath();
    ctx.fillStyle=MC[i%MC.length];ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(start+slice/2);
    ctx.fillStyle='#fff';ctx.font=`bold ${n>8?9:12}px Outfit,sans-serif`;ctx.textAlign='right';
    const lbl=p.nama.length>14?p.nama.slice(0,13)+'…':p.nama;
    ctx.fillText(lbl,r-6,4);ctx.restore();
  });
  ctx.beginPath();ctx.arc(cx,cy,18,0,2*Math.PI);
  ctx.fillStyle='var(--bg,#0a0e17)';ctx.fill();
  ctx.strokeStyle='var(--accent,#3b82f6)';ctx.lineWidth=2;ctx.stroke();
}
function startSpin(){
  const active=spinParticipants.filter(p=>!p.eliminated);
  if(active.length===0)return toast('Semua peserta sudah dihapus!');
  if(active.length===1){document.getElementById('spin-result-name').textContent='🏆 '+active[0].nama;toast('🏆 Pemenang: '+active[0].nama);return;}
  if(spinIsSpinning)return;
  spinIsSpinning=true;
  document.getElementById('spin-btn').disabled=true;
  document.getElementById('elim-btn').style.display='none';document.getElementById('keep-btn').style.display='none';
  document.getElementById('spin-result-name').textContent='...';
  const dur=3000+Math.random()*2000;
  const totalSpin=(8+Math.random()*8)*Math.PI*2;
  const startTime=performance.now();const startAngle=spinAngle;
  function animate(now){
    const elapsed=now-startTime;const progress=Math.min(elapsed/dur,1);
    const ease=1-Math.pow(1-progress,3);
    spinAngle=startAngle+totalSpin*ease;drawWheel();
    if(progress<1){requestAnimationFrame(animate);}
    else{
      spinIsSpinning=false;document.getElementById('spin-btn').disabled=false;
      const active2=spinParticipants.filter(p=>!p.eliminated);
      const n=active2.length;const slice=(2*Math.PI)/n;
      const norm=((spinAngle%(2*Math.PI))+(2*Math.PI))%(2*Math.PI);
      const wa=((Math.PI/2-norm)+(4*Math.PI))%(2*Math.PI);
      const wIdx=Math.floor(wa/slice)%n;
      spinWinner=active2[wIdx];
      document.getElementById('spin-result-name').textContent='🎉 '+spinWinner.nama;
      document.getElementById('elim-btn').style.display='inline-flex';
      document.getElementById('keep-btn').style.display='inline-flex';
      logHistory('spinwheel',spinWinner.nama);
    }
  }
  requestAnimationFrame(animate);
}
function eliminateWinner(){
  if(!spinWinner)return;
  const p=spinParticipants.find(x=>x.nama===spinWinner.nama&&!x.eliminated);
  if(p)p.eliminated=true;
  spinWinner=null;
  document.getElementById('elim-btn').style.display='none';document.getElementById('keep-btn').style.display='none';
  document.getElementById('spin-result-name').textContent='—';
  const active=spinParticipants.filter(p=>!p.eliminated);
  const sc=document.getElementById('spin-count');if(sc)sc.textContent=active.length+' aktif';
  renderSpinList();drawWheel();
  if(active.length===1){document.getElementById('spin-result-name').textContent='🏆 '+active[0].nama;toast('🏆 Pemenang: '+active[0].nama);}
}
function keepWinner(){spinWinner=null;document.getElementById('elim-btn').style.display='none';document.getElementById('keep-btn').style.display='none';document.getElementById('spin-result-name').textContent='—';}
function renderSpinList(){
  const list=document.getElementById('spin-participants-list');if(!list)return;
  list.innerHTML=spinParticipants.map(p=>`<div class="spin-participant-item ${p.eliminated?'eliminated':''}"><span>${escHtml(p.nama)}</span>${p.nilai?`<span class="spin-nilai">${escHtml(p.nilai)}</span>`:''}</div>`).join('');
}

function buildQuizQ(q,i){

    <div class="quiz-q-text">${escHtml(q.pertanyaan)}</div>
    ${tipe==='pilihan'?`<div class="quiz-options">${opsi.map((opt,oi)=>`<div class="quiz-option" id="opt-${i}-${oi}" onclick="selectOption(${i},${oi},${opsi.length})"><strong>${String.fromCharCode(65+oi)}.</strong> ${escHtml(opt)}</div>`).join('')}</div>`:`<textarea class="quiz-text-input" id="qt-${i}" rows="3" placeholder="Tulis jawaban Anda..." oninput="quizAnswers[${i}]=this.value"></textarea>`}
  </div>`;
}
function selectOption(qi,oi,total){
  for(let i=0;i<total;i++){const el=document.getElementById(`opt-${qi}-${i}`);if(el)el.classList.remove('selected');}
  const sel=document.getElementById(`opt-${qi}-${oi}`);if(sel)sel.classList.add('selected');
  quizAnswers[qi]=oi;
}
async function submitQuiz(){
  if(quizSubmitted)return;
  const questions=(db.Quiz||[]).filter(r=>r.pertanyaan);
  let correct=0;
  questions.forEach((q,i)=>{
    const tipe=(q.tipe||'teks').toLowerCase();
    if(tipe==='pilihan'){
      const opsi=['a','b','c','d'].map(x=>q[`opsi_${x}`]).filter(Boolean);
      const si=quizAnswers[i];
      if(si!==undefined){
        const st=opsi[si];
        const isOk=q.jawaban_benar&&st&&st.toLowerCase().trim()===q.jawaban_benar.toLowerCase().trim();
        if(isOk){correct++;document.getElementById(`opt-${i}-${si}`)?.classList.add('correct');}
        else{
          document.getElementById(`opt-${i}-${si}`)?.classList.add('wrong');
          const ci=opsi.findIndex(o=>o.toLowerCase().trim()===(q.jawaban_benar||'').toLowerCase().trim());
          if(ci>=0)document.getElementById(`opt-${i}-${ci}`)?.classList.add('correct');
        }
      }
    }
  });
  quizSubmitted=true;
  const pct=questions.length>0?Math.round((correct/questions.length)*100):0;
  if(!APPS_SCRIPT_URL.includes('GANTI')){
    try{await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'quiz',user:currentUser?.username||'anon',waktu:new Date().toISOString(),skor:pct,jawaban:JSON.stringify(quizAnswers)})});}catch(e){}
  }
  const scoreEl=document.createElement('div');
  scoreEl.style.cssText='background:var(--surface);border:1px solid var(--border);border-radius:var(--radius,13px);padding:22px;text-align:center;margin-top:14px;';
  scoreEl.innerHTML=`<div class="score-circle"><div class="score-number">${pct}%</div><div class="score-label">Nilai</div></div>
    <div style="font-weight:700;font-size:1rem;margin-bottom:5px;">${correct} dari ${questions.length} Benar</div>
    <div style="color:var(--text3);font-size:.83rem;">${pct>=80?'🏆 Luar biasa!':pct>=60?'👍 Cukup baik!':'💡 Terus belajar!'}</div>`;
  document.querySelector('.quiz-wrap')?.appendChild(scoreEl);
  scoreEl.scrollIntoView({behavior:'smooth'});
  toast(`✅ Skor: ${pct}%`);
  logHistory('quiz',`skor ${pct}%`);
}

// ══════════════════════════════════════════════════
// ADMIN
// ══════════════════════════════════════════════════
function renderAdmin(){
  const tiypes=(currentUser?.tipe||'');
  if(!tiypes.includes('Admin')&&!tiypes.includes('admin')){
    document.getElementById('app-content').innerHTML=`<div class="empty-state"><div class="icon">🔒</div><p>Akses Ditolak</p></div>`;
    return;
  }
  const content=document.getElementById('app-content');
  content.innerHTML=`
    <div class="section-header"><span class="section-title">Dashboard Admin</span></div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn-action accent" onclick="loadQuizResults()" style="padding:12px;font-size:.88rem;">📊 Lihat Hasil Quiz</button>
      <button class="btn-action" onclick="loadHistoryLog()" style="padding:12px;font-size:.88rem;">📋 Log Aktivitas</button>
    </div>
    <div id="admin-results" style="margin-top:14px;"></div>`;
}
async function loadQuizResults(){
  if(APPS_SCRIPT_URL.includes('GANTI')){document.getElementById('admin-results').innerHTML=`<div class="empty-state"><div class="icon">⚙️</div><p>URL Apps Script belum diisi</p></div>`;return;}
  document.getElementById('admin-results').innerHTML='<div class="loading-shimmer"></div>';
  try{
    const res=await fetch(APPS_SCRIPT_URL+'?type=quiz_results');
    const data=await res.json();
    const el=document.getElementById('admin-results');
    if(!data||!data.length){el.innerHTML=`<div class="empty-state"><div class="icon">📭</div><p>Belum ada jawaban</p></div>`;return;}
    const avg=Math.round(data.reduce((s,r)=>s+(parseFloat(r.skor)||0),0)/data.length);
    el.innerHTML=`<div class="section-header"><span class="section-title">Hasil Quiz</span><span class="section-count">${data.length} · avg ${avg}%</span></div>
      ${data.map(r=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:7px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
          <strong>${escHtml(r.user||'?')}</strong>
          <span style="font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--accent);">${r.skor}%</span>
        </div>
        <div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${r.skor}%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;"></div>
        </div>
        <div style="color:var(--text3);font-size:.7rem;margin-top:4px;font-family:'JetBrains Mono',monospace;">${r.waktu?new Date(r.waktu).toLocaleString('id'):'—'}</div>
      </div>`).join('')}`;
  }catch(e){document.getElementById('admin-results').innerHTML=`<div class="empty-state"><div class="icon">⚠️</div><p>Gagal memuat hasil quiz.</p></div>`;}
}
function loadHistoryLog(){
  const history=JSON.parse(localStorage.getItem('activity_log')||'[]');
  const el=document.getElementById('admin-results');
  if(!history.length){el.innerHTML=`<div class="empty-state"><div class="icon">📋</div><p>Belum ada log</p></div>`;return;}
  el.innerHTML=`<div class="section-header"><span class="section-title">Log</span><span class="section-count">${history.length}</span></div>
    ${history.slice(-60).reverse().map(h=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:5px;font-size:.8rem;">
      <span class="tag">${h.menu||'?'}</span>
      <strong style="margin-left:5px;">${escHtml(h.action||'')}</strong>
      <div style="color:var(--text3);margin-top:2px;font-family:'JetBrains Mono',monospace;font-size:.68rem;">${h.user||'?'} · ${new Date(h.waktu).toLocaleString('id')}</div>
    </div>`).join('')}`;
}

// ══════════════════════════════════════════════════
// HISTORY LOG
// ══════════════════════════════════════════════════
async function logHistory(menu,action){
  let ip='?';
  try{const r=await fetch('https://api.ipify.org?format=json');const d=await r.json();ip=d.ip;}catch(e){}
  const entry={user:currentUser?.username||'anon',menu,action,waktu:new Date().toISOString(),ip};
  const ex=JSON.parse(localStorage.getItem('activity_log')||'[]');
  ex.push(entry);if(ex.length>500)ex.splice(0,ex.length-500);
  localStorage.setItem('activity_log',JSON.stringify(ex));
  if(!APPS_SCRIPT_URL.includes('GANTI')){
    fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'history',...entry})}).catch(()=>{});
  }
}

// Close theme panel on outside click
document.addEventListener('click',e=>{
  if(themePanelOpen&&!e.target.closest('#theme-panel')&&!e.target.closest('#btn-theme')){
    document.getElementById('theme-panel').style.display='none';
    themePanelOpen=false;
  }
});
</script>
