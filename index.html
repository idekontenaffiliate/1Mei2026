<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kidung Pro - Solo 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6;
            --k-bg: #ffffff; --k-fg: #000000; /* Default */
        }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); height: 100%; }
        
        #main-app { display: none; flex-direction: column; height: 100vh; }
        header { background: var(--primary); color: white; padding: 10px; text-align: center; }
        nav { display: flex; overflow-x: auto; background: #fff; border-bottom: 2px solid var(--accent); }
        nav button { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; white-space: nowrap; font-weight: bold; }
        nav button.active { color: var(--accent); border-bottom: 4px solid var(--accent); }

        .content-area { flex: 1; overflow-y: auto; padding: 15px; }

        /* Kidung Styles */
        #kidung-container { 
            background: var(--k-bg); 
            color: var(--k-fg); 
            min-height: 100%; 
            padding: 10px; 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed;
        }
        .kidung-card { 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(5px);
            border: 1px solid #ddd;
            padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer;
            transition: transform 0.2s;
            color: inherit;
        }
        .mark-kuning { border: 4px solid #f1c40f !important; }
        .mark-biru { border: 4px solid #3498db !important; }

        /* Controls */
        .filter-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .input-custom { padding: 8px; border-radius: 5px; border: 1px solid #ccc; flex: 1; min-width: 120px; }
        
        /* Modal & Tabs */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; }
        .modal-content { padding: 20px; color: white; }
        .tab-btn { padding: 10px; border: none; background: #444; color: white; border-radius: 5px; cursor: pointer; }
        .tab-btn.active { background: var(--accent); }
        .kidung-tab { display: none; margin-top: 15px; }
        .active-tab { display: block; }
        
        pre { white-space: pre-wrap; font-family: monospace; padding: 10px; border-radius: 5px; background: rgba(0,0,0,0.2); }
        .btn-action { padding: 8px 12px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #2c3e50; color: white;">
        <h2>Kidung Apps 2026</h2>
        <input type="text" id="user" placeholder="User" style="margin:5px; padding:10px;">
        <input type="password" id="pass" placeholder="Pass" style="margin:5px; padding:10px;">
        <button onclick="attemptLogin()" style="padding:10px 20px; background: #3498db; border:none; color:white; border-radius:5px;">Masuk</button>
    </div>

    <div id="main-app">
        <header>
            <div style="display:flex; justify-content: space-between; align-items: center; padding: 0 10px;">
                <span id="user-info"></span>
                <button id="theme-toggle" onclick="toggleDarkMode()" style="background:none; border:none; font-size:20px; cursor:pointer;">🌙</button>
            </div>
        </header>
        <nav id="main-nav"></nav>
        <div class="content-area" id="app-content"></div>
    </div>

    <div id="itemModal" class="modal">
        <div id="modalBody" class="modal-content"></div>
        <button onclick="closeModal()" style="width:100%; padding:15px; background:#e74c3c; color:white; border:none; position:sticky; bottom:0;">KEMBALI</button>
    </div>

<script>
    const URLS = {
        Awal: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6N6cAL1OoX2hCBXmL3MAmQcgxMTglDN2LtCseQdOC8zkWdDwRDCRDjKnI9NE3vMGSaXgWesgcdvGV/pub?output=csv",
        Kidung: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSasN_qIm_FKLGkh4t-clscJXdiuZJENUa0JgC3_-lwpmggsQ_xqF8DH_m-3wxCFU99j1WIj0n8nNhy/pub?output=csv",
        Background: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSI_5dVogArMM6hfMUrTpsXCVj-7rGmD2aqklSRufNHUHN_JzOYOgZ2Qz1TZszE7kH9XTaSa1kOv6N2/pub?output=csv" // Gantilah ke URL sheet background Anda yang benar
    };

    let db = {};
    let isDarkMode = false;
    let currentTranspose = 0;

    function formatDriveImage(url) {
        if (!url || !url.includes('drive.google.com')) return url;
        const id = url.match(/[-\w]{25,}/);
        return id ? `https://lh3.googleusercontent.com/u/0/d/${id[0]}` : url;
    }

    async function attemptLogin() {
        const res = await fetchCSV(URLS.Awal);
        db.Awal = res;
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const found = res.find(row => row.username === u && row.password === p);

        if (found) {
            db.user = found;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('user-info').innerText = found.username;
            loadBackgroundSettings();
            setupNavigation();
        } else alert("Salah!");
    }

    async function fetchCSV(url) {
        return new Promise(resolve => {
            Papa.parse(url, { download: true, header: true, complete: (res) => resolve(res.data) });
        });
    }

    async function loadBackgroundSettings() {
        const bgData = await fetchCSV(URLS.Background);
        if (bgData && bgData[0]) {
            const config = bgData[0];
            const bg = config['isi background'] || '#ffffff';
            const fg = config['isi foreground'] || '#000000';
            
            if (bg.startsWith('http')) {
                document.documentElement.style.setProperty('--k-bg', `url('${bg}')`);
            } else {
                document.documentElement.style.setProperty('--k-bg', bg);
            }
            document.documentElement.style.setProperty('--k-fg', fg);
        }
    }

    function setupNavigation() {
        const nav = document.getElementById('main-nav');
        const menus = db.user.tipe.split(',');
        menus.forEach((m, i) => {
            const btn = document.createElement('button');
            btn.innerText = m.trim();
            btn.onclick = (e) => loadModule(m.trim(), e.target);
            nav.appendChild(btn);
            if(i===0) btn.click();
        });
    }

    async function loadModule(name, btn) {
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const content = document.getElementById('app-content');
        content.innerHTML = "Loading...";

        if(name === 'Kidung') {
            db.Kidung = await fetchCSV(URLS.Kidung);
            renderKidung();
        } else {
            content.innerHTML = `Modul ${name} sedang dikembangkan.`;
        }
    }

    function renderKidung() {
        const content = document.getElementById('app-content');
        const styles = [...new Set(db.Kidung.map(k => k.style).filter(Boolean))];
        const kats = [...new Set(db.Kidung.map(k => k.Kategori).filter(Boolean))];
        const tempos = [...new Set(db.Kidung.map(k => k.Tempo).filter(Boolean))];

        content.innerHTML = `
            <div id="kidung-container">
                <div class="filter-group">
                    <input type="text" id="k-search" class="input-custom" placeholder="Cari No, Isi, Cerita..." onkeyup="filterKidung()">
                    <select id="f-style" class="input-custom" onchange="filterKidung()">
                        <option value="">Semua Style</option>${styles.map(s=>`<option>${s}</option>`)}
                    </select>
                    <select id="f-kat" class="input-custom" onchange="filterKidung()">
                        <option value="">Semua Kategori</option>${kats.map(s=>`<option>${s}</option>`)}
                    </select>
                    <select id="f-tempo" class="input-custom" onchange="filterKidung()">
                        <option value="">Semua Tempo</option>${tempos.map(s=>`<option>${s}</option>`)}
                    </select>
                </div>
                <div id="k-list"></div>
            </div>
        `;
        filterKidung();
    }

    function filterKidung() {
        const search = document.getElementById('k-search').value.toLowerCase();
        const style = document.getElementById('f-style').value;
        const kat = document.getElementById('f-kat').value;
        const tempo = document.getElementById('f-tempo').value;
        const list = document.getElementById('k-list');
        list.innerHTML = "";

        db.Kidung.forEach(k => {
            const matchTxt = (k['no kidung'] + k['isi kidung'] + k['Cerita kidung']).toLowerCase().includes(search);
            const matchStyle = !style || k.style === style;
            const matchKat = !kat || k.Kategori === kat;
            const matchTempo = !tempo || k.Tempo === tempo;

            if (matchTxt && matchStyle && matchKat && matchTempo) {
                const markClass = k.mark === 'kuning' ? 'mark-kuning' : (k.mark === 'biru' ? 'mark-biru' : '');
                const hasImg = k['link foto kidung'] ? '🖼️' : '';
                const card = document.createElement('div');
                card.className = `kidung-card ${markClass}`;
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between">
                        <strong>${k['no kidung']}. ${k['judul kidung']}</strong>
                        <span>${hasImg}</span>
                    </div>
                    <small>${k.style} | ${k.Kategori} | ${k.Tempo}</small>
                `;
                card.onclick = () => openDetail(k);
                list.appendChild(card);
            }
        });
    }

    function openDetail(k) {
        currentTranspose = 0;
        const img = formatDriveImage(k['link foto kidung']);
        const body = `
            <div style="text-align:center">
                <h2>${k['judul kidung']}</h2>
                <div style="display:flex; gap:5px; overflow-x:auto; margin-bottom:15px;">
                    <button class="tab-btn active" onclick="showTab('teks', this)">Teks</button>
                    ${img ? `<button class="tab-btn" onclick="showTab('foto', this)">Gambar</button>` : ''}
                    ${k['link lagu'] ? `<button class="tab-btn" onclick="showTab('audio', this)">Audio</button>` : ''}
                    ${k['link video'] ? `<button class="tab-btn" onclick="showTab('video', this)">Video</button>` : ''}
                </div>

                <div id="tab-teks" class="kidung-tab active-tab">
                    <div style="margin-bottom:10px;">
                        <button class="btn-action" onclick="doTranspose(-1)">Transpose -</button>
                        <button class="btn-action" onclick="doTranspose(1)">Transpose +</button>
                        <button class="btn-action" style="background:#27ae60; color:white;" onclick="shareWa('${k['judul kidung']}')">Share WA</button>
                    </div>
                    <pre id="display-bas" style="color:#3498db; font-weight:bold;">${k.kunci_bas || ''}</pre>
                    <pre id="display-not" style="color:#f1c40f;">${k.not_angka || ''}</pre>
                    <pre id="display-isi">${k['isi kidung']}</pre>
                </div>

                <div id="tab-foto" class="kidung-tab">
                    <img src="${img}" style="width:100%; border-radius:10px;">
                </div>

                <div id="tab-audio" class="kidung-tab">
                    <audio controls src="${k['link lagu']}" style="width:100%"></audio>
                </div>

                <div id="tab-video" class="kidung-tab">
                    <iframe width="100%" height="250" src="${k['link video']?.replace('watch?v=', 'embed/')}" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        `;
        showModal(body);
    }

    function showTab(id, btn) {
        document.querySelectorAll('.kidung-tab').forEach(t => t.classList.remove('active-tab'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+id).classList.add('active-tab');
        btn.classList.add('active');
    }

    function doTranspose(n) {
        currentTranspose += n;
        alert("Transpose nada ke: " + currentTranspose);
        // Logika transpose kompleks biasanya butuh library music, 
        // ini simulasi visual perpindahan nada
    }

    function shareWa(judul) {
        const txt = `*${judul}*\n\n${document.getElementById('display-isi').innerText}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
    }

    function toggleDarkMode() {
        isDarkMode = !isDarkMode;
        const btn = document.getElementById('theme-toggle');
        if(isDarkMode) {
            document.documentElement.style.setProperty('--k-bg', '#1a1a1a');
            document.documentElement.style.setProperty('--k-fg', '#ffffff');
            btn.innerText = "☀️";
        } else {
            loadBackgroundSettings();
            btn.innerText = "🌙";
        }
    }

    function showModal(html) {
        document.getElementById('modalBody').innerHTML = html;
        document.getElementById('itemModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('itemModal').style.display = 'none';
    }
</script>
</body>
</html>
