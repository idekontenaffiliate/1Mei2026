<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Perbauran Gembala · Solo 1–2 Mei 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,600&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<!-- Tone.js for MP3/MIDI transpose playback -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
/* ═══════════════════════════════════════════
   THEME SYSTEM — 10 THEMESti
═══════════════════════════════════════════ */
:root,[data-theme="dark"]{
  --bg:#0a0e17;--surface:#111827;--surface2:#1a2235;--border:#1e2d45;
  --accent:#3b82f6;--accent2:#06b6d4;--accent3:#8b5cf6;
  --green:#10b981;--yellow:#f59e0b;--red:#ef4444;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --glow:rgba(59,130,246,.15);--header-bg:#111827;--radius:13px;
}
[data-theme="light"]{--bg:#f0f4f8;--surface:#fff;--surface2:#e8edf5;--border:#d1dce9;--accent:#2563eb;--accent2:#0891b2;--accent3:#7c3aed;--green:#059669;--yellow:#d97706;--red:#dc2626;--text:#1e293b;--text2:#475569;--text3:#94a3b8;--glow:rgba(37,99,235,.1);--header-bg:#fff;}
[data-theme="green"]{--bg:#071a0e;--surface:#0d2a18;--surface2:#153d24;--border:#1e5c34;--accent:#22c55e;--accent2:#4ade80;--accent3:#86efac;--green:#16a34a;--yellow:#ca8a04;--red:#ef4444;--text:#dcfce7;--text2:#86efac;--text3:#4ade80;--glow:rgba(34,197,94,.15);--header-bg:#0d2a18;}
[data-theme="blue"]{--bg:#030d1a;--surface:#041526;--surface2:#072040;--border:#0a3060;--accent:#38bdf8;--accent2:#7dd3fc;--accent3:#93c5fd;--green:#10b981;--yellow:#fbbf24;--red:#f87171;--text:#e0f2fe;--text2:#93c5fd;--text3:#60a5fa;--glow:rgba(56,189,248,.15);--header-bg:#041526;}
[data-theme="lightgreen"]{--bg:#f0fdf4;--surface:#fff;--surface2:#dcfce7;--border:#bbf7d0;--accent:#16a34a;--accent2:#059669;--accent3:#0d9488;--green:#15803d;--yellow:#ca8a04;--red:#dc2626;--text:#14532d;--text2:#166534;--text3:#4ade80;--glow:rgba(22,163,74,.1);--header-bg:#fff;}
[data-theme="lightred"]{--bg:#fff1f2;--surface:#fff;--surface2:#ffe4e6;--border:#fecdd3;--accent:#e11d48;--accent2:#f43f5e;--accent3:#fb7185;--green:#059669;--yellow:#d97706;--red:#be123c;--text:#4c0519;--text2:#881337;--text3:#f43f5e;--glow:rgba(225,29,72,.1);--header-bg:#fff;}
[data-theme="darkwhite"]{--bg:#1a1a2e;--surface:#16213e;--surface2:#0f3460;--border:#334155;--accent:#e2e8f0;--accent2:#cbd5e1;--accent3:#94a3b8;--green:#10b981;--yellow:#fbbf24;--red:#f87171;--text:#f8fafc;--text2:#e2e8f0;--text3:#94a3b8;--glow:rgba(226,232,240,.1);--header-bg:#16213e;}
[data-theme="darkyellow"]{--bg:#0c0a00;--surface:#1a1500;--surface2:#2a2200;--border:#4a3a00;--accent:#fbbf24;--accent2:#f59e0b;--accent3:#fcd34d;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--text:#fef9c3;--text2:#fde68a;--text3:#fbbf24;--glow:rgba(251,191,36,.15);--header-bg:#1a1500;}
[data-theme="purple"]{--bg:#0d0a1a;--surface:#160f2e;--surface2:#1e1040;--border:#3b1f6e;--accent:#a855f7;--accent2:#c084fc;--accent3:#e879f9;--green:#10b981;--yellow:#fbbf24;--red:#ef4444;--text:#f3e8ff;--text2:#d8b4fe;--text3:#a855f7;--glow:rgba(168,85,247,.15);--header-bg:#160f2e;}
[data-theme="darkred"]{--bg:#0d0000;--surface:#1a0000;--surface2:#2a0000;--border:#5c1010;--accent:#f87171;--accent2:#fca5a5;--accent3:#fda4af;--green:#10b981;--yellow:#fbbf24;--red:#b91c1c;--text:#fee2e2;--text2:#fca5a5;--text3:#f87171;--glow:rgba(248,113,113,.15);--header-bg:#1a0000;}

/* ═══════════════════════════════════════════
   BASE
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased}

/* ═══════════════════════════════════════════
   LOGIN — ELEGANT GOLD / BLUE LUXURY DESIGN
═══════════════════════════════════════════ */
#login-screen{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  z-index:9000;overflow:hidden;
  background:linear-gradient(135deg,#f8f5ee 0%,#fffdf7 40%,#f0f4ff 100%);
}
#login-media-wrap{
  position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;
  overflow:hidden;
}
#login-video-bg{width:100%;height:100%;object-fit:cover;display:none;}
#login-img-bg{width:100%;height:100%;object-fit:cover;display:none;}
.login-media-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(160deg,rgba(255,252,240,0.72) 0%,rgba(240,248,255,0.65) 100%);
  backdrop-filter:blur(1px);
}
/* Decorative geometric bg */
.login-geo{
  position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;overflow:hidden;pointer-events:none;
}
.login-geo::before{
  content:'';position:absolute;top:-80px;right:-80px;width:380px;height:380px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,175,55,0.18) 0%,transparent 70%);
}
.login-geo::after{
  content:'';position:absolute;bottom:-60px;left:-60px;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(59,130,246,0.12) 0%,transparent 70%);
}
/* Orbiting ring decorations */
.login-ring{
  position:absolute;border-radius:50%;border:1px solid rgba(212,175,55,0.25);
  animation:ringRotate 18s linear infinite;
}
.login-ring-1{width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-50%);animation-duration:22s;}
.login-ring-2{width:360px;height:360px;top:50%;left:50%;transform:translate(-50%,-50%);border-color:rgba(59,130,246,0.18);animation-direction:reverse;animation-duration:16s;}
.login-ring-3{width:220px;height:220px;top:50%;left:50%;transform:translate(-50%,-50%);border-color:rgba(212,175,55,0.3);animation-duration:10s;}
@keyframes ringRotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
/* ring dots */
.ring-dot{
  position:absolute;width:7px;height:7px;border-radius:50%;
  background:radial-gradient(circle,#d4af37,rgba(212,175,55,0.3));
  top:-3px;left:50%;transform:translateX(-50%);
  box-shadow:0 0 8px rgba(212,175,55,0.6);
}
.ring-dot-2{background:radial-gradient(circle,#3b82f6,rgba(59,130,246,0.3));box-shadow:0 0 8px rgba(59,130,246,0.5);}

/* CARD */
.login-card{
  position:relative;z-index:10;
  background:rgba(255,255,255,0.88);
  border:1.5px solid rgba(212,175,55,0.35);
  border-radius:28px;
  padding:2.8rem 2.2rem 2.2rem;
  width:94%;max-width:380px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.9),
    0 20px 60px rgba(0,0,0,0.12),
    0 4px 20px rgba(212,175,55,0.08),
    inset 0 1px 0 rgba(255,255,255,1);
  backdrop-filter:blur(20px);
  animation:loginCardIn .7s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes loginCardIn{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:none}}
/* top gold line */
.login-card::before{
  content:'';position:absolute;top:0;left:15%;right:15%;height:2px;
  background:linear-gradient(90deg,transparent,#d4af37 30%,#f0c040 50%,#d4af37 70%,transparent);
  border-radius:0 0 2px 2px;
}
/* Card corner accent */
.login-card::after{
  content:'';position:absolute;top:20px;right:20px;width:40px;height:40px;
  border-top:2px solid rgba(212,175,55,0.4);border-right:2px solid rgba(212,175,55,0.4);
  border-radius:0 10px 0 0;
}
.login-corner-bl{
  position:absolute;bottom:20px;left:20px;width:40px;height:40px;
  border-bottom:2px solid rgba(212,175,55,0.4);border-left:2px solid rgba(212,175,55,0.4);
  border-radius:0 0 0 10px;
}

/* LOGO */
.login-logo{text-align:center;margin-bottom:2rem;}
.login-emblem{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,#d4af37 0%,#f8e878 40%,#c9a227 100%);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1rem;font-size:2rem;
  box-shadow:0 4px 20px rgba(212,175,55,0.4),0 0 0 4px rgba(212,175,55,0.12),0 0 0 8px rgba(212,175,55,0.06);
  animation:emblemPulse 3s ease-in-out infinite;
}
@keyframes emblemPulse{0%,100%{box-shadow:0 4px 20px rgba(212,175,55,.4),0 0 0 4px rgba(212,175,55,.12),0 0 0 8px rgba(212,175,55,.06)}50%{box-shadow:0 4px 28px rgba(212,175,55,.6),0 0 0 6px rgba(212,175,55,.18),0 0 0 12px rgba(212,175,55,.08)}}
.login-logo h2{
  font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:800;
  background:linear-gradient(135deg,#1a3a6e,#2563eb,#1a3a6e);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-.5px;margin-bottom:3px;
}
.login-logo .sub{
  font-size:.75rem;font-weight:500;color:#8a9ab5;letter-spacing:1.5px;text-transform:uppercase;
}
.login-logo .sub span{color:#d4af37;font-weight:700;}
/* gold divider */
.login-divider{
  display:flex;align-items:center;gap:8px;margin:0 auto 1.4rem;width:80%;
}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,.4));}
.login-divider::after{background:linear-gradient(90deg,rgba(212,175,55,.4),transparent);}
.login-divider-icon{font-size:.8rem;color:#d4af37;}

/* FORM */
.lf{margin-bottom:1rem;}
.lf label{
  display:block;font-size:.68rem;font-weight:700;color:#8a9ab5;
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;
}
.lf-input-wrap{position:relative;}
.lf-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  font-size:.9rem;color:#b0bec5;pointer-events:none;
}
.lf input{
  width:100%;background:#f8faff;border:1.5px solid #dde8f8;
  border-radius:12px;padding:12px 14px 12px 40px;
  color:#1e2d4a;font-family:'DM Sans',sans-serif;font-size:.93rem;outline:none;
  transition:border-color .25s,box-shadow .25s,background .25s;
}
.lf input:focus{
  border-color:#d4af37;background:#fff;
  box-shadow:0 0 0 4px rgba(212,175,55,.12);
}
.lf input::placeholder{color:#b8c6d8;}
.login-btn{
  width:100%;padding:14px;margin-top:.5rem;
  background:linear-gradient(135deg,#1a3a6e 0%,#2563eb 50%,#1d4ed8 100%);
  color:#fff;border:none;border-radius:12px;
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:.95rem;
  cursor:pointer;letter-spacing:.3px;
  box-shadow:0 4px 20px rgba(37,99,235,.35);
  transition:all .2s;position:relative;overflow:hidden;
}
.login-btn::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  transition:left .4s;
}
.login-btn:hover::before{left:100%;}
.login-btn:active{transform:scale(.98);}
/* Gold accent button strip */
.login-btn-gold{
  display:block;height:2px;margin-top:6px;border-radius:2px;
  background:linear-gradient(90deg,transparent,#d4af37 30%,#f0c040 50%,#d4af37 70%,transparent);
}
.login-footer{
  text-align:center;margin-top:1.4rem;font-size:.72rem;color:#a0b0c0;
  border-top:1px solid rgba(212,175,55,.15);padding-top:1rem;
}
.login-footer strong{color:#d4af37;}
.login-error{
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);
  border-radius:8px;padding:8px 12px;font-size:.8rem;color:#dc2626;
  margin-top:8px;display:none;text-align:center;
}

/* ═══════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════ */
#main-app{display:none;flex-direction:column;height:100vh;}
header{
  background:var(--header-bg);border-bottom:1px solid var(--border);
  padding:0 14px;height:54px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;z-index:100;
}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-title{font-size:.88rem;font-weight:700;color:var(--text);}
.hdr-sub{font-size:.68rem;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.hdr-right{display:flex;gap:5px;align-items:center;}
.icon-btn{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.9rem;
  transition:background .2s;flex-shrink:0;
}
.icon-btn:hover{background:var(--border);}
.icon-btn.logout{color:var(--red);border-color:rgba(239,68,68,.3);}
#live-clock{
  font-family:'JetBrains Mono',monospace;font-size:.72rem;
  color:var(--accent2);background:var(--surface2);
  padding:4px 9px;border-radius:8px;border:1px solid var(--border);
  letter-spacing:.5px;white-space:nowrap;
}
#theme-panel{
  display:none;position:fixed;top:58px;right:10px;z-index:500;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:12px;box-shadow:0 8px 32px rgba(0,0,0,.4);
  flex-wrap:wrap;gap:8px;width:230px;
}
.theme-chip{
  display:flex;align-items:center;gap:6px;padding:6px 10px;
  border-radius:8px;border:1px solid var(--border);background:var(--surface2);
  cursor:pointer;font-size:.75rem;font-weight:500;color:var(--text2);
  transition:all .2s;white-space:nowrap;
}
.theme-chip:hover,.theme-chip.active{border-color:var(--accent);color:var(--accent);background:var(--glow);}
.theme-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
nav{
  display:flex;overflow-x:auto;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
  scrollbar-width:none;padding:0 6px;gap:2px;
}
nav::-webkit-scrollbar{display:none;}
nav button{
  padding:9px 13px;border:none;background:none;cursor:pointer;
  white-space:nowrap;font-family:'DM Sans',sans-serif;font-weight:500;
  font-size:.8rem;color:var(--text3);border-bottom:2px solid transparent;
  transition:all .2s;letter-spacing:.2px;flex-shrink:0;
}
nav button.active{color:var(--accent);border-bottom-color:var(--accent);}
nav button:hover:not(.active){color:var(--text2);}
#app-content-wrapper{flex:1;overflow-y:auto;background:var(--bg);scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.content-area{padding:14px;min-height:100%;}


#fullscreen-lyric {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  z-index: 9999;
  display: flex;
  flex-direction: column;
}

.fs-back {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 2;
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
}

.fs-content {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px;
  font-size: 2rem;
  line-height: 1.6;
  white-space: pre-line;
  overflow-y: auto;
}   
/* ═══════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════ */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.dash-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;box-shadow:0 4px 20px rgba(0,0,0,.1);
  position:relative;overflow:hidden;
}
.dash-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:var(--glow);}
.dash-card-icon{font-size:1.6rem;margin-bottom:6px;display:block;}
.dash-card-val{font-size:1.8rem;font-weight:800;color:var(--accent);font-family:'Playfair Display',serif;}
.dash-card-label{font-size:.72rem;color:var(--text3);margin-top:2px;}
.clock-card{
  background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);
  border:1px solid var(--border);border-radius:var(--radius);padding:18px 16px;
  text-align:center;margin-bottom:10px;
}
.clock-big{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:600;color:var(--accent);letter-spacing:2px;}
.clock-date{font-size:.8rem;color:var(--text2);margin-top:4px;}

/* PIE CHART */
.pie-wrap{position:relative;width:130px;height:130px;margin:0 auto;}
.pie-wrap svg{width:100%;height:100%;}
.pie-legend{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.pie-leg-item{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--text2);}
.pie-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* 3D PIE */
.pie3d-wrap{position:relative;width:140px;height:80px;margin:8px auto;}
.pie3d-legend{display:flex;flex-direction:column;gap:4px;margin-top:10px;}

/* BAR CHART */
.bar-chart-wrap{width:100%;padding:8px 0;}
.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-label{font-size:.72rem;color:var(--text2);min-width:80px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;height:20px;background:var(--surface2);border-radius:5px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.bar-val{font-size:.68rem;font-weight:700;color:#fff;font-family:'JetBrains Mono',monospace;}

/* ═══════════════════════════════════════════
   CARDS & LISTS
═══════════════════════════════════════════ */
.modern-list{display:flex;flex-direction:column;gap:9px;}
.modern-item{
  display:flex;align-items:center;background:var(--surface);
  padding:12px;border-radius:var(--radius);border:1px solid var(--border);
  cursor:pointer;transition:transform .15s,border-color .2s;gap:12px;
}
.modern-item:hover{border-color:var(--accent);transform:translateY(-1px);}
.modern-item:active{transform:scale(.99);}
.modern-item-img{width:54px;height:54px;border-radius:11px;object-fit:cover;flex-shrink:0;}
.modern-item-content{flex:1;overflow:hidden;}
.modern-item-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:600;padding:2px 7px;border-radius:5px;margin-bottom:3px;}
.modern-item-title{font-weight:700;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.modern-item-desc{font-size:.75rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.modern-item-arrow{color:var(--text3);font-size:1rem;flex-shrink:0;}

/* JEMAAT */
.jemaat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.jemaat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 10px;text-align:center;cursor:pointer;
  transition:transform .15s,border-color .2s;
}
.jemaat-card:hover{border-color:var(--accent2);transform:translateY(-2px);}
.jemaat-avatar{width:68px;height:68px;border-radius:50%;object-fit:cover;margin:0 auto 9px;border:2px solid var(--border);display:block;}
.jemaat-name{font-weight:700;font-size:.83rem;color:var(--text);}
.jemaat-role{font-size:.7rem;color:var(--text3);margin-top:2px;}

/* FILTER */
.filter-group{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
.k-input{
  padding:8px 11px;border-radius:9px;border:1px solid var(--border);
  flex:1;min-width:110px;background:var(--surface);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s;
}
.k-input:focus{border-color:var(--accent);}
.k-input option{background:var(--surface);}

/* ═══════════════════════════════════════════
   MODAL — FULL SCREEN
═══════════════════════════════════════════ */
.modal-overlay{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:800;overflow-y:auto;
}
.modal-panel{
  background:var(--surface);border-top:1px solid var(--border);
  min-height:100vh;padding:16px 14px 90px;
}
.modal-close-bar{
  position:fixed;bottom:0;left:0;width:100%;padding:12px 14px;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;gap:7px;z-index:810;
}
.close-btn-main{
  flex:1;padding:11px;background:var(--surface2);color:var(--text);
  border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;
  font-weight:600;font-size:.88rem;cursor:pointer;transition:background .2s;
}
.close-btn-main:hover{background:var(--border);}

/* TABS */
.tab-group{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.tab-group::-webkit-scrollbar{display:none;}
.tab-btn{
  padding:7px 12px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);
  border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;
  font-weight:500;flex-shrink:0;transition:all .2s;
}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.kidung-tab{display:none;}
.active-tab{display:block;}

/* ACTION ROW */
.action-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.btn-action{
  padding:7px 11px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:.78rem;font-weight:500;cursor:pointer;transition:all .15s;
}
.btn-action:hover{background:var(--border);}
.btn-action.accent{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-action.green{background:var(--green);color:#fff;border-color:var(--green);}
.btn-action.red{background:var(--red);color:#fff;border-color:var(--red);}

/* LYRIC BOX */
.lyric-box{
  background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;
  max-height:55vh;overflow-y:auto;
}
.scalable-text{
  white-space:pre-wrap;line-height:1.75;transition:font-size .2s;
  word-wrap:break-word;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);
}
.key-line{color:#60a5fa;font-weight:600;}
.note-line{color:#86efac;}

/* MUSIC PLAYER */
.music-player{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.music-player audio{width:100%;height:38px;border-radius:8px;margin-bottom:9px;}
.transpose-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.transpose-label{font-size:.75rem;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.transpose-display{font-family:'JetBrains Mono',monospace;font-size:.95rem;font-weight:700;color:var(--accent);min-width:60px;text-align:center;background:var(--surface);padding:4px 8px;border-radius:6px;border:1px solid var(--border);}
.key-display{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--accent2);background:rgba(6,182,212,.1);padding:3px 8px;border-radius:5px;border:1px solid rgba(6,182,212,.2);}

/* MP3/MIDI Tone Player */
.tone-player{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.tone-player-title{font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.tone-btns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.tone-key-name{font-family:'JetBrains Mono',monospace;font-size:.88rem;font-weight:700;color:var(--accent);}
.tone-progress{width:100%;height:4px;background:var(--surface);border-radius:2px;overflow:hidden;margin-top:8px;}
.tone-progress-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .1s linear;}

/* ═══════════════════════════════════════════
   CUSTOM IMAGE VIEWER (FULLSCREEN)
   Build-from-scratch, full mobile support
═══════════════════════════════════════════ */
#img-viewer{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.97);z-index:2000;
  flex-direction:column;touch-action:none;
}
.iv-toolbar-top{
  position:absolute;top:0;left:0;right:0;padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent);z-index:10;
  gap:8px;
}
.iv-title-area{flex:1;}
.iv-title{color:#fff;font-size:.88rem;font-weight:700;margin-bottom:2px;}
.iv-counter{color:rgba(255,255,255,.5);font-family:'JetBrains Mono',monospace;font-size:.72rem;}
.iv-top-btns{display:flex;gap:6px;align-items:center;}
.iv-top-btn{
  width:36px;height:36px;border-radius:10px;
  background:rgba(255,255,255,.15);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.2);color:#fff;font-size:.85rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s;font-weight:600;
}
.iv-top-btn:hover{background:rgba(255,255,255,.3);}
.iv-top-btn.close{background:rgba(239,68,68,.4);border-color:rgba(239,68,68,.5);}
.iv-top-btn.close:hover{background:rgba(239,68,68,.7);}
/* Image container */
.iv-img-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;user-select:none;
}
.iv-img-container{
  transition:transform .15s ease;
  transform-origin:center center;
  cursor:grab;
}
.iv-img-container:active{cursor:grabbing;}
#iv-main-img{
  max-width:100vw;max-height:100vh;
  object-fit:contain;display:block;
  transition:opacity .25s;
  -webkit-user-drag:none;pointer-events:none;
}
/* Nav arrows */
.iv-nav-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.18);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.25);
  color:#fff;font-size:1.4rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;z-index:5;transition:all .2s;
}
.iv-nav-btn:hover{background:rgba(255,255,255,.35);}
.iv-nav-btn:active{transform:translateY(-50%) scale(.92);}
#iv-prev{left:10px;}#iv-next{right:10px;}
/* Bottom toolbar */
.iv-toolbar-bottom{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(to top,rgba(0,0,0,.85),transparent);
  padding:10px 14px 20px;z-index:10;
}
.iv-dots{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.iv-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .2s;cursor:pointer;}
.iv-dot.active{background:#fff;transform:scale(1.5);}
/* Zoom indicator */
.iv-zoom-label{
  text-align:center;font-family:'JetBrains Mono',monospace;font-size:.7rem;
  color:rgba(255,255,255,.5);margin-bottom:8px;
}

/* ═══════════════════════════════════════════
   PDF VIEWER
═══════════════════════════════════════════ */
.pdf-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;display:flex;align-items:center;gap:13px;transition:transform .15s,border-color .2s;margin-bottom:9px;}
.pdf-item:hover{border-color:var(--red);transform:translateX(3px);}
.pdf-icon{width:46px;height:46px;background:rgba(239,68,68,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.pdf-fullscreen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#111;z-index:2000;flex-direction:column;}
.pdf-toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pdf-toolbar-title{font-weight:600;font-size:.88rem;}
#pdf-frame{flex:1;width:100%;border:none;}

/* ═══════════════════════════════════════════
   YOUTUBE PLAYER
═══════════════════════════════════════════ */
.yt-player-wrap{
  position:relative;width:100%;padding-top:56.25%;
  border-radius:12px;overflow:hidden;margin-bottom:10px;
  background:#000;
}
.yt-player-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.yt-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,0,0,.15);border:1px solid rgba(255,0,0,.3);
  color:#ff4444;padding:3px 8px;border-radius:5px;font-size:.7rem;font-weight:600;
  margin-bottom:8px;
}

/* ═══════════════════════════════════════════
   SPINWHEEL
═══════════════════════════════════════════ */
.spinwheel-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:6px 0;}
.spin-canvas-wrap{position:relative;width:min(270px,90vw);height:min(270px,90vw);}
#spin-canvas{width:100%;height:100%;border-radius:50%;box-shadow:0 0 0 4px var(--border),0 0 40px var(--glow);}
.spin-pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:1.8rem;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));z-index:2;}
.spin-result-box{background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:12px 18px;text-align:center;min-width:230px;box-shadow:0 0 20px var(--glow);}
.spin-result-label{font-size:.72rem;color:var(--text3);margin-bottom:3px;}
.spin-result-name{font-weight:700;font-size:1.05rem;color:var(--accent);}
.spin-participants{width:100%;max-width:330px;max-height:200px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
.spin-participant-item{padding:9px 13px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);font-size:.83rem;}
.spin-participant-item:last-child{border-bottom:none;}
.spin-participant-item.eliminated{opacity:.3;text-decoration:line-through;}
.spin-nilai{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--accent2);background:rgba(6,182,212,.1);padding:2px 6px;border-radius:5px;}

/* ═══════════════════════════════════════════
   QUIZ
═══════════════════════════════════════════ */
.quiz-wrap{max-width:600px;margin:0 auto;}
.quiz-question-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px;}
.quiz-q-number{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text3);margin-bottom:5px;}
.quiz-q-text{font-weight:600;font-size:.97rem;margin-bottom:14px;color:var(--text);}
.quiz-options{display:flex;flex-direction:column;gap:7px;}
.quiz-option{padding:10px 13px;border:1px solid var(--border);border-radius:9px;background:var(--surface2);cursor:pointer;font-size:.86rem;transition:all .2s;color:var(--text);}
.quiz-option:hover{border-color:var(--accent);background:rgba(59,130,246,.1);}
.quiz-option.selected{border-color:var(--accent);background:rgba(59,130,246,.2);color:var(--accent);font-weight:600;}
.quiz-option.correct{border-color:var(--green);background:rgba(16,185,129,.2);color:var(--green);font-weight:600;}
.quiz-option.wrong{border-color:var(--red);background:rgba(239,68,68,.15);color:var(--red);}
.quiz-text-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.86rem;outline:none;resize:none;transition:border-color .2s;}
.quiz-text-input:focus{border-color:var(--accent);}
.quiz-submit-btn{width:100%;padding:13px;margin-top:10px;background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;}
.score-circle{width:110px;height:110px;border-radius:50%;border:4px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 0 30px var(--glow);}
.score-number{font-size:1.9rem;font-weight:800;color:var(--accent);}
.score-label{font-size:.7rem;color:var(--text3);}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.section-title{font-weight:700;font-size:.97rem;color:var(--text);}
.section-count{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text3);background:var(--surface2);padding:3px 8px;border-radius:18px;}
.empty-state{text-align:center;padding:36px 18px;color:var(--text3);}
.empty-state .icon{font-size:2.8rem;margin-bottom:8px;}
.empty-state p{font-size:.88rem;}
.tag{display:inline-block;font-size:.68rem;font-weight:600;padding:2px 7px;border-radius:5px;background:rgba(59,130,246,.15);color:var(--accent);}
.tag.green{background:rgba(16,185,129,.15);color:var(--green);}
.tag.yellow{background:rgba(245,158,11,.15);color:var(--yellow);}
.tag.red{background:rgba(239,68,68,.15);color:var(--red);}
.tag.purple{background:rgba(139,92,246,.15);color:var(--accent3);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px;}
.info-item{background:var(--surface2);border-radius:9px;padding:9px 11px;border:1px solid var(--border);}
.info-item-label{font-size:.68rem;color:var(--text3);margin-bottom:2px;}
.info-item-value{font-size:.85rem;font-weight:600;color:var(--text);}
.loading-shimmer{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px;height:65px;margin-bottom:9px;}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:9px 18px;font-size:.83rem;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.3);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>

function fmtImg(url){
  if(!url||!url.trim())return'';
  // Already a direct image URL
  if(url.startsWith('http')&&!url.includes('drive.google.com'))return url;
  const m=url.match(/[-\w]{25,}/);
  return m?`https://lh3.googleusercontent.com/d/${m[0]}`:url;
}
function fmtPrev(url){
  if(!url)return'';
  const m=url.match(/[-\w]{25,}/);
  return m?`https://drive.google.com/file/d/${m[0]}/preview`:url;
}
function fmtDl(url){
  if(!url)return'#';
  const m=url.match(/[-\w]{25,}/);
  return m?`https://drive.google.com/uc?export=download&id=${m[0]}`:url;
}
function isYoutubeUrl(url){
  return url&&(url.includes('youtube.com')||url.includes('youtu.be'));
}
function ytEmbedUrl(url){
  if(!url)return'';
  let id='';
  const m1=url.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
  const m2=url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  const m3=url.match(/embed\/([a-zA-Z0-9_-]{11})/);
  if(m1)id=m1[1];else if(m2)id=m2[1];else if(m3)id=m3[1];
  return id?`https://www.youtube.com/embed/${id}?rel=0&modestbranding=1`:'';
}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2600);
}

function attemptLogin(){
  const errEl=document.getElementById('login-error');errEl.style.display='none';
  if(!db.Awal||!db.Awal.length)return toast('⏳ Memuat data, harap tunggu...');
  const u=document.getElementById('user').value.trim();
  const p=document.getElementById('pass').value;
  if(!u||!p)return toast('⚠️ Isi username dan password');
  const found=db.Awal.find(r=>r.username===u&&r.password===p);
  if(!found){errEl.style.display='block';return;}
  currentUser=found;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='flex';
  document.getElementById('header-title').textContent=`Halo, ${found.username}`;
  document.getElementById('header-sub').textContent=found.tipe||'user';
  Papa.parse(URLS.Background,{download:true,header:true,complete:r=>{db.Background=r.data;}});
  setupNavigation();
  logHistory('login','masuk aplikasi');
}
function doLogout(){
  if(!confirm('Yakin ingin keluar?'))return;
  logHistory('logout','keluar aplikasi');
  currentUser=null;db={};
  Papa.parse(URLS.Awal,{download:true,header:true,complete:r=>{db.Awal=r.data;}});
  document.getElementById('main-app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('main-nav').innerHTML='';
  document.getElementById('user').value='';
  document.getElementById('pass').value='';
  document.getElementById('login-error').style.display='none';
}
function setupNavigation(){
  const nav=document.getElementById('main-nav');nav.innerHTML='';
  const menus=(currentUser.tipe||'').split(',').map(s=>s.trim()).filter(Boolean);
  const allMenus=['Dashboard',...menus.filter(m=>m!=='Dashboard')];
  allMenus.forEach((menu,idx)=>{
    const btn=document.createElement('button');
    btn.textContent=menuLabel(menu);
    btn.onclick=(e)=>{loadModule(menu,e.currentTarget);logHistory('menu',menu);};
    nav.appendChild(btn);
    if(idx===0)setTimeout(()=>btn.click(),100);
  });
}
function menuLabel(n){
  const icons={Dashboard:'📊',Kidung:'🎵',Acara:'📅',Kegiatan:'⚡',Jemaat:'👥',Spinwheel:'🎰',Quiz:'❓',Admin:'🔑'};
  return(icons[n.trim()]||'•')+' '+n.trim();
}
function loadModule(name,el){
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  const content=document.getElementById('app-content');
  content.innerHTML=`<div class="loading-shimmer"></div><div class="loading-shimmer" style="height:45px;opacity:.6;"></div><div class="loading-shimmer" style="height:45px;opacity:.3;"></div>`;
  const nm=name.toLowerCase().trim();
  if(nm==='dashboard'){dispatchRender(name);return;}
  if(!db[name]){
    const url=URLS[name];
    if(!url)return dispatchRender(name);
    Papa.parse(url,{download:true,header:true,complete:res=>{db[name]=res.data;dispatchRender(name);}});
  } else dispatchRender(name);
}
function dispatchRender(name){
  const n=name.toLowerCase().trim();
  if(n==='dashboard')renderDashboard();
  else if(n==='kidung')renderKidung();
  else if(n==='acara')renderAcara();
  else if(n==='kegiatan')renderKegiatan();
  else if(n==='jemaat')renderJemaat();
  else if(n==='spinwheel')renderSpinwheel();
  else if(n==='quiz')renderQuiz();
  else if(n==='admin')renderAdmin();
  else document.getElementById('app-content').innerHTML=`<div class="empty-state"><div class="icon">🔧</div><p>Modul "${name}" siap.</p></div>`;
}

function buildPie(segments){
  const total=segments.reduce((s,x)=>s+x.val,0);
  if(total===0)return'<div style="color:var(--text3);font-size:.8rem;text-align:center;padding:20px;">No data</div>';
  let paths='',offset=0;
  const r=55,cx=65,cy=65;
  segments.forEach(seg=>{
    const frac=seg.val/total;
    const angle=frac*2*Math.PI;
    const x1=cx+r*Math.sin(offset);const y1=cy-r*Math.cos(offset);
    offset+=angle;
    const x2=cx+r*Math.sin(offset);const y2=cy-r*Math.cos(offset);
    const large=frac>.5?1:0;
    paths+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${seg.color}" opacity=".9"><title>${seg.label}: ${seg.val}</title></path>`;
  });
  return`<svg viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">${paths}<circle cx="65" cy="65" r="22" fill="var(--surface)"/><text x="65" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text)">${total}</text></svg>`;
}

// 3D Pie using SVG ellipses (simulated 3D effect)
function build3DPie(segments){
  const total=segments.reduce((s,x)=>s+x.val,0);
  if(total===0)return'<div style="color:var(--text3);font-size:.8rem;text-align:center;padding:10px;">No data</div>';
  const cx=100,cy=45,rx=80,ry=28,depth=18;
  let svgPaths='',svgSides='',offset=0;
  // Draw sides first (bottom depth)
  segments.forEach(seg=>{
    if(seg.val===0)return;
    const frac=seg.val/total;
    const angle=frac*2*Math.PI;
    const x1=cx+rx*Math.sin(offset);const y1=cy-ry*Math.cos(offset);
    offset+=angle;
    const x2=cx+rx*Math.sin(offset);const y2=cy-ry*Math.cos(offset);
    const large=frac>.5?1:0;
    // Side face for bottom half only
    if(Math.sin(offset-angle/2)>0){
      svgSides+=`<path d="M${x1},${y1} A${rx},${ry} 0 ${large},1 ${x2},${y2} L${x2},${y2+depth} A${rx},${ry} 0 ${large},0 ${x1},${y1+depth} Z" fill="${seg.color}" opacity=".55" stroke="rgba(0,0,0,.15)" stroke-width=".5"/>`;
    }
  });
  offset=0;
  segments.forEach(seg=>{
    if(seg.val===0)return;
    const frac=seg.val/total;
    const angle=frac*2*Math.PI;
    const x1=cx+rx*Math.sin(offset);const y1=cy-ry*Math.cos(offset);
    offset+=angle;
    const x2=cx+rx*Math.sin(offset);const y2=cy-ry*Math.cos(offset);
    const large=frac>.5?1:0;
    svgPaths+=`<path d="M${cx},${cy} L${x1},${y1} A${rx},${ry} 0 ${large},1 ${x2},${y2} Z" fill="${seg.color}" opacity=".95" stroke="rgba(0,0,0,.1)" stroke-width=".5"><title>${seg.label}: ${seg.val}</title></path>`;
  });
  return`<div style="text-align:center;"><svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:200px;">${svgSides}${svgPaths}<text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="10" font-weight="bold" fill="white">${total}</text></svg></div>`;
}

function buildBarChart(map){
  const maxVal=Math.max(...Object.values(map),1);
  return Object.entries(map).map(([k,v],i)=>{
    const pct=Math.round(v/maxVal*100);
    return`<div class="bar-item">
      <div class="bar-label" title="${k}">${k}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${MC[i%MC.length]},${MC[(i+1)%MC.length]});">
          <span class="bar-val">${v}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openImgViewer(images,startIndex,title){
  ivImages=Array.isArray(images)?images:[images];
  ivIndex=Math.max(0,Math.min(ivImages.length-1,startIndex||0));
  ivScale=1;ivPanX=0;ivPanY=0;
  document.getElementById('iv-title').textContent=title||'Foto';
  const viewer=document.getElementById('img-viewer');
  viewer.style.display='flex';
  const dots=document.getElementById('iv-dots');
  dots.innerHTML=ivImages.map((_,i)=>`<div class="iv-dot${i===ivIndex?' active':''}" onclick="ivGoTo(${i})"></div>`).join('');
  ivRender();
}
function ivRender(){
  const img=document.getElementById('iv-main-img');
  const container=document.getElementById('iv-img-container');
  img.style.opacity=0;
  setTimeout(()=>{img.src=ivImages[ivIndex];img.style.opacity=1;},100);
  // Reset pan/scale
  ivScale=1;ivPanX=0;ivPanY=0;
  applyIvTransform(container);
  document.getElementById('iv-counter').textContent=`${ivIndex+1}/${ivImages.length}`;
  document.getElementById('iv-zoom-label').textContent='100%';
  document.querySelectorAll('.iv-dot').forEach((d,i)=>d.classList.toggle('active',i===ivIndex));
  document.getElementById('iv-prev').style.display=ivImages.length>1&&ivIndex>0?'flex':'none';
  document.getElementById('iv-next').style.display=ivImages.length>1&&ivIndex<ivImages.length-1?'flex':'none';
}
function applyIvTransform(container){
  if(!container)container=document.getElementById('iv-img-container');
  container.style.transform=`translate(${ivPanX}px,${ivPanY}px) scale(${ivScale})`;
  const zl=document.getElementById('iv-zoom-label');
  if(zl)zl.textContent=Math.round(ivScale*100)+'%';
}
function ivNav(dir){
  ivIndex=Math.max(0,Math.min(ivImages.length-1,ivIndex+dir));
  ivRender();
}
function ivGoTo(i){ivIndex=i;ivRender();}
function ivZoomIn(){ivScale=Math.min(5,ivScale+.4);applyIvTransform();}
function ivZoomOut(){ivScale=Math.max(.5,ivScale-.4);applyIvTransform();}
function ivToggleFullscreen(){
  const el=document.getElementById('img-viewer');
  if(!document.fullscreenElement){el.requestFullscreen().catch(()=>{});}
  else{document.exitFullscreen().catch(()=>{});}
}
function closeImgViewer(){
  const viewer=document.getElementById('img-viewer');
  viewer.style.display='none';
  ivImages=[];ivIndex=0;ivScale=1;ivPanX=0;ivPanY=0;
  if(document.fullscreenElement)document.exitFullscreen().catch(()=>{});
}

// KEYBOARD NAV
document.addEventListener('keydown',e=>{
  const viewer=document.getElementById('img-viewer');
  if(viewer.style.display==='none')return;
  if(e.key==='ArrowLeft')ivNav(-1);
  else if(e.key==='ArrowRight')ivNav(1);
  else if(e.key==='Escape')closeImgViewer();
  else if(e.key==='+')ivZoomIn();
  else if(e.key==='-')ivZoomOut();
});

// TOUCH SWIPE & PINCH-ZOOM for image viewer
(function(){
  let ts={x:0,y:0},pinchDist0=0,pinchScale0=1;
  const area=document.getElementById('iv-img-area');
  const getContainer=()=>document.getElementById('iv-img-container');

  area.addEventListener('touchstart',e=>{
    if(e.touches.length===1){
      ts={x:e.touches[0].clientX,y:e.touches[0].clientY};
      ivLastPanX=ivPanX;ivLastPanY=ivPanY;
    } else if(e.touches.length===2){
      ivPinching=true;
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      pinchDist0=Math.sqrt(dx*dx+dy*dy);
      pinchScale0=ivScale;
    }
    e.preventDefault();
  },{passive:false});

  area.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      ivScale=Math.max(.5,Math.min(5,pinchScale0*(dist/pinchDist0)));
      applyIvTransform(getContainer());
    } else if(e.touches.length===1&&ivScale>1){
      // Pan
      const dx=e.touches[0].clientX-ts.x;
      const dy=e.touches[0].clientY-ts.y;
      ivPanX=ivLastPanX+dx;ivPanY=ivLastPanY+dy;
      applyIvTransform(getContainer());
    }
    e.preventDefault();
  },{passive:false});

  area.addEventListener('touchend',e=>{
    if(ivPinching&&e.touches.length<2){ivPinching=false;return;}
    if(ivScale<=1.05){
      const dx=e.changedTouches[0].clientX-ts.x;
      if(Math.abs(dx)>50&&Math.abs(e.changedTouches[0].clientY-ts.y)<60){
        ivNav(dx<0?1:-1);
      }
    }
    ivPanX=0;ivPanY=0;
  });

  // Mouse wheel zoom
  area.addEventListener('wheel',e=>{
    e.preventDefault();
    ivScale=Math.max(.5,Math.min(5,ivScale-(e.deltaY>0?.2:-.2)));
    applyIvTransform(getContainer());
  },{passive:false});
})();

function adjustFont(d){
  currentFontSize=Math.max(9,Math.min(30,currentFontSize+d));
  document.querySelectorAll('.scalable-text').forEach(el=>el.style.fontSize=currentFontSize+'px');
}
function copyText(id){
  const el=document.getElementById(id);if(!el)return;
  navigator.clipboard.writeText(el.innerText).then(()=>toast('✅ Teks berhasil disalin!'));
}
function transposeChordLine(line,steps){
  if(steps===0)return line;
  return line.replace(/[A-G][#b]?/g,m=>{
    const note=m.replace('b','#');
    const idx=CHROMATIC.indexOf(note.toUpperCase());
    if(idx===-1)return m;
    return CHROMATIC[(idx+steps+12)%12];
  });
}
function updateTransposeDisplay(){
  const key=CHROMATIC[((CHROMATIC.indexOf('C')+currentTranspose)+12)%12];
  document.querySelectorAll('.transpose-display').forEach(el=>{
    el.textContent=`${currentTranspose>=0?'+':''}${currentTranspose} (${key})`;
  });
  document.querySelectorAll('.key-line').forEach(el=>{
    const orig=el.getAttribute('data-orig')||el.textContent;
    el.setAttribute('data-orig',orig);
    el.textContent=transposeChordLine(orig,currentTranspose);
  });
}
function changeTranspose(d){currentTranspose+=d;if(currentTranspose>6)currentTranspose=-6;if(currentTranspose<-6)currentTranspose=6;updateTransposeDisplay();}
function resetTranspose(){currentTranspose=0;updateTransposeDisplay();}

// ══════════════════════════════════════════════════
// TONE.JS MP3 PLAYER WITH TRANSPOSE
// ══════════════════════════════════════════════════
const TONE_KEYS=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
let tonePlayerState={url:'',transpose:0,player:null,isPlaying:false};

function buildTonePlayer(audioUrl,containerSelector){
  if(!audioUrl)return;
  const wrap=document.querySelector(containerSelector);
  if(!wrap)return;
  tonePlayerState={url:audioUrl,transpose:0,player:null,isPlaying:false};

  wrap.innerHTML=`
    <div class="tone-player-title">🎵 Player dengan Transpose Nada</div>
    <audio id="tone-audio-el" src="${audioUrl}" preload="auto" style="display:none;"></audio>
    <div class="transpose-row" style="margin-bottom:10px;">
      <span class="transpose-label">Nada Dasar:</span>
      <button class="btn-action" onclick="toneTransposeChange(-1)">♭ −1</button>
      <span class="transpose-display" id="tone-key-disp">+0 (C)</span>
      <button class="btn-action" onclick="toneTransposeChange(1)">♯ +1</button>
      <button class="btn-action" onclick="toneTransposeReset()">↺ Reset</button>
    </div>
    <div class="tone-btns">
      <button class="btn-action green" id="tone-play-btn" onclick="toneTogglePlay()">▶ Play</button>
      <button class="btn-action red" onclick="toneStop()">■ Stop</button>
    </div>
    <div class="tone-progress"><div class="tone-progress-fill" id="tone-prog"></div></div>
    <div style="font-size:.7rem;color:var(--text3);margin-top:6px;font-family:'JetBrains Mono',monospace;">
      Nada: <span id="tone-curr-key" class="key-display">C</span>
      &nbsp;|&nbsp; File: <span style="opacity:.6;">${audioUrl.split('/').pop().slice(0,30)}</span>
    </div>
  `;

  // Try Tone.js pitch shifting if available
  if(typeof Tone!=='undefined'){
    try{
      Tone.setContext(new Tone.Context());
      const player=new Tone.Player(audioUrl).toDestination();
      const shifter=new Tone.PitchShift().toDestination();
      player.connect(shifter);
      player.disconnect(Tone.Destination);
      tonePlayerState.player=player;
      tonePlayerState.shifter=shifter;
      tonePlayerState.useTone=true;
    }catch(e){tonePlayerState.useTone=false;}
  }
  // Setup basic audio progress
  const audio=document.getElementById('tone-audio-el');
  if(audio){
    audio.addEventListener('timeupdate',()=>{
      if(audio.duration){
        const pct=(audio.currentTime/audio.duration)*100;
        const el=document.getElementById('tone-prog');
        if(el)el.style.width=pct+'%';
      }
    });
    audio.addEventListener('ended',()=>{toneSetPlayBtn(false);});
  }
}

function toneTogglePlay(){
  const audio=document.getElementById('tone-audio-el');
  if(!audio)return;
  if(audio.paused){audio.play();toneSetPlayBtn(true);}
  else{audio.pause();toneSetPlayBtn(false);}
}
function toneStop(){
  const audio=document.getElementById('tone-audio-el');
  if(audio){audio.pause();audio.currentTime=0;}
  toneSetPlayBtn(false);
  const el=document.getElementById('tone-prog');if(el)el.style.width='0%';
}
function toneSetPlayBtn(playing){
  const btn=document.getElementById('tone-play-btn');
  if(btn)btn.textContent=playing?'⏸ Pause':'▶ Play';
}
function toneTransposeChange(d){
  tonePlayerState.transpose+=d;
  if(tonePlayerState.transpose>12)tonePlayerState.transpose=-12;
  if(tonePlayerState.transpose<-12)tonePlayerState.transpose=12;
  const keyIdx=((TONE_KEYS.indexOf('C')+tonePlayerState.transpose)+24)%12;
  const keyName=TONE_KEYS[keyIdx];
  const disp=document.getElementById('tone-key-disp');
  const currKey=document.getElementById('tone-curr-key');
  if(disp)disp.textContent=`${tonePlayerState.transpose>=0?'+':''}${tonePlayerState.transpose} (${keyName})`;
  if(currKey)currKey.textContent=keyName;
  // Apply Tone.js pitch shift
  if(tonePlayerState.useTone&&tonePlayerState.shifter){
    tonePlayerState.shifter.pitch=tonePlayerState.transpose;
  }
  // Also update chord display
  currentTranspose=tonePlayerState.transpose;
  updateTransposeDisplay();
}
function toneTransposeReset(){
  tonePlayerState.transpose=0;
  const disp=document.getElementById('tone-key-disp');if(disp)disp.textContent='+0 (C)';
  const currKey=document.getElementById('tone-curr-key');if(currKey)currKey.textContent='C';
  if(tonePlayerState.useTone&&tonePlayerState.shifter)tonePlayerState.shifter.pitch=0;
  currentTranspose=0;updateTransposeDisplay();
}

function openLyricFullscreen(text) {
  if (!text) return;

  const html = `
    <div id="fullscreen-lyric">
      <button class="fs-back" onclick="closeLyricFullscreen()">← Kembali</button>
      <div class="fs-content">${escapeHtml(text)}</div>
    </div>
  `;

  document.body.insertAdjacentHTML('beforeend', html);

  const el = document.getElementById('fullscreen-lyric');
  if (el.requestFullscreen) el.requestFullscreen();
}

   
function closeLyricFullscreen() {
  const el = document.getElementById('fullscreen-lyric');

  if (document.fullscreenElement) {
    document.exitFullscreen();
  }

  if (el) el.remove();
}
function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function renderSpinwheel(){

    content.innerHTML=`<div class="empty-state"><div class="icon">🎰</div><p>Data Spinwheel belum tersedia.</p></div>`;
    return;
  }
  spinParticipants=rawData.filter(r=>{
    const aktif=(r.aktif||r.Aktif||'y').toString().toLowerCase();
    return aktif!=='n'&&aktif!=='tidak'&&aktif!=='no';
  }).map(r=>({nama:(r.nama||r.Nama||'-').trim(),nilai:(r.nilai||r.Nilai||'').trim(),eliminated:false}));
  spinAngle=0;spinIsSpinning=false;spinWinner=null;

  content.innerHTML=`
    <div class="spinwheel-wrap">
      <div class="spin-canvas-wrap">
        <div class="spin-pointer">▼</div>
        <canvas id="spin-canvas" width="270" height="270"></canvas>
      </div>
      <div class="spin-result-box">

        <div class="spin-result-name" id="spin-result-name">—</div>
      </div>
      <div class="action-row">
        <button class="btn-action accent" id="spin-btn" onclick="startSpin()" style="flex:1;padding:12px;font-size:.95rem;">🎰 Putar!</button>
        <button class="btn-action red" id="elim-btn" style="display:none;" onclick="eliminateWinner()">✕ Hapus</button>
        <button class="btn-action green" id="keep-btn" style="display:none;" onclick="keepWinner()">✓ Lanjut</button>
        <button class="btn-action" onclick="resetSpinwheel()" style="font-size:.75rem;">↺ Reset</button>
      </div>
      <div class="section-header" style="width:100%;max-width:330px;">
        <span class="section-title">Peserta</span>
        <span class="section-count" id="spin-count">${spinParticipants.length} aktif</span>
      </div>
      <div class="spin-participants" id="spin-participants-list"></div>
    </div>`;

  // Wait for DOM then draw
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      drawWheel();
      renderSpinList();
    },100);
  });
}
function drawWheel(){
  const canvas=document.getElementById('spin-canvas');
  if(!canvas){return;}
  const ctx=canvas.getContext('2d');
  const active=spinParticipants.filter(p=>!p.eliminated);
  const n=active.length;
  if(n===0){
    ctx.clearRect(0,0,270,270);
    ctx.fillStyle='#334155';
    ctx.font='14px DM Sans';
    ctx.textAlign='center';
    ctx.fillText('Semua dihapus',135,135);
    return;
  }
  const cx=135,cy=135,r=128;
  const slice=(2*Math.PI)/n;
  ctx.clearRect(0,0,270,270);
  // Draw shadow
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.5)';
  ctx.shadowBlur=20;
  ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);
  ctx.fillStyle='#111';ctx.fill();
  ctx.restore();

  active.forEach((p,i)=>{
    const start=spinAngle+i*slice-Math.PI/2;
    const end=start+slice;
    // Slice fill
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,end);ctx.closePath();
    const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    grad.addColorStop(0,MC[i%MC.length]+'cc');
    grad.addColorStop(1,MC[i%MC.length]);
    ctx.fillStyle=grad;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=1.5;ctx.stroke();
    // Label
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(start+slice/2);
    ctx.fillStyle='rgba(255,255,255,0.95)';
    const fs=n>10?9:n>6?11:13;
    ctx.font=`bold ${fs}px DM Sans`;
    ctx.textAlign='right';
    const lbl=p.nama.length>16?p.nama.slice(0,15)+'…':p.nama;
    ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=3;
    ctx.fillText(lbl,r-8,4);
    ctx.restore();
  });
  // Center circle
  ctx.beginPath();ctx.arc(cx,cy,22,0,2*Math.PI);
  const cGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,22);
  cGrad.addColorStop(0,'#334155');cGrad.addColorStop(1,'#1e293b');
  ctx.fillStyle=cGrad;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=2;ctx.stroke();
}
function startSpin(){
  const active=spinParticipants.filter(p=>!p.eliminated);
  if(active.length===0)return toast('Semua peserta sudah dihapus!');
  if(active.length===1){
    document.getElementById('spin-result-name').textContent='🏆 '+active[0].nama;
    toast('🏆 Pemenang: '+active[0].nama);return;
  }
  if(spinIsSpinning)return;
  spinIsSpinning=true;
  const spinBtn=document.getElementById('spin-btn');
  if(spinBtn)spinBtn.disabled=true;
  const elimBtn=document.getElementById('elim-btn');const keepBtn=document.getElementById('keep-btn');
  if(elimBtn)elimBtn.style.display='none';if(keepBtn)keepBtn.style.display='none';
  document.getElementById('spin-result-name').textContent='⏳';
  const dur=3500+Math.random()*2000;
  const totalSpin=(8+Math.random()*10)*Math.PI*2;
  const startTime=performance.now();const startAngle=spinAngle;
  function animate(now){
    const elapsed=now-startTime;const progress=Math.min(elapsed/dur,1);
    const ease=1-Math.pow(1-progress,3.5);
    spinAngle=startAngle+totalSpin*ease;
    drawWheel();
    if(progress<1){requestAnimationFrame(animate);}
    else{
      spinIsSpinning=false;if(spinBtn)spinBtn.disabled=false;
      const active2=spinParticipants.filter(p=>!p.eliminated);
      const n=active2.length;const slice=(2*Math.PI)/n;
      const norm=((spinAngle%(2*Math.PI))+(2*Math.PI))%(2*Math.PI);
      const wa=((Math.PI/2-norm)+(4*Math.PI))%(2*Math.PI);
      const wIdx=Math.floor(wa/slice)%n;
      spinWinner=active2[wIdx];
      document.getElementById('spin-result-name').textContent='🎉 '+spinWinner.nama;
      if(elimBtn)elimBtn.style.display='inline-flex';
      if(keepBtn)keepBtn.style.display='inline-flex';
      toast('🎉 Terpilih: '+spinWinner.nama);
      logHistory('spinwheel',spinWinner.nama);
    }
  }
  requestAnimationFrame(animate);
}
function eliminateWinner(){
  if(!spinWinner)return;
  const p=spinParticipants.find(x=>x.nama===spinWinner.nama&&!x.eliminated);
  if(p)p.eliminated=true;
  spinWinner=null;
  const elimBtn=document.getElementById('elim-btn');const keepBtn=document.getElementById('keep-btn');
  if(elimBtn)elimBtn.style.display='none';if(keepBtn)keepBtn.style.display='none';
  document.getElementById('spin-result-name').textContent='—';
  const active=spinParticipants.filter(p=>!p.eliminated);
  const sc=document.getElementById('spin-count');if(sc)sc.textContent=active.length+' aktif';
  renderSpinList();drawWheel();
  if(active.length===1){document.getElementById('spin-result-name').textContent='🏆 '+active[0].nama;toast('🏆 Pemenang: '+active[0].nama);}
  if(active.length===0)document.getElementById('spin-result-name').textContent='🎊 Selesai!';
}
function keepWinner(){
  spinWinner=null;
  const elimBtn=document.getElementById('elim-btn');const keepBtn=document.getElementById('keep-btn');
  if(elimBtn)elimBtn.style.display='none';if(keepBtn)keepBtn.style.display='none';
  document.getElementById('spin-result-name').textContent='—';
}
function resetSpinwheel(){
  spinParticipants.forEach(p=>p.eliminated=false);
  spinAngle=0;spinWinner=null;spinIsSpinning=false;
  document.getElementById('spin-result-name').textContent='—';
  const elimBtn=document.getElementById('elim-btn');const keepBtn=document.getElementById('keep-btn');
  if(elimBtn)elimBtn.style.display='none';if(keepBtn)keepBtn.style.display='none';
  const sc=document.getElementById('spin-count');if(sc)sc.textContent=spinParticipants.length+' aktif';
  renderSpinList();drawWheel();toast('↺ Spinwheel direset!');
}
function renderSpinList(){
  const list=document.getElementById('spin-participants-list');if(!list)return;
  list.innerHTML=spinParticipants.map(p=>`<div class="spin-participant-item ${p.eliminated?'eliminated':''}">
    <span>${escHtml(p.nama)}</span>
    ${p.nilai?`<span class="spin-nilai">${escHtml(p.nilai)}</span>`:''}
  </div>`).join('');
}

// ══════════════════════════════════════════════════
// QUIZ — FIXED
// Root cause: renderQuiz() depended on db.Quiz being pre-loaded
// Fix: Load data inside renderQuiz if not yet available
// ══════════════════════════════════════════════════
function renderQuiz(){
  const content=document.getElementById('app-content');
  if(!db.Quiz){
    content.innerHTML=`<div class="loading-shimmer"></div>`;
    Papa.parse(URLS.Quiz,{download:true,header:true,complete:res=>{db.Quiz=res.data;renderQuiz();}});
    return;
  }
  const rawData=db.Quiz||[];
  if(!rawData.length){
    content.innerHTML=`<div class="empty-state"><div class="icon">❓</div><p>Data Quiz belum tersedia.</p></div>`;
    return;
  }
  quizAnswers={};quizSubmitted=false;
  const questions=rawData.filter(r=>r.pertanyaan&&(r.aktif||'y').toString().toLowerCase()!=='n');
  if(!questions.length){
    content.innerHTML=`<div class="empty-state"><div class="icon">❓</div><p>Belum ada soal quiz aktif.<br><small>Kolom: pertanyaan, tipe, opsi_a, opsi_b, opsi_c, opsi_d, jawaban_benar</small></p></div>`;
    return;
  }
  content.innerHTML=`
    <div class="quiz-wrap">
      <div class="section-header"><span class="section-title">Kuis</span><span class="section-count">${questions.length} soal</span></div>
      ${questions.map((q,i)=>buildQuizQ(q,i)).join('')}
      <button class="quiz-submit-btn" onclick="submitQuiz()">Kirim Jawaban →</button>
    </div>`;
}
function buildQuizQ(q,i){
  const tipe=(q.tipe||'teks').toLowerCase();
  const opsi=['a','b','c','d'].map(x=>q[`opsi_${x}`]).filter(Boolean);
  return`<div class="quiz-question-card">
    <div class="quiz-q-number">Soal ${i+1} · ${tipe==='pilihan'?'Pilihan Ganda':'Esai'}</div>
    <div class="quiz-q-text">${escHtml(q.pertanyaan)}</div>
    ${tipe==='pilihan'?`<div class="quiz-options">${opsi.map((opt,oi)=>`<div class="quiz-option" id="opt-${i}-${oi}" onclick="selectOption(${i},${oi},${opsi.length})"><strong>${String.fromCharCode(65+oi)}.</strong> ${escHtml(opt)}</div>`).join('')}</div>`:`<textarea class="quiz-text-input" id="qt-${i}" rows="3" placeholder="Tulis jawaban Anda..." oninput="quizAnswers[${i}]=this.value"></textarea>`}
  </div>`;
}
function selectOption(qi,oi,total){
  for(let i=0;i<total;i++){const el=document.getElementById(`opt-${qi}-${i}`);if(el)el.classList.remove('selected');}
  const sel=document.getElementById(`opt-${qi}-${oi}`);if(sel)sel.classList.add('selected');
  quizAnswers[qi]=oi;
}
async function submitQuiz(){
  if(quizSubmitted)return;
  const questions=(db.Quiz||[]).filter(r=>r.pertanyaan&&(r.aktif||'y').toString().toLowerCase()!=='n');
  let correct=0;
  questions.forEach((q,i)=>{
    const tipe=(q.tipe||'teks').toLowerCase();
    if(tipe==='pilihan'){
      const opsi=['a','b','c','d'].map(x=>q[`opsi_${x}`]).filter(Boolean);
      const si=quizAnswers[i];
      if(si!==undefined){
        const st=opsi[si];
        const isOk=q.jawaban_benar&&st&&st.toLowerCase().trim()===q.jawaban_benar.toLowerCase().trim();
        if(isOk){correct++;document.getElementById(`opt-${i}-${si}`)?.classList.add('correct');}
        else{
          document.getElementById(`opt-${i}-${si}`)?.classList.add('wrong');
          const ci=opsi.findIndex(o=>o.toLowerCase().trim()===(q.jawaban_benar||'').toLowerCase().trim());
          if(ci>=0)document.getElementById(`opt-${i}-${ci}`)?.classList.add('correct');
        }
      }
    }
  });
  quizSubmitted=true;
  const pct=questions.length>0?Math.round((correct/questions.length)*100):0;
  if(!APPS_SCRIPT_URL.includes('GANTI')){
    try{await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'quiz',user:currentUser?.username||'anon',waktu:new Date().toISOString(),skor:pct,jawaban:JSON.stringify(quizAnswers)})});}catch(e){}
  }
  const qw=document.querySelector('.quiz-wrap');
  if(qw){
    const scoreEl=document.createElement('div');
    scoreEl.style.cssText='background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:22px;text-align:center;margin-top:14px;';
    scoreEl.innerHTML=`<div class="score-circle"><div class="score-number">${pct}%</div><div class="score-label">Nilai</div></div>
      <div style="font-weight:700;font-size:1rem;margin-bottom:5px;">${correct} dari ${questions.length} Benar</div>
      <div style="color:var(--text3);font-size:.83rem;">${pct>=80?'🏆 Luar biasa!':pct>=60?'👍 Cukup baik!':'💡 Terus belajar!'}</div>`;
    qw.appendChild(scoreEl);
    scoreEl.scrollIntoView({behavior:'smooth'});
  }
  toast(`✅ Skor: ${pct}%`);
  logHistory('quiz',`skor ${pct}%`);
}

// ADMIN
// ══════════════════════════════════════════════════
function renderAdmin(){
  const tiypes=(currentUser?.tipe||'');
  if(!tiypes.toLowerCase().includes('admin')){
    document.getElementById('app-content').innerHTML=`<div class="empty-state"><div class="icon">🔒</div><p>Akses Ditolak</p></div>`;return;
  }
  const content=document.getElementById('app-content');
  content.innerHTML=`
    <div class="section-header"><span class="section-title">Dashboard Admin</span></div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn-action accent" onclick="loadQuizResults()" style="padding:12px;">📊 Lihat Hasil Quiz</button>
      <button class="btn-action" onclick="loadHistoryLog()" style="padding:12px;">📋 Log Aktivitas</button>
    </div>
    <div id="admin-results" style="margin-top:14px;"></div>`;
}
async function loadQuizResults(){
  if(APPS_SCRIPT_URL.includes('GANTI')){document.getElementById('admin-results').innerHTML=`<div class="empty-state"><div class="icon">⚙️</div><p>URL Apps Script belum diisi</p></div>`;return;}
  document.getElementById('admin-results').innerHTML='<div class="loading-shimmer"></div>';
  try{
    const res=await fetch(APPS_SCRIPT_URL+'?type=quiz_results');
    const data=await res.json();
    const el=document.getElementById('admin-results');
    if(!data||!data.length){el.innerHTML=`<div class="empty-state"><div class="icon">📭</div><p>Belum ada jawaban</p></div>`;return;}
    const avg=Math.round(data.reduce((s,r)=>s+(parseFloat(r.skor)||0),0)/data.length);
    el.innerHTML=`<div class="section-header"><span class="section-title">Hasil Quiz</span><span class="section-count">${data.length} · avg ${avg}%</span></div>
      ${data.map(r=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:7px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
          <strong>${escHtml(r.user||'?')}</strong>
          <span style="font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--accent);">${r.skor}%</span>
        </div>
        <div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${r.skor}%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;"></div>
        </div>
        <div style="color:var(--text3);font-size:.7rem;margin-top:4px;font-family:'JetBrains Mono',monospace;">${r.waktu?new Date(r.waktu).toLocaleString('id'):'—'}</div>
      </div>`).join('')}`;
  }catch(e){document.getElementById('admin-results').innerHTML=`<div class="empty-state"><div class="icon">⚠️</div><p>Gagal memuat hasil quiz.</p></div>`;}
}
function loadHistoryLog(){
  const history=JSON.parse(localStorage.getItem('activity_log')||'[]');
  const el=document.getElementById('admin-results');
  if(!history.length){el.innerHTML=`<div class="empty-state"><div class="icon">📋</div><p>Belum ada log</p></div>`;return;}
  el.innerHTML=`<div class="section-header"><span class="section-title">Log</span><span class="section-count">${history.length}</span></div>
    ${history.slice(-60).reverse().map(h=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:5px;font-size:.8rem;">
      <span class="tag">${h.menu||'?'}</span>
      <strong style="margin-left:5px;">${escHtml(h.action||'')}</strong>
      <div style="color:var(--text3);margin-top:2px;font-family:'JetBrains Mono',monospace;font-size:.68rem;">${h.user||'?'} · ${new Date(h.waktu).toLocaleString('id')}</div>
    </div>`).join('')}`;
}

// ══════════════════════════════════════════════════
// HISTORY LOG
// ══════════════════════════════════════════════════
async function logHistory(menu,action){
  let ip='?';
  try{const r=await fetch('https://api.ipify.org?format=json');const d=await r.json();ip=d.ip;}catch(e){}
  const entry={user:currentUser?.username||'anon',menu,action,waktu:new Date().toISOString(),ip};
  const ex=JSON.parse(localStorage.getItem('activity_log')||'[]');
  ex.push(entry);if(ex.length>500)ex.splice(0,ex.length-500);
  localStorage.setItem('activity_log',JSON.stringify(ex));
  if(!APPS_SCRIPT_URL.includes('GANTI')){
    fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'history',...entry})}).catch(()=>{});
  }
}
